 corrective pattern ใดก็ได้ ทั้ง zigzag, flat หรือ triangle หน้าที่หลักคือแยก correction สองตัวหลักออกจากกัน ตัวเลือก A (ต้องเป็น triangle) จำกัดเกินไป C (retrace 90% ของ W) อธิบาย X ที่ลึกผิดปกติ และ D (เกิน W) จะทำให้ X ใหญ่กว่า W ซึ่งผิดปกติ"}, {"id": "v2q05", "text": "A contracting triangle forms in Wave 4 of a bull market impulse. After the triangle completes, which statement BEST describes what analysts expect from the subsequent Wave 5 thrust?", "choices": [{"id": "a", "letter": "A", "text": "Wave 5 should be brief and approximate the widest measurement of the triangle as its price distance, offering a specific and quantifiable target"}, {"id": "b", "letter": "B", "text": "Wave 5 will be exceptionally long, typically 2.618 times Wave 3"}, {"id": "c", "letter": "C", "text": "Wave 5 will retrace deeply back into the triangle body before reversing"}, {"id": "d", "letter": "D", "text": "Wave 5 will form another triangle before the impulse truly ends"}], "correct": ["a"], "expEn": "After a contracting Wave 4 triangle, the subsequent Wave 5 thrust is typically brief, sharp, and equal in price distance to the maximum width of the triangle (measured at the widest point). This provides a useful quantifiable target for traders. After the thrust, a significant reversal typically follows. B is incorrect — the post-triangle thrust is characteristically SHORT, not long. C (retracing into the triangle body) contradicts the thrust concept. D would imply two consecutive triangles, which is not the expected pattern.", "expTh": "หลัง Contracting Triangle ใน Wave 4 Wave 5 thrust มักสั้น เฉียบพลัน และมีระยะทางเท่ากับความกว้างสูงสุดของ triangle ซึ่งเป็นเป้าหมายที่คำนวณได้ชัดเจน หลังจาก thrust เสร็จสิ้น มักตามด้วยการกลับตัวครั้งใหญ่ ตัวเลือก B ผิดเพราะ thrust หลัง triangle มักสั้น ไม่ใช่ยาว C (retrace กลับเข้า triangle) ขัดกับ concept thrust และ D (triangle สองตัวติดกัน) ไม่ใช่ pattern ที่คาด"}, {"id": "v2q06", "text": "In a bull market impulse: Wave 3 = 2.618 times Wave 1, and Wave 5 = Wave 1 in length. Which Elliott Wave guideline does this MOST directly illustrate?", "choices": [{"id": "a", "letter": "A", "text": "The guideline of alternation (Waves 2 and 4 differ in form)"}, {"id": "b", "letter": "B", "text": "The guideline of channeling (waves travel within parallel boundaries)"}, {"id": "c", "letter": "C", "text": "The guideline of wave extension (Wave 3 is extended and dominant)"}, {"id": "d", "letter": "D", "text": "The rule of equality (when Wave 3 is the extended wave, Waves 1 and 5 tend toward equality)"}], "correct": ["d"], "expEn": "Wave 3 = 2.618 × Wave 1 confirms Wave 3 as the extended wave. Wave 5 = Wave 1 demonstrates the rule of equality, which states that when Wave 3 is extended, Waves 1 and 5 tend toward equality (or a 0.618 ratio). This is the guideline being directly illustrated. A (alternation) relates to the form of corrective Waves 2 and 4, not motive wave length ratios. B (channeling) describes parallel trendlines. C is partially correct — Wave 3 is extended, but the specific relationship between Waves 1 and 5 points to the rule of equality.", "expTh": "Wave 3 = 2.618 × Wave 1 ยืนยัน Wave 3 เป็น extended wave Wave 5 = Wave 1 แสดง rule of equality ที่ระบุว่าเมื่อ Wave 3 extend แล้ว Waves 1 และ 5 มักเท่ากัน (หรืออัตราส่วน 0.618) ตัวเลือก A (alternation) เกี่ยวกับรูปแบบ corrective Waves 2 และ 4 ไม่ใช่อัตราส่วนความยาวคลื่น motive B (channeling) อธิบายเส้นขนาน และ C ถูกบางส่วนแต่ความสัมพันธ์เฉพาะของ Waves 1 และ 5 ชี้ไปที่ rule of equality"}, {"id": "v2q07", "text": "An analyst labels an A-B-C correction where Wave C extends well BEYOND the starting point of Wave A. What type of triangle correction is MOST likely if this is actually a five-wave A-B-C-D-E triangle?", "choices": [{"id": "a", "letter": "A", "text": "Contracting (symmetrical) triangle where each leg is smaller"}, {"id": "b", "letter": "B", "text": "Ascending triangle with a flat upper boundary"}, {"id": "c", "letter": "C", "text": "Expanding (reverse) triangle where each successive wave is larger than the preceding one"}, {"id": "d", "letter": "D", "text": "Running flat where Wave C overshoots Wave A"}], "correct": ["c"], "expEn": "If the labeled Wave C extends beyond Wave A's starting point, and we are talking about a triangular pattern (A-B-C-D-E), this expanding behavior — where each successive wave is larger than the preceding — describes an expanding (reverse or irregular) triangle. Its trendlines diverge outward. A (contracting) has each wave smaller than the previous, opposite of what is described. B (ascending triangle) is a technical analysis pattern not directly used in Elliott Wave. D (running flat) is a different structure (A-B-C with 3-3-5).", "expTh": "ถ้า Wave C ขยายเกินจุดเริ่มต้นของ Wave A ในโครงสร้าง A-B-C-D-E triangle การขยายตัวนี้ — ที่แต่ละคลื่นใหญ่กว่าคลื่นก่อนหน้า — อธิบาย Expanding (Reverse) Triangle ที่เส้น trendline แยกออกจากกัน ตัวเลือก A (contracting) มีคลื่นเล็กลงเรื่อยๆ ตรงข้ามกับที่อธิบาย B (ascending triangle) เป็น pattern TA ทั่วไปไม่ใช่ EW โดยตรง และ D (running flat) มีโครงสร้าง 3-3-5 ต่างกัน"}, {"id": "v2q08", "text": "When comparing a zigzag and a flat correction forming from the same starting price level, which produces the deeper retracement of the preceding motive wave?", "choices": [{"id": "a", "letter": "A", "text": "A flat always produces a deeper retracement than a zigzag"}, {"id": "b", "letter": "B", "text": "A zigzag tends to produce a deeper retracement because its Wave C is a five-wave structure that typically equals or exceeds Wave A in length"}, {"id": "c", "letter": "C", "text": "Both produce approximately equal retracement depth on average"}, {"id": "d", "letter": "D", "text": "An expanded flat always produces the deepest retracement of any corrective pattern"}], "correct": ["b"], "expEn": "A zigzag is classified as a sharp correction because its Wave C is a five-wave impulse that typically equals or exceeds Wave A in length, driving price significantly lower (or higher) than in a flat. A flat is a sideways correction where Wave C typically ends near Wave A's end, producing a less dramatic price retracement. A is incorrect — flats are sideways corrections, generally shallower. C overstates equality. D is incorrect — a running flat produces the shallowest correction among flat types.", "expTh": "Zigzag จัดเป็น sharp correction เพราะ Wave C เป็น 5-wave impulse ที่มักยาวเท่ากับหรือเกิน Wave A ทำให้ราคาลดลง (หรือเพิ่มขึ้น) มากกว่า Flat ส่วน Flat เป็น sideways correction ที่ Wave C มักสิ้นสุดใกล้จุดสิ้นสุดของ Wave A ทำให้ retracement น้อยกว่า ตัวเลือก A ผิดเพราะ Flat เป็น sideways correction C ประเมินความเท่ากันสูงเกิน และ D ผิดเพราะ Running Flat ให้ correction ที่ตื้นที่สุด"}, {"id": "v2q09", "text": "An extended Wave 3 has just completed in a bull market impulse. Which statement CORRECTLY describes the expected sequence of events?", "choices": [{"id": "a", "letter": "A", "text": "Wave 4 and Wave 5 still complete the impulse structure, after which a correction at one degree higher begins"}, {"id": "b", "letter": "B", "text": "The entire impulse restarts from the origin of Wave 1 following an extended Wave 3"}, {"id": "c", "letter": "C", "text": "After an extended Wave 3, the next wave must be the largest correction in the entire structure"}, {"id": "d", "letter": "D", "text": "After Wave 3 extension, Wave 4 is skipped and the impulse proceeds directly to Wave 5"}], "correct": ["a"], "expEn": "When Wave 3 is extended, the impulse still requires Wave 4 (a correction) and Wave 5 (another motive wave) to complete the five-wave structure. After the complete impulse, a corrective phase at one degree higher begins. Extension changes the proportions within the impulse but does not alter the five-wave requirement. B is incorrect — the impulse doesn't restart. C is incorrect — after extension, Wave 4 is often proportionally smaller. D is incorrect — Wave 4 is a required component and cannot be skipped.", "expTh": "เมื่อ Wave 3 extend impulse ยังต้องการ Wave 4 (correction) และ Wave 5 (motive wave) เพื่อทำให้ครบ 5 คลื่น หลังจาก impulse เสร็จสมบูรณ์จึงเริ่ม corrective phase ใน degree สูงกว่า Extension เปลี่ยนสัดส่วนภายใน impulse แต่ไม่เปลี่ยนข้อกำหนด 5 คลื่น ตัวเลือก B ผิดเพราะ impulse ไม่ restart C ผิดเพราะ Wave 4 หลัง extension มักเล็กตามสัดส่วน และ D ผิดเพราะ Wave 4 เป็นส่วนประกอบที่ขาดไม่ได้"}, {"id": "v2q10", "text": "In a W-X-Y double three combination, which statement MOST accurately characterizes the Y wave's price extreme relative to the W wave?", "choices": [{"id": "a", "letter": "A", "text": "Y must always extend further than W in price"}, {"id": "b", "letter": "B", "text": "Y must end at exactly the same price as W"}, {"id": "c", "letter": "C", "text": "Y can never exceed the price extreme of W"}, {"id": "d", "letter": "D", "text": "Y's price extreme relative to W depends on the types of corrections W and Y represent — in a double zigzag, Y typically extends further; in other combinations, Y may not"}], "correct": ["d"], "expEn": "The Y wave's price extent is not fixed relative to W — it depends on what types of corrections W and Y are. In a double zigzag (W and Y are both zigzags), Y typically extends further than W because zigzags are sharp corrections that progress significantly in price. In a zigzag-flat or flat-triangle combination, Y may not extend beyond W. The key requirement is that the entire W-X-Y structure forms a valid completed correction. A overstates the requirement. B and C impose fixed relationships that do not exist.", "expTh": "Price extreme ของ Y คลื่นไม่ได้ตายตัวเมื่อเทียบกับ W ขึ้นอยู่กับประเภทของ correction ที่ W และ Y เป็น ใน Double Zigzag (W และ Y เป็น zigzag ทั้งคู่) Y มักขยายไกลกว่า W เพราะ zigzag เป็น sharp correction ที่เคลื่อนราคามาก ใน zigzag-flat หรือ flat-triangle Y อาจไม่เกิน W ข้อกำหนดหลักคือโครงสร้าง W-X-Y รวมต้องสมบูรณ์เป็น correction ตัวเลือก A กำหนดเงื่อนไขเกิน B และ C กำหนดความสัมพันธ์ตายตัวที่ไม่มีจริง"}, {"id": "v2q11", "text": "When an extension occurs in Wave 3 of a bull market impulse, what happens to the WAVE DEGREE of the extended wave and its surrounding waves?", "choices": [{"id": "a", "letter": "A", "text": "The extended Wave 3 increases to the next higher degree while Waves 1 and 5 drop to the next lower degree"}, {"id": "b", "letter": "B", "text": "All five waves of the impulse remain at the same degree; the extension makes Wave 3 longer but does not change its degree"}, {"id": "c", "letter": "C", "text": "All five waves of the impulse drop to a lower degree because the extended wave dominates"}, {"id": "d", "letter": "D", "text": "Wave 3 extension forces Wave 4 to increase to the same degree as Wave 3"}], "correct": ["b"], "expEn": "Extension does not alter wave degree. All five waves of the impulse (1, 2, 3, 4, 5) remain at the same degree regardless of whether Wave 3 is extended. What changes is that Wave 3's five internal sub-waves (at the next smaller degree) become clearly visible at the same visual scale as the surrounding main waves — making the impulse look like it has 9 waves. But the degree assignment does not change. A, C, and D all incorrectly imply degree changes due to extension.", "expTh": "Extension ไม่เปลี่ยน wave degree คลื่นทั้ง 5 ของ impulse (1, 2, 3, 4, 5) ยังอยู่ใน degree เดียวกันไม่ว่า Wave 3 จะ extend หรือไม่ สิ่งที่เปลี่ยนคือ sub-wave ภายใน 5 ตัวของ Wave 3 (ใน degree เล็กกว่า) จะมองเห็นได้ชัดในสเกลเดียวกับคลื่นหลัก ทำให้ impulse ดูเหมือนมี 9 คลื่น แต่การกำหนด degree ไม่เปลี่ยน ตัวเลือก A, C, D ล้วนบอกว่า degree เปลี่ยนซึ่งผิด"}, {"id": "v2q12", "text": "A market completes what analysts label as five waves up (a Primary degree Wave 1), followed by a three-wave decline (a Primary degree Wave 2). Price then breaks above Wave 1's high. What is the MOST LIKELY Elliott Wave interpretation?", "choices": [{"id": "a", "letter": "A", "text": "The preceding five-wave advance was actually a corrective pattern that has now completed"}, {"id": "b", "letter": "B", "text": "The market is now in a Wave B of a higher-degree flat that started at the origin of the previous five-wave advance"}, {"id": "c", "letter": "C", "text": "The break above Wave 1's high is most consistent with a new Wave 3 of a Cycle degree impulse beginning, following the completed Wave 1 impulse and Wave 2 correction"}, {"id": "d", "letter": "D", "text": "The five waves up were an ending diagonal and the new high constitutes a throw-over only"}], "correct": ["c"], "expEn": "When a valid five-wave advance (Wave 1 at Primary degree) is followed by a three-wave correction (Wave 2 at Primary degree), and price then breaks above Wave 1's high, the most consistent interpretation is that Wave 3 of the Cycle degree impulse is beginning. The three-wave corrective Wave 2 confirms the impulse context. A is incorrect — five waves up in the trend direction are motive, not corrective. B (Wave B of flat) would require a different corrective context. D (throw-over) would require the five waves to be a diagonal, which was not specified.", "expTh": "เมื่อการเพิ่มขึ้น 5 คลื่นที่ถูกต้อง (Wave 1 ระดับ Primary) ตามด้วย correction 3 คลื่น (Wave 2) และราคาทะลุ high ของ Wave 1 ขึ้นไป การตีความที่สอดคล้องที่สุดคือ Wave 3 ของ Cycle degree impulse กำลังเริ่ม Wave 2 ที่เป็น 3 คลื่น corrective ยืนยัน impulse context ตัวเลือก A ผิดเพราะ 5 คลื่นขึ้นตามแนวโน้มเป็น motive ไม่ใช่ corrective B (Wave B ของ flat) ต้องการ context ที่ต่างกัน และ D (throw-over) ต้องการให้ 5 คลื่นเป็น diagonal"}, {"id": "v2q13", "text": "What is the significance of a throw-over in the context of an ENDING DIAGONAL completion?", "choices": [{"id": "a", "letter": "A", "text": "A brief penetration above the upper trendline of the ending diagonal, quickly reversed, which typically signals final exhaustion and an impending sharp reversal in the opposite direction"}, {"id": "b", "letter": "B", "text": "A gap-up opening that launches a powerful new motive wave after the diagonal"}, {"id": "c", "letter": "C", "text": "A confirmation signal that the ending diagonal will extend further with a new sub-wave"}, {"id": "d", "letter": "D", "text": "A retrace back to the middle of the diagonal that serves as support before Wave 5 accelerates"}], "correct": ["a"], "expEn": "In an ending diagonal, the throw-over is a brief, final overshoot above the upper trendline, immediately followed by a sharp reversal back inside the diagonal boundary and beyond. It signals complete exhaustion of the current trend direction. Analysts specifically watch for this pattern in ending diagonals as a high-probability entry point for a counter-trend trade. B (gap-up launching a new wave) is the opposite of a throw-over signal. C and D suggest continuation, which contradicts the reversal signal of a throw-over.", "expTh": "ใน Ending Diagonal throw-over คือการทะลุเส้น upper trendline ชั่วคราวแล้วกลับลงทันทีอย่างรุนแรง เป็นสัญญาณของ exhaustion สุดท้ายและการกลับตัวอย่างเฉียบพลัน นักวิเคราะห์มองหาสัญญาณนี้ใน Ending Diagonal เป็นจุดเข้า counter-trend ที่มีโอกาสสูง ตัวเลือก B (gap-up เริ่ม wave ใหม่) ตรงข้ามกับสัญญาณ throw-over และ C, D บ่งบอก continuation ซึ่งขัดกับสัญญาณกลับตัว"}, {"id": "v2q14", "text": "In a bull market, after completing a five-wave upward impulse, a corrective A-B-C pattern begins. What are the DIRECTION and internal STRUCTURE of Wave B within this correction?", "choices": [{"id": "a", "letter": "A", "text": "Wave B moves downward with five sub-waves"}, {"id": "b", "letter": "B", "text": "Wave B moves downward with three sub-waves"}, {"id": "c", "letter": "C", "text": "Wave B moves upward with five sub-waves"}, {"id": "d", "letter": "D", "text": "Wave B moves upward with three sub-waves"}], "correct": ["d"], "expEn": "In a post-bull-market A-B-C correction: Wave A moves downward (against the prior bullish impulse) and is corrective in nature. Wave B moves UPWARD (counter to the corrective decline), making a partial recovery. Wave B always subdivides into THREE sub-waves because it is a corrective wave itself, regardless of what pattern it forms (zigzag B, flat B, or triangle B). Wave C then resumes the corrective decline. C (five sub-waves upward) would make Wave B a motive wave, which is incorrect.", "expTh": "ใน A-B-C correction หลังตลาดกระทิง: Wave A เคลื่อนลง (ขัดกับ impulse กระทิงก่อนหน้า) Wave B เคลื่อนขึ้น (ขัดกับการลดลงของ correction) ทำ partial recovery Wave B แบ่งย่อยเป็น 3 sub-wave เสมอเพราะเป็น corrective wave เอง ไม่ว่าจะเป็น pattern ใด (zigzag B, flat B หรือ triangle B) จากนั้น Wave C กลับมาลงต่อ ตัวเลือก C (5 sub-wave ขึ้น) จะทำให้ Wave B เป็น motive wave ซึ่งผิด"}, {"id": "v2q15", "text": "In a W-X-Y double three combination, the X wave that connects W and Y typically retraces what portion of the W wave?", "choices": [{"id": "a", "letter": "A", "text": "X always retraces 100% of W, returning to W's origin"}, {"id": "b", "letter": "B", "text": "X typically retraces approximately 50% to 79% of the W wave"}, {"id": "c", "letter": "C", "text": "X always retraces less than 23.6% of W"}, {"id": "d", "letter": "D", "text": "X always extends beyond the price extreme of W"}], "correct": ["b"], "expEn": "In a double three, the X wave typically retraces between approximately 50% and 79% of the W wave's length. This partial retracement distinguishes the X wave from a full reversal, confirming its corrective connecting role. A (100% retracement) would return to W's origin, which is possible but atypical for X. C (less than 23.6%) would be an unusually shallow X. D (extending beyond W) would make X larger than W, an uncommon relationship that would typically redefine the labeling.", "expTh": "ใน Double Three X wave มักย้อนกลับประมาณ 50% ถึง 79% ของ W wave การ retrace บางส่วนนี้แตกต่าง X wave จากการกลับตัวเต็มรูปแบบ ยืนยันบทบาทเชื่อมต่อ corrective ตัวเลือก A (100% retracement) จะกลับถึงต้นกำเนิดของ W ซึ่งเป็นไปได้แต่ผิดปกติ C (น้อยกว่า 23.6%) จะเป็น X ที่ตื้นผิดปกติ และ D (เกิน W) จะทำให้ X ใหญ่กว่า W ซึ่งไม่ปกติและต้องนิยามใหม่"}, {"id": "v2q16", "text": "The guideline of alternation can extend beyond a single impulse wave. How does this broader application manifest?", "choices": [{"id": "a", "letter": "A", "text": "Alternation applies only within a single impulse and cannot be applied across different degrees"}, {"id": "b", "letter": "B", "text": "It means motive waves and corrective waves must always alternate in direction"}, {"id": "c", "letter": "C", "text": "Corrections at one degree level often differ in form from corrections at the next higher degree, with sharp corrections at one level paired with sideways corrections at the adjacent level"}, {"id": "d", "letter": "D", "text": "It means the number of sub-waves in Wave 2 and Wave 4 must alternate between odd and even"}], "correct": ["c"], "expEn": "The broader application of alternation suggests that corrective waves at different degrees of trend also tend to alternate. If the correction at one degree is sharp (zigzag), the correction at the adjacent higher degree tends to be sideways (flat or complex). This helps analysts anticipate the probable form of corrections at various degrees. A is too restrictive. B describes the natural alternation between motive and corrective waves in general, not the specific guideline. D is not a recognized application.", "expTh": "การใช้ alternation ที่กว้างขึ้นบ่งบอกว่า corrective wave ในแต่ละ degree มักสลับรูปแบบกัน ถ้า correction ใน degree หนึ่งเป็น sharp (zigzag) correction ใน degree ที่อยู่ติดกันมักเป็น sideways (flat หรือ complex) ช่วยให้นักวิเคราะห์คาดเดารูปแบบ correction ในระดับต่างๆ ตัวเลือก A จำกัดเกินไป B อธิบายการสลับกันโดยทั่วไปไม่ใช่ guideline เฉพาะ และ D ไม่ใช่การใช้งานที่รู้จัก"}, {"id": "v2q17", "text": "In an expanded flat correction, what is the MINIMUM price requirement for Wave C?", "choices": [{"id": "a", "letter": "A", "text": "Wave C must at least reach the price extreme of Wave A; falling short would make it a running flat instead"}, {"id": "b", "letter": "B", "text": "Wave C must be exactly 1.618 times the length of Wave A"}, {"id": "c", "letter": "C", "text": "Wave C must retrace 100% of Wave B before the correction is complete"}, {"id": "d", "letter": "D", "text": "Wave C must exceed Wave B in length by at least 61.8%"}], "correct": ["a"], "expEn": "In an expanded flat, Wave C (a five-wave structure) must at least reach — and typically exceed — the price extreme of Wave A. If Wave C falls short of Wave A's extreme, the pattern is more consistent with a running flat (where Wave C truncates). Wave C often reaches 1.618 times Wave A in an expanded flat, but this is a guideline, not a minimum requirement (making B incorrect as stated as a fixed rule). C and D are invented criteria not found in Elliott Wave literature.", "expTh": "ใน Expanded Flat Wave C (โครงสร้าง 5-wave) ต้องถึงอย่างน้อย — และมักเกิน — จุดสุดขีดของ Wave A ถ้า Wave C ไม่ถึง Wave A รูปแบบสอดคล้องกับ Running Flat มากกว่า (ที่ Wave C truncate) Wave C มักเท่ากับ 1.618 เท่าของ Wave A ใน Expanded Flat แต่เป็น guideline ไม่ใช่ข้อกำหนดขั้นต่ำ ทำให้ B ผิดในฐานะกฎตายตัว C และ D เป็นเกณฑ์ที่ไม่มีในตำรา Elliott Wave"}, {"id": "v2q18", "text": "What is the phenomenon of sub-divided extension, and why is it significant for wave counting?", "choices": [{"id": "a", "letter": "A", "text": "It occurs when a corrective wave unexpectedly subdivides into five motive sub-waves"}, {"id": "b", "letter": "B", "text": "It indicates the wave count has an error because extensions never subdivide"}, {"id": "c", "letter": "C", "text": "It is a technique for counting waves across smaller timeframes only"}, {"id": "d", "letter": "D", "text": "When an extension occurs (e.g., in Wave 3), the five internal sub-waves of the extended wave are visible at the same scale as the surrounding waves, resulting in nine apparent waves in the impulse direction rather than five"}], "correct": ["d"], "expEn": "Sub-divided extension explains why analysts sometimes count nine visible waves in the direction of the trend when only a single impulse degree is represented. The extended wave's five sub-waves appear at the same visual magnitude as the surrounding four main waves, giving 4 + 5 = 9 visible movements. This is not an error; it is a valid extended impulse at one degree. Understanding this prevents mislabeling the nine waves as two separate impulses. A describes a different (incorrect) phenomenon. B and C are both incorrect.", "expTh": "Sub-divided extension อธิบายว่าทำไมนักวิเคราะห์บางครั้งนับเห็น 9 คลื่นในทิศทางแนวโน้มทั้งที่เป็น impulse degree เดียว sub-wave 5 ตัวของ extended wave ปรากฏในขนาดเดียวกับคลื่นหลัก 4 ตัวที่เหลือ ให้ภาพ 4 + 5 = 9 การเคลื่อนไหว นี่ไม่ใช่ข้อผิดพลาด เป็น extended impulse ระดับเดียวที่ถูกต้อง การเข้าใจนี้ป้องกันการนับ 9 คลื่นผิดเป็น impulse สองตัวแยกกัน ตัวเลือก A อธิบายปรากฏการณ์ผิด B และ C ก็ผิด"}, {"id": "v2q19", "text": "After Waves 1, 2, and 3 of a bull market impulse are confirmed complete, how does the analyst refine the Elliott channel to project where Wave 4 is likely to terminate?", "choices": [{"id": "a", "letter": "A", "text": "Project Wave 4 using only Fibonacci retracement levels of Wave 3, ignoring the channel"}, {"id": "b", "letter": "B", "text": "Draw the upper boundary through the ends of Waves 1 and 3; draw the lower parallel boundary through the end of Wave 2; Wave 4 is expected to terminate near this lower channel line"}, {"id": "c", "letter": "C", "text": "Draw a single line from the impulse origin through Wave 3's end and project forward"}, {"id": "d", "letter": "D", "text": "Redraw the channel using only Wave 3 high and Wave 2 low as reference points"}], "correct": ["b"], "expEn": "After Wave 3 is confirmed, the updated Elliott channel is constructed by drawing the upper trendline through the ends of Waves 1 and 3, and the parallel lower trendline through the end of Wave 2. Wave 4 is then expected to terminate near or at this lower channel boundary. This is the standard refined channel technique as described by Frost and Prechter. A (Fibonacci only, ignoring channel) loses the structural boundary context. C (single line) does not create a channel. D uses only one top and one bottom, creating an imprecise channel.", "expTh": "หลัง Wave 3 สมบูรณ์ channel Elliott ที่ปรับปรุงสร้างโดยลาก upper trendline ผ่านจุดสิ้นสุดของ Waves 1 และ 3 และลาก lower trendline ขนานผ่านจุดสิ้นสุดของ Wave 2 Wave 4 คาดว่าจะสิ้นสุดใกล้หรือที่ lower channel line นี่คือเทคนิค channel มาตรฐานตามที่ Frost และ Prechter อธิบาย ตัวเลือก A (Fibonacci อย่างเดียว) ไม่ใช้ขอบเขตโครงสร้าง C (เส้นเดียว) ไม่ได้สร้าง channel และ D ใช้จุดอ้างอิงเดียวบนและล่าง"}, {"id": "v2q20", "text": "An impulse wave shows: Wave 1 = 80 pts, Wave 2 retraces to 61.8%, Wave 3 = 129.44 pts (≈1.618 × Wave 1), Wave 4 retraces to 38.2% of Wave 3 (alternation: Wave 2 was deep, Wave 4 is shallow), Wave 5 = 80 pts. Which combination of guidelines is CONFIRMED by this structure?", "choices": [{"id": "a", "letter": "A", "text": "Wave 3 extension at 2.618 × Wave 1, and Waves 1 and 5 in a 2:1 ratio"}, {"id": "b", "letter": "B", "text": "Wave 3 is the shortest wave (rule violation), and alternation is absent"}, {"id": "c", "letter": "C", "text": "Wave 3 = 1.618 × Wave 1 (most common Fibonacci relationship), Wave 5 = Wave 1 (rule of equality applies), and alternation is present (deep Wave 2, shallow Wave 4)"}, {"id": "d", "letter": "D", "text": "The structure violates the cardinal rules because Wave 4 retraced into Wave 1 territory"}], "correct": ["c"], "expEn": "Wave 3 (129.44 pts) = 1.618 × Wave 1 (80 pts), confirming the most common Fibonacci relationship. Wave 5 = Wave 1 at 80 pts, demonstrating the rule of equality (expected when Wave 3 is extended at 1.618). Wave 2 retracing 61.8% (deep) versus Wave 4 retracing 38.2% (shallow) confirms alternation in both depth and, typically, form. No cardinal rules are violated — Wave 4 retracing 38.2% of Wave 3 remains above Wave 1's territory. A, B, and D all contain errors.", "expTh": "Wave 3 (129.44 pts) = 1.618 × Wave 1 (80 pts) ยืนยันความสัมพันธ์ Fibonacci ที่พบบ่อยที่สุด Wave 5 = Wave 1 ที่ 80 pts แสดง rule of equality (คาดไว้เมื่อ Wave 3 = 1.618) Wave 2 retrace 61.8% (ลึก) เทียบกับ Wave 4 retrace 38.2% (ตื้น) ยืนยัน alternation ไม่มีการละเมิดกฎเหล็กเพราะ Wave 4 retrace 38.2% ของ Wave 3 ยังอยู่เหนือ territory ของ Wave 1 ตัวเลือก A, B และ D มีข้อผิดพลาด"}]}, {"label": "Level II · Part 2", "title": "Advanced Elliott Wave — Part 2", "time": 45, "type": "multi", "topics": ["Application", "Analysis", "Combined Rules", "Structure ID"], "bank": [{"id": "v3q01", "text": "Which THREE of the following are cardinal rules (hard rules, not guidelines) for a valid impulse wave? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Wave 2 must never retrace 100% of Wave 1"}, {"id": "b", "letter": "B", "text": "Wave 3 must always be at least 1.618 times the length of Wave 1"}, {"id": "c", "letter": "C", "text": "Wave 3 must never be the shortest among Waves 1, 3, and 5"}, {"id": "d", "letter": "D", "text": "Wave 4 must not overlap Wave 1's price territory in a non-leveraged cash market"}], "correct": ["a", "c", "d"], "expEn": "A, C, and D are the three cardinal rules: Wave 2 never retraces 100% of Wave 1 (A), Wave 3 is never the shortest of Waves 1, 3, and 5 (C), and Wave 4 never overlaps Wave 1 in cash markets (D). B is incorrect — the 1.618 relationship is a common Fibonacci guideline, not a cardinal rule. Wave 3 could theoretically be shorter than 1.618 × Wave 1 while still not being the shortest of the three.", "expTh": "A, C และ D คือกฎเหล็กสามข้อ: Wave 2 ห้าม retrace 100% ของ Wave 1 (A), Wave 3 ต้องไม่สั้นที่สุดในกลุ่ม Waves 1, 3, 5 (C) และ Wave 4 ห้าม overlap Wave 1 ในตลาด cash (D) ตัวเลือก B ผิดเพราะ 1.618 เป็นเพียง guideline Fibonacci ไม่ใช่กฎเหล็ก Wave 3 อาจสั้นกว่า 1.618 × Wave 1 ได้ตราบที่ไม่ใช่คลื่นที่สั้นที่สุด"}, {"id": "v3q02", "text": "Which TWO of the following corrective patterns are classified as SIDEWAYS (lateral) corrections rather than sharp corrections? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Zigzag"}, {"id": "b", "letter": "B", "text": "Regular flat"}, {"id": "c", "letter": "C", "text": "Double zigzag"}, {"id": "d", "letter": "D", "text": "Contracting triangle"}], "correct": ["b", "d"], "expEn": "Regular flat (B) and contracting triangle (D) are classified as sideways corrections because they result in relatively little net price movement against the preceding trend. Zigzag (A) and double zigzag (C) are sharp corrections because their Wave C legs are five-wave impulses that move price significantly in the corrective direction. The sharp vs. sideways distinction is important for applying the guideline of alternation.", "expTh": "Regular Flat (B) และ Contracting Triangle (D) จัดเป็น sideways correction เพราะเคลื่อนราคาไปขัดกับแนวโน้มก่อนหน้าไม่มากนัก ส่วน Zigzag (A) และ Double Zigzag (C) เป็น sharp correction เพราะ Wave C เป็น 5-wave impulse ที่เคลื่อนราคาขัดแนวโน้มอย่างมีนัยสำคัญ การแยก sharp vs. sideways สำคัญต่อการใช้ guideline of alternation"}, {"id": "v3q03", "text": "Which THREE of the following correctly describe characteristics of a contracting triangle? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Each of the five waves (A through E) subdivides internally into a three-wave structure"}, {"id": "b", "letter": "B", "text": "The trendlines connecting the wave extremes converge progressively toward an apex"}, {"id": "c", "letter": "C", "text": "Contracting triangles always and exclusively appear in Wave 2 position within an impulse"}, {"id": "d", "letter": "D", "text": "The thrust that follows the triangle's completion often approximates the maximum width of the triangle"}], "correct": ["a", "b", "d"], "expEn": "A, B, and D are correct. Each of the five waves of a contracting triangle is a three-wave corrective structure (A), the trendlines converge (B), and the post-triangle thrust approximates the triangle's maximum width (D). C is incorrect — contracting triangles most commonly appear in Wave 4, Wave B, or Wave X positions; they do NOT typically appear in Wave 2, which tends to be a sharp correction (zigzag).", "expTh": "A, B และ D ถูกต้อง แต่ละคลื่น (A-E) ของ Contracting Triangle แบ่งย่อยเป็น 3-wave (A) เส้น trendline ลู่เข้าหากัน (B) และ thrust หลัง triangle มักเท่ากับความกว้างสูงสุด (D) ตัวเลือก C ผิดเพราะ Contracting Triangle มักปรากฏใน Wave 4, Wave B หรือ Wave X ไม่ได้ปรากฏใน Wave 2 ซึ่งมักเป็น sharp correction (zigzag)"}, {"id": "v3q04", "text": "Which TWO of the following are TRUE about Wave 5 in a standard impulse where Wave 3 was the extended wave? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Wave 5 must always be longer than Wave 3 to complete the impulse"}, {"id": "b", "letter": "B", "text": "Wave 5 tends toward equality with Wave 1 in price length (rule of equality)"}, {"id": "c", "letter": "C", "text": "Wave 5 may be shorter than, equal to, or only slightly longer than Wave 1 in many cases"}, {"id": "d", "letter": "D", "text": "Wave 5 must always exceed the price extreme of Wave 3 or the impulse is invalid"}], "correct": ["b", "c"], "expEn": "B and C are correct. When Wave 3 is extended, Waves 1 and 5 tend toward equality (rule of equality, B). Therefore, Wave 5 is often shorter than, equal to, or only slightly longer than Wave 1 (C). A is incorrect — Wave 5 being longer than the extended Wave 3 is extremely rare. D is incorrect — Wave 5 can truncate (fail to exceed Wave 3) and still be a valid impulse, though this is a signal of weakness.", "expTh": "B และ C ถูกต้อง เมื่อ Wave 3 extend แล้ว Waves 1 และ 5 มักเท่ากัน (rule of equality, B) ดังนั้น Wave 5 มักสั้นกว่า เท่ากับ หรือยาวกว่าเล็กน้อยเมื่อเทียบกับ Wave 1 (C) ตัวเลือก A ผิดเพราะ Wave 5 ที่ยาวกว่า Wave 3 ที่ extend แล้วพบได้น้อยมาก D ผิดเพราะ Wave 5 อาจ truncate (ไม่เกิน Wave 3) และยังเป็น impulse ที่ถูกต้อง แต่เป็นสัญญาณของความอ่อนแอ"}, {"id": "v3q05", "text": "Which THREE of the following statements correctly describe the role of the Fibonacci sequence in Elliott Wave Theory? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Fibonacci ratios (0.382, 0.500, 0.618, 1.618, 2.618, etc.) are used for both retracement and price extension projections"}, {"id": "b", "letter": "B", "text": "The ratio of any Fibonacci number to the next larger number in the sequence converges toward 0.618"}, {"id": "c", "letter": "C", "text": "Elliott recognized the Fibonacci sequence as the mathematical foundation underlying the Wave Principle"}, {"id": "d", "letter": "D", "text": "Fibonacci time analysis provides more reliable and precise market timing signals than Fibonacci price analysis"}], "correct": ["a", "b", "c"], "expEn": "A, B, and C are correct. Fibonacci ratios are fundamental to Elliott Wave price projection (A). The mathematical convergence of Fibonacci number ratios to 0.618 and 1.618 is well established (B). Elliott explicitly acknowledged the Fibonacci sequence as the basis of market wave structure (C). D is incorrect — Frost and Prechter note that Fibonacci time analysis is considered less reliable than Fibonacci price analysis; price targets are more consistently validated.", "expTh": "A, B และ C ถูกต้อง Fibonacci ratio เป็นพื้นฐานในการ project ราคา Elliott Wave (A) การลู่เข้าของอัตราส่วนตัวเลข Fibonacci ไปที่ 0.618 และ 1.618 เป็นที่ยืนยันแล้ว (B) Elliott ยอมรับว่า Fibonacci เป็นพื้นฐานทางคณิตศาสตร์ของโครงสร้างคลื่นตลาด (C) ตัวเลือก D ผิดเพราะ Frost และ Prechter ระบุว่า Fibonacci time analysis มีความน่าเชื่อถือน้อยกว่า Fibonacci price analysis"}, {"id": "v3q06", "text": "Which TWO of the following are VALID positions where a leading diagonal can appear, according to Elliott Wave Principle? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Wave 1 of an impulse wave"}, {"id": "b", "letter": "B", "text": "Wave 3 of an impulse wave"}, {"id": "c", "letter": "C", "text": "Wave 5 of an impulse wave"}, {"id": "d", "letter": "D", "text": "Wave A of a zigzag correction"}], "correct": ["a", "d"], "expEn": "Leading diagonals appear only in first-wave positions (A and D): Wave 1 of an impulse or Wave A of a zigzag. These are the beginning waves of new trend directions. Ending diagonals (not leading) appear in terminal positions: Wave 5 of an impulse or Wave C of a correction. Wave 3 (B) can never be a diagonal of any type. Wave 5 (C) is the position for ending diagonals, not leading diagonals.", "expTh": "Leading diagonal ปรากฏเฉพาะในตำแหน่ง wave แรก (A และ D): Wave 1 ของ impulse หรือ Wave A ของ zigzag เป็นจุดเริ่มต้นของแนวโน้มใหม่ Ending diagonal (ไม่ใช่ leading) ปรากฏในตำแหน่งท้าย: Wave 5 ของ impulse หรือ Wave C ของ correction Wave 3 (B) ไม่สามารถเป็น diagonal ประเภทใดได้ Wave 5 (C) เป็นตำแหน่งของ ending diagonal ไม่ใช่ leading"}, {"id": "v3q07", "text": "Which THREE of the following are hallmark characteristics of Wave 3 in a typical bull market impulse? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Below-average volume due to lingering investor skepticism about the trend"}, {"id": "b", "letter": "B", "text": "Often the longest and strongest wave, frequently 1.618× or more times Wave 1"}, {"id": "c", "letter": "C", "text": "Momentum oscillators (RSI, MACD, etc.) typically reach their highest readings during Wave 3"}, {"id": "d", "letter": "D", "text": "Price gaps (runaway gaps) are common as the market accelerates during Wave 3"}], "correct": ["b", "c", "d"], "expEn": "B, C, and D correctly describe Wave 3. It is typically the longest and most powerful wave (B), momentum indicators peak during Wave 3 (C), and breakaway/runaway price gaps frequently occur as Wave 3 accelerates (D). A is incorrect — Wave 3 is characterized by ABOVE-average or peak volume as widespread participation develops. Below-average volume and investor skepticism describe Wave 1, not Wave 3.", "expTh": "B, C และ D อธิบาย Wave 3 ได้ถูกต้อง Wave 3 มักยาวและแข็งแกร่งที่สุด (B) momentum indicators พีคใน Wave 3 (C) และ price gap มักเกิดบ่อยเมื่อ Wave 3 เร่งตัว (D) ตัวเลือก A ผิดเพราะ Wave 3 มี volume สูงกว่าค่าเฉลี่ยหรือพีค ไม่ใช่ต่ำ Volume ต่ำและความสงสัยเป็นลักษณะของ Wave 1 ไม่ใช่ Wave 3"}, {"id": "v3q08", "text": "Which TWO of the following correctly describe differences between a REGULAR flat and an EXPANDED flat? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "In an expanded flat, Wave B retraces more than 100% of Wave A; in a regular flat, Wave B retraces approximately 100% of Wave A"}, {"id": "b", "letter": "B", "text": "A regular flat has a 3-3-5 internal structure while an expanded flat has a 5-3-5 internal structure"}, {"id": "c", "letter": "C", "text": "In an expanded flat, Wave C typically extends beyond the price extreme of Wave A; in a regular flat, Wave C approximately reaches the end of Wave A"}, {"id": "d", "letter": "D", "text": "An expanded flat always takes significantly longer in time to complete than a regular flat"}], "correct": ["a", "c"], "expEn": "A and C are correct. The key differences: Wave B exceeds 100% of Wave A in an expanded flat vs. approximately 100% in a regular flat (A); Wave C extends beyond Wave A's end in an expanded flat vs. reaching approximately Wave A's end in a regular flat (C). B is incorrect — BOTH flat types share the 3-3-5 internal structure; the difference is in wave proportions, not internal structure. D is incorrect — time duration is not a defining criterion for either type.", "expTh": "A และ C ถูกต้อง ความแตกต่างหลัก: Wave B เกิน 100% ของ Wave A ใน Expanded Flat เทียบกับ ~100% ใน Regular Flat (A) Wave C เกิน end ของ Wave A ใน Expanded Flat เทียบกับถึงประมาณ end ของ Wave A ใน Regular Flat (C) ตัวเลือก B ผิดเพราะทั้งสองประเภทมีโครงสร้าง 3-3-5 เหมือนกัน ต่างกันที่สัดส่วน ไม่ใช่โครงสร้าง D ผิดเพราะระยะเวลาไม่ใช่เกณฑ์กำหนด"}, {"id": "v3q09", "text": "Which THREE of the following statements about wave degrees are CORRECT? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Wave degrees define the relative size and importance of waves within the market's overall structure"}, {"id": "b", "letter": "B", "text": "All five waves (1, 2, 3, 4, 5) within a single impulse are assigned the same wave degree"}, {"id": "c", "letter": "C", "text": "The Minute degree is larger (higher) than the Primary degree in the EWI hierarchy"}, {"id": "d", "letter": "D", "text": "A complete five-wave impulse at any degree becomes a single motive wave (labeled Wave 1 or Wave 3 or Wave 5) at the next higher degree"}], "correct": ["a", "b", "d"], "expEn": "A, B, and D are correct. Wave degrees assign relative size and importance (A). All five waves within one impulse share the same degree (B). A complete five-wave impulse at one degree is labeled as a single wave at the next higher degree — it becomes a Wave 1, 3, 5, A, or C at the higher level (D). C is incorrect — the EWI hierarchy goes from larger to smaller: Primary → Intermediate → Minor → Minute. The Minute degree is SMALLER than Primary, not larger.", "expTh": "A, B และ D ถูกต้อง Wave degree กำหนดขนาดและความสำคัญสัมพัทธ์ (A) คลื่นทั้ง 5 ใน impulse เดียวกันอยู่ใน degree เดียวกัน (B) impulse 5-wave ที่สมบูรณ์ใน degree หนึ่งกลายเป็น wave เดียวใน degree ที่สูงกว่า (D) ตัวเลือก C ผิดเพราะลำดับ EWI จากใหญ่ไปเล็ก: Primary → Intermediate → Minor → Minute ดังนั้น Minute degree เล็กกว่า Primary ไม่ใช่ใหญ่กว่า"}, {"id": "v3q10", "text": "Which TWO of the following statements about the guideline of alternation are CORRECT? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Alternation applies only to Waves 2 and 4 within a single impulse and has no other application in Elliott Wave analysis"}, {"id": "b", "letter": "B", "text": "If Wave 2 retraces 61.8%, then alternation requires Wave 4 to retrace exactly 38.2%"}, {"id": "c", "letter": "C", "text": "Alternation is a guideline describing tendencies, not a mandatory rule — it will not always hold"}, {"id": "d", "letter": "D", "text": "Alternation can manifest as differences in structure (e.g., zigzag vs. flat), depth of retracement, and time duration"}], "correct": ["c", "d"], "expEn": "C and D are correct. Alternation is a guideline — a useful predictive tendency, but not a rigid rule (C). It can be observed in multiple dimensions: structural form (zigzag versus flat), depth (deep vs. shallow retracement), and time duration (brief vs. extended) (D). A is too restrictive — alternation can apply across degrees and in other contexts. B imposes a false requirement for exact Fibonacci percentages; alternation is about relative form and depth differences, not precise numerical matching.", "expTh": "C และ D ถูกต้อง Alternation เป็น guideline — แนวโน้มที่มีประโยชน์ แต่ไม่ใช่กฎแข็ง (C) สามารถสังเกตได้ในหลายมิติ: รูปแบบโครงสร้าง (zigzag vs flat), ความลึกของ retracement (ลึก vs ตื้น) และระยะเวลา (สั้น vs ยาว) (D) ตัวเลือก A จำกัดเกินไปเพราะ alternation ใช้ได้กว้างกว่า B กำหนดเปอร์เซ็นต์ Fibonacci ตายตัวซึ่งผิด alternation เกี่ยวกับรูปแบบสัมพัทธ์ ไม่ใช่ตัวเลขแม่นยำ"}, {"id": "v3q11", "text": "Which THREE of the following are TRUE about a truncated fifth wave (failed fifth)? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "A truncated fifth always signals an immediate 100% reversal of the entire preceding impulse wave"}, {"id": "b", "letter": "B", "text": "Despite not exceeding Wave 3's price extreme, the truncated Wave 5 still has a valid five-wave internal sub-structure"}, {"id": "c", "letter": "C", "text": "Truncations are more commonly observed following an exceptionally powerful and extended Wave 3"}, {"id": "d", "letter": "D", "text": "A truncated fifth wave often warns of a significant and powerful counter-trend reversal that follows the impulse completion"}], "correct": ["b", "c", "d"], "expEn": "B, C, and D are correct. A truncated Wave 5 must still have a valid five-wave internal structure (B). Truncations tend to occur after extreme Wave 3 extensions because the market has exhausted itself prematurely (C). They warn of significant reversals ahead (D). A is an overstatement — truncations indicate weakness and warn of reversals, but they do not guarantee a 100% retracement of the entire impulse. The subsequent correction may or may not retrace 100%.", "expTh": "B, C และ D ถูกต้อง Wave 5 ที่ truncated ยังต้องมี 5 sub-wave ภายในที่ถูกต้อง (B) Truncation มักเกิดหลัง Wave 3 ที่รุนแรงและ extend มากเพราะตลาดหมดแรงก่อนเวลา (C) และเตือนถึงการกลับตัวครั้งใหญ่ที่กำลังจะมา (D) ตัวเลือก A กล่าวเกินจริง truncation บ่งบอกถึงความอ่อนแอแต่ไม่รับประกันว่า correction ที่ตามมาจะ retrace 100% เสมอ"}, {"id": "v3q12", "text": "Which TWO of the following correctly describe Fibonacci price projections for Wave 3 targets? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "The most common Wave 3 projection is 1.618 × Wave 1, measured from the end of Wave 2"}, {"id": "b", "letter": "B", "text": "In cases of strong extension, Wave 3 may reach 2.618 or even 4.236 times Wave 1"}, {"id": "c", "letter": "C", "text": "Fibonacci projection levels for Wave 3 are guaranteed targets that price must reach"}, {"id": "d", "letter": "D", "text": "The most common Wave 3 projection is 0.618 × Wave 1, making Wave 3 shorter than Wave 1"}], "correct": ["a", "b"], "expEn": "A and B are correct. The most common projection for Wave 3 is 1.618 × Wave 1 (A), and in strong extension scenarios Wave 3 can be 2.618 or 4.236 times Wave 1 (B). C is incorrect — Fibonacci projections are probability zones and guidelines, not guaranteed exact targets. D is incorrect — a projection of 0.618 × Wave 1 would make Wave 3 shorter than Wave 1; if Wave 5 is also normal length, Wave 3 might become the shortest wave, violating the cardinal rule.", "expTh": "A และ B ถูกต้อง การ project Wave 3 ที่พบบ่อยที่สุดคือ 1.618 × Wave 1 (A) และในกรณี extension รุนแรง Wave 3 อาจเป็น 2.618 หรือ 4.236 เท่า (B) ตัวเลือก C ผิดเพราะ Fibonacci projection เป็นโซนความน่าจะเป็น ไม่ใช่การรับประกัน D ผิดเพราะ 0.618 × Wave 1 จะทำให้ Wave 3 สั้นกว่า Wave 1 ซึ่งอาจละเมิดกฎเหล็กได้"}, {"id": "v3q13", "text": "Which THREE of the following are valid methods to help identify the likely END of an Elliott Wave 5? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Price reaching the upper boundary of the parallel Elliott channel drawn through the impulse's wave extremes"}, {"id": "b", "letter": "B", "text": "Wave 5 must be exactly 2.618 × Wave 3 to signal its completion"}, {"id": "c", "letter": "C", "text": "Bearish divergence in momentum oscillators (e.g., RSI or MACD) during Wave 5's price advance"}, {"id": "d", "letter": "D", "text": "Price reaching a Fibonacci extension target such as 100% or 161.8% of the Wave 1-through-3 net distance, added to the Wave 4 low"}], "correct": ["a", "c", "d"], "expEn": "A, C, and D are valid Wave 5 identification methods. Price reaching the upper Elliott channel line (A), negative momentum divergence (C), and hitting Fibonacci extension targets (D) are all practical tools for anticipating the wave 5 end. B is incorrect — there is no rule stating Wave 5 must be exactly 2.618 × Wave 3. Such a rigid requirement does not exist in Elliott Wave literature; Wave 5 targets are calculated from Fibonacci projections off Wave 4 lows, not as a fixed multiple of Wave 3.", "expTh": "A, C และ D เป็นวิธีที่ถูกต้องในการระบุจุดสิ้นสุด Wave 5 ราคาถึง upper Elliott channel (A) divergence ของ momentum เชิงลบ (C) และถึง Fibonacci extension target (D) ล้วนเป็นเครื่องมือที่ใช้ได้จริง ตัวเลือก B ผิดเพราะไม่มีกฎระบุว่า Wave 5 ต้องเป็น 2.618 × Wave 3 ข้อกำหนดตายตัวแบบนี้ไม่มีในตำรา Elliott Wave เป้าหมาย Wave 5 คำนวณจาก Fibonacci projection จาก low ของ Wave 4"}, {"id": "v3q14", "text": "Which TWO of the following scenarios would require an analyst to INVALIDATE an impulse wave count and seek a different interpretation? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Wave 4 retracing 38.2% of Wave 3 with absolutely no overlap into Wave 1's price territory"}, {"id": "b", "letter": "B", "text": "Wave 4 overlapping into Wave 1's price territory in a cash spot market with no leverage"}, {"id": "c", "letter": "C", "text": "Wave 5 being shorter than Wave 3 and approximately equal in length to Wave 1"}, {"id": "d", "letter": "D", "text": "Wave 2 retracing 100% of Wave 1, returning exactly to Wave 1's origin price"}], "correct": ["b", "d"], "expEn": "B and D violate cardinal rules and require count invalidation. Wave 4 overlapping Wave 1 (B) violates the cardinal overlap rule; unless it is a diagonal, the impulse count is invalid. Wave 2 retracing 100% of Wave 1 (D) violates the cardinal rule that Wave 2 never retraces 100% of Wave 1. A is perfectly acceptable — 38.2% retracement with no overlap is a common, valid Wave 4. C is also acceptable and confirms the rule of equality (Waves 1 and 5 equal when Wave 3 is extended).", "expTh": "B และ D ละเมิดกฎเหล็กและต้องยกเลิก wave count Wave 4 overlap Wave 1 (B) ละเมิดกฎ overlap เว้นแต่จะเป็น diagonal Wave 2 retrace 100% ของ Wave 1 (D) ละเมิดกฎเหล็กที่ว่า Wave 2 ห้าม retrace 100% ตัวเลือก A ยอมรับได้สมบูรณ์ — 38.2% retracement ไม่มี overlap เป็น Wave 4 ที่พบบ่อยและถูกต้อง C ก็ยอมรับได้และยืนยัน rule of equality (Wave 1 = Wave 5 เมื่อ Wave 3 extend)"}, {"id": "v3q15", "text": "Which THREE of the following correctly describe wave personality as stated in Frost and Prechter's Elliott Wave Principle? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "Wave 1 is often subtle and mistaken for a corrective bounce in an ongoing downtrend by most market participants"}, {"id": "b", "letter": "B", "text": "Wave 3 generates widespread public recognition, strong fundamental confirmation, and the broadest market participation"}, {"id": "c", "letter": "C", "text": "Wave 5 is driven by speculation and optimism, but commonly features waning market breadth and negative momentum divergences"}, {"id": "d", "letter": "D", "text": "Wave 2 always retraces less than 50% of Wave 1, reflecting only mild corrective pressure"}], "correct": ["a", "b", "c"], "expEn": "A, B, and C correctly describe wave personality. Wave 1 is early and unrecognized (A). Wave 3 is the broadly recognized, fundamental-confirming phase (B). Wave 5 is speculative with technical deterioration (C). D is incorrect — Wave 2 commonly retraces between 50% and 78.6% of Wave 1, often deeply. There is no rule limiting Wave 2 to below 50%; in fact, deep Wave 2 retracements are quite common and expected.", "expTh": "A, B และ C อธิบาย wave personality ได้ถูกต้อง Wave 1 เริ่มต้นเงียบๆ และถูกมองข้าม (A) Wave 3 เป็นช่วงที่ได้รับการยอมรับกว้างขวาง fundamentals ยืนยัน การมีส่วนร่วมสูงสุด (B) Wave 5 ขับเคลื่อนด้วยการเก็งกำไรและ breadth แคบลง (C) ตัวเลือก D ผิดเพราะ Wave 2 มักย้อนกลับ 50% ถึง 78.6% ของ Wave 1 ซึ่งลึกมากได้ ไม่มีกฎจำกัด Wave 2 ไว้ที่ต่ำกว่า 50%"}, {"id": "v3q16", "text": "Which THREE of the following statements about complex corrections (combinations) are CORRECT? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "A double three (W-X-Y) consists of two corrective patterns connected by an intervening X wave"}, {"id": "b", "letter": "B", "text": "In a triple three, the same corrective pattern (e.g., three flats) must repeat identically three times"}, {"id": "c", "letter": "C", "text": "Complex corrections typically develop when the market needs extended sideways consolidation without a major directional price retrace"}, {"id": "d", "letter": "D", "text": "The X wave in a combination is itself a corrective pattern that serves as a connector, typically smaller than W or Y"}], "correct": ["a", "c", "d"], "expEn": "A, C, and D are correct. A double three is W-X-Y with X as the connector (A). Complex corrections allow for prolonged sideways movement without deep retracement, serving as an extended consolidation (C). The X wave is a smaller corrective pattern connecting W and Y (D). B is incorrect — in a triple three (W-X-Y-X-Z), the three main corrections (W, Y, Z) do NOT need to be the same pattern; they can be different types (e.g., zigzag-flat-triangle is acceptable).", "expTh": "A, C และ D ถูกต้อง Double three คือ W-X-Y โดย X เป็น connector (A) Complex correction ช่วยให้ตลาด consolidate แนวข้างนานขึ้นโดยไม่ต้องย้อนกลับลึก (C) X wave เป็น corrective pattern ขนาดเล็กที่เชื่อม W และ Y (D) ตัวเลือก B ผิดเพราะใน Triple Three (W-X-Y-X-Z) main corrections (W, Y, Z) ไม่จำเป็นต้องเป็น pattern เดียวกัน สามารถเป็นประเภทต่างกันได้"}, {"id": "v3q17", "text": "Which TWO of the following correctly describe throw-overs in Elliott Wave analysis? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "A throw-over occurs at the end of Wave 2, marking the definitive resumption of the main trend"}, {"id": "b", "letter": "B", "text": "A throw-over is a brief penetration of a bounding trendline that is quickly reversed, most commonly occurring at Wave 5 completions and ending diagonal completions"}, {"id": "c", "letter": "C", "text": "A throw-over confirms that the current wave is about to enter a powerful acceleration phase that will continue much further"}, {"id": "d", "letter": "D", "text": "In an ending diagonal, a throw-over above the upper trendline of the wedge typically precedes a sharp and significant downward reversal"}], "correct": ["b", "d"], "expEn": "B and D are correct. A throw-over is defined as a brief trendline penetration quickly reversed (B), and in ending diagonals specifically, an upward throw-over above the upper boundary reliably signals the coming sharp reversal (D). A is incorrect — throw-overs appear at the END of impulse waves or diagonals, not at Wave 2's end. C is incorrect — throw-overs signal exhaustion and impending reversal, the opposite of acceleration.", "expTh": "B และ D ถูกต้อง Throw-over คือการทะลุเส้น trendline ชั่วคราวแล้วย้อนกลับอย่างรวดเร็ว (B) และใน Ending Diagonal การ throw-over เหนือเส้นบนเป็นสัญญาณที่น่าเชื่อถือของการกลับตัวที่รุนแรงที่จะมาถึง (D) ตัวเลือก A ผิดเพราะ throw-over เกิดที่ปลาย impulse หรือ diagonal ไม่ใช่ท้าย Wave 2 C ผิดเพราะ throw-over เป็นสัญญาณ exhaustion และการกลับตัว ตรงข้ามกับการเร่งตัว"}, {"id": "v3q18", "text": "Which THREE of the following are key distinguishing features of an ENDING diagonal triangle? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "All five sub-waves (Waves 1 through 5) of the ending diagonal subdivide into three-wave structures"}, {"id": "b", "letter": "B", "text": "Waves 1 and 4 overlap in price territory"}, {"id": "c", "letter": "C", "text": "The bounding trendlines converge toward an apex (in a standard contracting ending diagonal)"}, {"id": "d", "letter": "D", "text": "Ending diagonals can validly appear in Wave 3 position of an impulse"}], "correct": ["a", "b", "c"], "expEn": "A, B, and C are the defining features of an ending diagonal. All sub-waves are three-wave structures (A), Waves 1 and 4 overlap (B), and the trendlines converge (C) in a standard contracting version. D is incorrect — ending diagonals appear ONLY in terminal positions: Wave 5 of an impulse or Wave C of a correction. They NEVER appear in Wave 3, which is a motive wave that cannot contain a diagonal.", "expTh": "A, B และ C คือลักษณะที่กำหนด Ending Diagonal ทุก sub-wave เป็น 3-wave structure (A), Wave 1 และ Wave 4 overlap กัน (B) และเส้น trendline ลู่เข้าหากัน (C) ตัวเลือก D ผิดเพราะ Ending Diagonal ปรากฏเฉพาะในตำแหน่ง terminal: Wave 5 ของ impulse หรือ Wave C ของ correction ไม่เคยปรากฏใน Wave 3 ซึ่งเป็น motive wave"}, {"id": "v3q19", "text": "Which TWO of the following correctly describe the application of the Elliott channeling technique to impulse wave analysis? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "After Wave 3 completes, the upper channel boundary is drawn connecting the ends of Waves 1 and 3, with the lower boundary drawn parallel through the end of Wave 2"}, {"id": "b", "letter": "B", "text": "The channel must be completely redrawn from scratch after each and every sub-wave to remain valid"}, {"id": "c", "letter": "C", "text": "Wave 4 must always terminate exactly on the lower channel line — any deviation means the count is wrong"}, {"id": "d", "letter": "D", "text": "After Wave 4 completes, the final channel refinement draws the lower boundary through the ends of Waves 2 and 4, with the upper parallel through Wave 3's end to project where Wave 5 may terminate"}], "correct": ["a", "d"], "expEn": "A and D are correct. After Wave 3 is confirmed, the analyst connects Waves 1 and 3 on top and uses Wave 2 as the lower reference (A). After Wave 4, the final refinement uses Waves 2 and 4 for the lower boundary and Wave 3 for the upper — projecting Wave 5's likely terminus (D). B is unnecessary — the channel is refined at key completion points (after Wave 2, after Wave 3, after Wave 4), not after every sub-wave. C is incorrect — Wave 4 may end near but not necessarily exactly on the lower line; deviation is common.", "expTh": "A และ D ถูกต้อง หลัง Wave 3 สมบูรณ์ นักวิเคราะห์เชื่อม Waves 1 และ 3 ด้านบน ใช้ Wave 2 เป็นจุดอ้างอิงล่าง (A) หลัง Wave 4 สมบูรณ์ ปรับสุดท้ายโดยใช้ Waves 2 และ 4 เป็น lower boundary และ Wave 3 เป็น upper — project จุดสิ้นสุดของ Wave 5 (D) ตัวเลือก B ไม่จำเป็น channel ปรับที่จุดสำคัญ ไม่ใช่หลังทุก sub-wave C ผิดเพราะ Wave 4 อาจสิ้นสุดใกล้แต่ไม่จำเป็นต้องอยู่บน lower line พอดี"}, {"id": "v3q20", "text": "Which THREE of the following correctly describe the fractal (self-similar) degree-nesting concept in Elliott Wave Theory? Select all that apply.", "choices": [{"id": "a", "letter": "A", "text": "A wave at the Cycle degree is subdivided downward only into Grand Supercycle degree waves"}, {"id": "b", "letter": "B", "text": "Every complete five-wave impulse at any degree becomes a single motive wave (Wave 1, 3, or 5) at the next higher degree"}, {"id": "c", "letter": "C", "text": "Every A-B-C corrective pattern at any degree occupies the position of a Wave 2 or Wave 4 at the next higher degree"}, {"id": "d", "letter": "D", "text": "Waves at all degrees coexist simultaneously in the price action, creating a self-similar (fractal) structure that repeats across all timeframes"}], "correct": ["b", "c", "d"], "expEn": "B, C, and D are correct. Each complete five-wave impulse at any degree becomes a single motive wave at the next higher degree (B). Every A-B-C correction at one degree fills a Wave 2 or Wave 4 slot at the next higher degree (C). All degrees exist simultaneously in a fractal structure (D). A is incorrect — Cycle degree waves subdivide DOWNWARD into Primary degree waves (not Grand Supercycle, which is ABOVE Cycle). Degrees always nest downward from larger to smaller, not upward.", "expTh": "B, C และ D ถูกต้อง impulse 5-wave ที่สมบูรณ์ใน degree ใดก็กลายเป็น motive wave เดียวใน degree สูงกว่า (B) A-B-C correction ใน degree หนึ่งอยู่ในตำแหน่ง Wave 2 หรือ Wave 4 ใน degree สูงกว่า (C) ทุก degree อยู่พร้อมกันใน fractal structure (D) ตัวเลือก A ผิดเพราะ Cycle degree แบ่งย่อยลงไปเป็น Primary degree (ไม่ใช่ Grand Supercycle ซึ่งอยู่เหนือ Cycle) degree เสมอ nest ลงไป ไม่ใช่ขึ้น"}]}];

    d.innerHTML='<div class="vc-lbl">'+v.label+'</div>'
      +'<div class="vc-title">'+v.title+'</div>'
      +'<div class="vc-meta"><span>'+v.bank.length+' Questions</span><span>'+v.time+' min</span><span>'+typeLabel+'</span></div>'
      +'<div class="vc-topics">'+topicsHtml+'</div>';
    c.appendChild(d);
  });
})();

function selV(i){
  S.vi=i;
  document.querySelectorAll('.vc').forEach((c,j)=>c.classList.toggle('active',j===i));
}

function toggleShuffle(){
  S.shuf=!S.shuf;
  const b=document.getElementById('bshuf');
  b.textContent='⟳ SHUFFLE: '+(S.shuf?'ON':'OFF');
  b.classList.toggle('on',S.shuf);
}

/* FISHER-YATES + DEEP CLONE */
function fy(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function dc(bank){return bank.map(q=>({...q,choices:q.choices.map(c=>({...c})),correct:[...q.correct]}))}

/* START */
function startExam(){
  const v=DATA[S.vi];
  let b=dc(v.bank);
  if(S.shuf){b=fy(b);b=b.map(q=>({...q,choices:fy(q.choices)}))}
  S.qs=b;S.cur=0;S.ans={};S.tl=v.time*60;
  showS('QS');renderQ();startTmr();
}

function showS(id){['LS','QS','RS'].forEach(s=>document.getElementById(s).style.display=s===id?'flex':'none')}

/* TIMER */
function startTmr(){
  if(S.tmr)clearInterval(S.tmr);
  rendTmr();
  S.tmr=setInterval(()=>{S.tl=Math.max(0,S.tl-1);rendTmr();if(S.tl===0){clearInterval(S.tmr);submitExam(true)}},1000);
}
function rendTmr(){
  const m=Math.floor(S.tl/60),s=S.tl%60;
  const el=document.getElementById('qtmr');
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.classList.toggle('warn',S.tl<=300);
}

/* RENDER QUESTION */
function renderQ(){
  const v=DATA[S.vi],q=S.qs[S.cur],tot=S.qs.length,multi=v.type==='multi';
  const ansc=Object.keys(S.ans).length;
  document.getElementById('qhlbl').textContent=v.label;
  document.getElementById('qptxt').textContent='Q'+(S.cur+1)+'/'+tot;
  document.getElementById('pfill').style.width=((S.cur+1)/tot*100)+'%';
  document.getElementById('qsub').textContent=multi
    ?'Select ALL correct answers — เลือกคำตอบที่ถูกต้องทั้งหมด'
    :'Select the best answer — เลือกคำตอบที่ดีที่สุด';
  document.getElementById('qtext').textContent=q.text;
  document.getElementById('anscnt').textContent=ansc+'/'+tot+' answered';
  document.getElementById('bprev').disabled=S.cur===0;
  document.getElementById('bnext').style.display=S.cur<tot-1?'':'none';
  document.getElementById('bsub').style.display=S.cur===tot-1?'':'none';
  const sel=S.ans[q.id]||[];
  const cw=document.getElementById('choiceswrap');
  cw.innerHTML='';
  q.choices.forEach(ch=>{
    const lbl=document.createElement('label');
    lbl.className='choice-item'+(sel.includes(ch.id)?' sel':'');
    const inp=document.createElement('input');
    inp.type=multi?'checkbox':'radio';inp.name='q';inp.value=ch.id;inp.checked=sel.includes(ch.id);
    inp.onchange=()=>recAns(q.id,ch.id,multi);
    const lt=document.createElement('span');lt.className='choice-ltr';lt.textContent=ch.letter;
    const tx=document.createElement('span');tx.className='choice-txt';tx.textContent=ch.text;
    lbl.appendChild(inp);lbl.appendChild(lt);lbl.appendChild(tx);
    cw.appendChild(lbl);
  });
  window.scrollTo(0,0);
}

function recAns(qid,cid,multi){
  if(multi){
    let cur=S.ans[qid]?[...S.ans[qid]]:[];
    const i=cur.indexOf(cid);
    if(i>=0)cur.splice(i,1);else cur.push(cid);
    if(cur.length===0)delete S.ans[qid];else S.ans[qid]=cur;
  }else{S.ans[qid]=[cid]}
  renderQ();
}

function prevQ(){if(S.cur>0){S.cur--;renderQ()}}
function nextQ(){if(S.cur<S.qs.length-1){S.cur++;renderQ()}}

/* SUBMIT */
function submitExam(auto){
  const tot=S.qs.length,ansc=Object.keys(S.ans).length;
  if(!auto&&ansc<tot&&!confirm((tot-ansc)+' question(s) unanswered. Submit anyway?'))return;
  if(S.tmr)clearInterval(S.tmr);
  let cor=0;
  S.qs.forEach(q=>{
    const g=(S.ans[q.id]||[]).slice().sort();
    const e=q.correct.slice().sort();
    if(JSON.stringify(g)===JSON.stringify(e))cor++;
  });
  renderResults(cor,S.qs.length);
}

/* RESULTS */
function renderResults(cor,tot){
  const v=DATA[S.vi],pct=cor/tot*100;
  const grade=pct>=90?'CEWA MASTER':pct>=80?'PASS':'FAIL';
  const gc=pct>=90?'var(--lime)':pct>=80?'var(--green)':'var(--red)';
  showS('RS');
  document.getElementById('rpct').textContent=pct.toFixed(1)+'%';
  document.getElementById('rscor').textContent=cor;
  document.getElementById('rstot').textContent=tot;
  document.getElementById('rsvar').textContent=v.label;
  const gb=document.getElementById('gbadge');
  gb.textContent=grade;gb.style.color=gc;gb.style.borderColor=gc;
  const msgs={'CEWA MASTER':'Exceptional — CEWA Master level achieved!','PASS':'Passed — solid command of Elliott Wave Theory.','FAIL':'Not yet — review explanations below and retake.'};
  document.getElementById('gmsg').textContent=msgs[grade];
  const C=2*Math.PI*54;
  const rf=document.getElementById('ringfill');
  rf.style.strokeDasharray=C;rf.style.strokeDashoffset=C;rf.style.stroke=gc;
  setTimeout(()=>{rf.style.transition='stroke-dashoffset 1.2s ease-out';rf.style.strokeDashoffset=C*(1-pct/100)},80);
  const rc=document.getElementById('revcon');
  rc.innerHTML='';
  S.qs.forEach((q,idx)=>{
    const g=(S.ans[q.id]||[]).slice().sort();
    const e=q.correct.slice().sort();
    const ok=JSON.stringify(g)===JSON.stringify(e);
    const div=document.createElement('div');
    div.className='rev-item '+(ok?'ok':'ng');
    div.dataset.en=q.expEn;div.dataset.th=q.expTh;
    let chHtml='';
    q.choices.forEach(c=>{
      const isE=e.includes(c.id),isG=g.includes(c.id);
      let cls='',mk='&middot;';
      if(isE&&isG){cls='c-ok';mk='&#9679;'}
      else if(isE){cls='c-yes';mk='&#9675;'}
      else if(isG){cls='c-no';mk='&#10005;'}
      chHtml+='<div class="rch '+cls+'"><span class="rch-mk">'+mk+'</span><span class="rch-lt">'+c.letter+'</span><span class="rch-tx">'+c.text+'</span></div>';
    });
    div.innerHTML='<div class="rev-hdr">'
      +'<span class="rev-qn">Q'+(idx+1)+'</span>'
      +'<span class="rev-st" style="color:'+(ok?'var(--green)':'var(--red)')+'">'+(ok?'&#10003; Correct':'&#10007; Incorrect')+'</span>'
      +'</div>'
      +'<p class="rev-qt">'+q.text+'</p>'
      +'<div class="rev-ch">'+chHtml+'</div>'
      +'<div class="rev-exp">'
        +'<div class="lang-tg">'
          +'<button class="lang-btn act" data-lang="en" onclick="setLang(this)">EN</button>'
          +'<button class="lang-btn" data-lang="th" onclick="setLang(this)">TH</button>'
        +'</div>'
        +'<p class="exp-txt">'+q.expEn+'</p>'
      +'</div>';
    rc.appendChild(div);
  });
  window.scrollTo(0,0);
}

function setLang(btn){const lang=btn.dataset.lang;
  const item=btn.closest('.rev-item');
  item.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  item.querySelector('.exp-txt').textContent=lang==='en'?item.dataset.en:item.dataset.th;
}

function goLobby(){showS('LS')}
</script>
</body>
