<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CEWA Mock Exam 10 · SPACEZ Exam Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#111111;--surface:#1a1a1a;--border:#2e2e2e;--lime:#c8f135;--text:#f0f0f0;--muted:#777;--radius:14px;--red:#ff4d4d;--green:#4dff91;--yellow:#ffd84d;--blue:#4d9fff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;min-height:100vh}
.screen{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:0 0 48px}
.inner{width:100%;max-width:600px;padding:0 16px}
/* LOGO */
.logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:2rem;letter-spacing:-.02em;line-height:1}
.logo-s{background:linear-gradient(90deg,#f00,#ff8800,#ff0,#0f0,#08f,#80f,#f00);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rgb 3s linear infinite}
@keyframes rgb{to{background-position:200% center}}
.logo-sub{font-size:.68rem;letter-spacing:.22em;color:var(--muted);margin-top:2px}
/* LOBBY */
.lobby-head{text-align:center;padding:36px 0 20px}
.lobby-desc{font-size:.82rem;color:var(--muted);margin-top:6px}
.variant-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.vc{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:15px 18px;cursor:pointer;transition:border-color .18s,box-shadow .18s}
.vc:hover{border-color:#555}
.vc.active{border-color:var(--lime);box-shadow:0 0 0 1px var(--lime)}
.vc-lbl{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.14em;color:var(--lime);text-transform:uppercase;margin-bottom:3px}
.vc-title{font-weight:600;font-size:.95rem;margin-bottom:6px}
.vc-meta{display:flex;gap:8px;flex-wrap:wrap}
.vc-meta span{font-size:.74rem;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:2px 7px}
.vc-topics{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap}
.vc-topic{font-size:.68rem;color:var(--muted);background:var(--bg);border:1px solid #333;border-radius:4px;padding:1px 6px}
.ctrl-row{display:flex;gap:10px;margin-bottom:12px}
.btn-shuffle{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);padding:10px 14px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.78rem;transition:border-color .18s,color .18s;text-align:center}
.btn-shuffle.on{border-color:var(--lime);color:var(--lime)}
.btn-start{width:100%;background:var(--lime);color:#111;border:none;border-radius:var(--radius);padding:16px;font-weight:700;font-size:.95rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;transition:opacity .15s}
.btn-start:hover{opacity:.88}
/* QUIZ HEADER */
.qhdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:11px 16px;width:100%;max-width:600px}
.qhdr-lbl{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.12em;color:var(--lime);text-transform:uppercase}
.qtimer{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600}
.qtimer.warn{color:var(--red);animation:blink 1s ease-in-out infinite}
@keyframes blink{50%{opacity:.45}}
.qprog-txt{font-size:.78rem;color:var(--muted)}
.prog-track{width:100%;max-width:600px;height:3px;background:var(--border)}
.prog-fill{height:100%;background:var(--lime);transition:width .25s}
/* QUIZ BODY */
.qbody{width:100%;max-width:600px;padding:18px 16px;flex:1}
.qsub{font-size:.74rem;color:var(--muted);margin-bottom:9px}
.qtext{font-weight:500;font-size:.95rem;line-height:1.55;margin-bottom:18px}
.choice-item{display:flex;align-items:flex-start;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:border-color .14s,background .14s}
.choice-item:hover{border-color:#555}
.choice-item.sel{border-color:var(--lime);background:rgba(200,241,53,.07)}
.choice-item input{display:none}
.choice-ltr{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:.74rem;font-weight:600;color:var(--muted);transition:background .14s,color .14s,border-color .14s}
.choice-item.sel .choice-ltr{background:var(--lime);color:#111;border-color:var(--lime)}
.choice-txt{font-size:.86rem;line-height:1.44;padding-top:3px}
/* QUIZ FOOTER */
.qftr{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px}
.ans-count{font-size:.74rem;color:var(--muted)}
.nav-btns{display:flex;gap:7px}
.btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.8rem;font-family:'IBM Plex Sans Thai',sans-serif;transition:border-color .14s}
.btn-nav:hover:not(:disabled){border-color:var(--lime)}
.btn-nav:disabled{opacity:.32;cursor:default}
.btn-sub{background:var(--lime);color:#111;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:.8rem;font-weight:700;font-family:'IBM Plex Mono',monospace;transition:opacity .14s}
.btn-sub:hover{opacity:.88}
/* RESULTS */
.res-head{text-align:center;padding:32px 0 16px}
.ring-wrap{display:flex;justify-content:center;margin:0 auto 14px}
.ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round}
.ring-pct{font-family:'IBM Plex Mono',monospace;font-size:1.75rem;font-weight:600;fill:var(--text);text-anchor:middle;dominant-baseline:middle}
.ring-lbl{font-size:.68rem;fill:var(--muted);text-anchor:middle}
.grade-badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:1.3rem;font-weight:600;letter-spacing:.07em;border:2px solid;border-radius:8px;padding:6px 18px;margin:6px auto;text-align:center}
.res-stats{display:flex;justify-content:center;gap:22px;margin:10px 0}
.rs{text-align:center}
.rs-val{font-family:'IBM Plex Mono',monospace;font-size:1.15rem;font-weight:600}
.rs-lbl{font-size:.68rem;color:var(--muted)}
.grade-msg{font-size:.82rem;color:var(--muted);text-align:center;margin:6px 0 18px}
.btn-restart{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.82rem;margin-bottom:22px;transition:border-color .15s}
.btn-restart:hover{border-color:var(--lime)}
/* REVIEW */
.rev-title{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:11px}
.rev-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:10px}
.rev-item.ok{border-left:3px solid var(--green)}
.rev-item.ng{border-left:3px solid var(--red)}
.rev-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.rev-qn{font-family:'IBM Plex Mono',monospace;font-size:.75rem;font-weight:600;color:var(--muted)}
.rev-st{font-size:.78rem;font-weight:600}
.rev-qt{font-size:.82rem;line-height:1.44;margin-bottom:11px}
.rev-ch{margin-bottom:11px}
.rch{display:flex;align-items:flex-start;gap:7px;padding:4px 0;font-size:.8rem}
.rch-mk{width:14px;flex-shrink:0;text-align:center;font-size:.85rem}
.rch-lt{font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600;min-width:18px;color:var(--muted)}
.rch-tx{line-height:1.38;color:var(--muted)}
.rch.c-ok .rch-mk,.rch.c-ok .rch-lt,.rch.c-ok .rch-tx{color:var(--lime)}
.rch.c-yes .rch-mk,.rch.c-yes .rch-lt,.rch.c-yes .rch-tx{color:var(--green)}
.rch.c-no .rch-mk,.rch.c-no .rch-lt,.rch.c-no .rch-tx{color:var(--red)}
.rev-exp{background:var(--bg);border-radius:8px;padding:11px}
.lang-tg{display:flex;gap:5px;margin-bottom:7px}
.lang-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:2px 9px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.68rem;font-weight:600;transition:border-color .14s,color .14s}
.lang-btn.act{border-color:var(--lime);color:var(--lime)}
.exp-txt{font-size:.8rem;line-height:1.6;color:var(--muted)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="LS" class="screen" style="display:flex">
<div class="inner">
  <div class="lobby-head">
    <div class="logo"><span class="logo-s">S</span>PACEZ <span style="color:var(--muted);font-weight:300">exam hub</span>
      <div class="logo-sub">CERTIFIED ELLIOTT WAVE ANALYST</div>
    </div>
    <p class="lobby-desc">CEWA Mock Examination · File 10 of 10</p>
  </div>
  <div class="variant-cards" id="vcards"></div>
  <div class="ctrl-row">
    <button class="btn-shuffle" id="bshuf" onclick="toggleShuffle()">&#10227; SHUFFLE: OFF</button>
  </div>

</div>

  </div>

    <span class="ans-count" id="anscnt">0 answered</span>
    <div class="nav-btns">
      <button class="btn-nav" id="bprev" onclick="prevQ()">&#8592; Prev</button>
      <button class="btn-nav" id="bnext" onclick="nextQ()">Next &#8594;</button>

<!-- RESULTS -->
<div id="RS" class="screen" style="display:none">
<div class="inner">
  <div class="res-head">
    <div class="logo"><span class="logo-s">S</span>PACEZ <span style="color:var(--muted);font-weight:300">exam hub</span></div>
  </div>
  <div style="text-align:center;margin-bottom:14px">
    <div class="ring-wrap">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle class="ring-bg" cx="70" cy="70" r="54"/>
        <circle id="ringfill" class="ring-fill" cx="70" cy="70" r="54" transform="rotate(-90 70 70)"/>
        <text class="ring-pct" id="rpct" x="70" y="67">--%</text>
        <text class="ring-lbl" x="70" y="85">SCORE</text>
      </svg>
    </div>
    <div class="grade-badge" id="gbadge">—</div>
    <p class="grade-msg" id="gmsg"></p>
    <div class="res-stats">
      <div class="rs"><div class="rs-val" id="rscor">—</div><div class="rs-lbl">CORRECT</div></div>
      <div class="rs"><div class="rs-val" id="rstot">—</div><div class="rs-lbl">TOTAL</div></div>
      <div class="rs"><div class="rs-val" id="rsvar">—</div><div class="rs-lbl">EXAM</div></div>
    </div>
  </div>
  <button class="btn-restart" onclick="goLobby()">&#8592; Return to Exam Hub</button>
  <p class="rev-title">Question Review</p>
  <div id="revcon"></div>
</div>
</div>

<script>
const DATA=[{"label": "CEWA I", "title": "Elliott Wave Analyst — Level I", "time": 45, "type": "single", "topics": ["Impulse Rules", "Corrective Structures", "Fibonacci", "Wave Degrees", "Guidelines & Personality"], "bank": [{"id": "v1q01", "text": "Which of the following is a mandatory rule (cardinal rule) for a valid impulse wave, according to Elliott Wave Principle?", "choices": [{"id": "a", "letter": "A", "text": "Wave 4 must always retrace more than 23.6% of Wave 3"}, {"id": "b", "letter": "B", "text": "Wave 3 can never be the shortest among Waves 1, 3, and 5"}, {"id": "c", "letter": "C", "text": "Wave 2 must retrace between 38.2% and 61.8% of Wave 1"}, {"id": "d", "letter": "D", "text": "Wave 5 must always exceed the price extreme of Wave 3"}], "correct": ["b"], "expEn": "B is a cardinal rule: Wave 3 may never be the shortest of impulse waves 1, 3, and 5. A is incorrect — no rule specifies a minimum retracement depth for Wave 4. C is a common guideline, not a hard rule; Wave 2 can retrace up to 78.6% of Wave 1 or more. D is incorrect because Wave 5 can truncate and fail to exceed Wave 3.", "expTh": "B คือกฎเหล็ก: Wave 3 ต้องไม่สั้นที่สุดในบรรดา Waves 1, 3 และ 5 ตัวเลือก A ผิดเพราะไม่มีกฎกำหนด Wave 4 ต้อง retrace ขั้นต่ำเท่าใด C เป็นเพียง guideline ไม่ใช่กฎเหล็ก และ D ผิดเพราะ Wave 5 อาจ truncate ไม่เกิน Wave 3 ได้"}, {"id": "v1q02", "text": "What is the internal subwave structure (by wave count) of a zigzag correction (A-B-C)?", "choices": [{"id": "a", "letter": "A", "text": "3-3-5"}, {"id": "b", "letter": "B", "text": "3-3-3-3-3"}, {"id": "c", "letter": "C", "text": "5-3-5"}, {"id": "d", "letter": "D", "text": "5-5-5"}], "correct": ["c"], "expEn": "A zigzag (A-B-C) has a 5-3-5 structure: Wave A subdivides into 5 waves, Wave B into 3, and Wave C into 5. A (3-3-5) is the structure of a flat correction, not a zigzag. B (3-3-3-3-3) describes a triangle. D (5-5-5) does not correspond to any standard corrective pattern.", "expTh": "Zigzag (A-B-C) มีโครงสร้าง 5-3-5: Wave A เป็น 5 คลื่น Wave B เป็น 3 คลื่น และ Wave C เป็น 5 คลื่น ตัวเลือก A (3-3-5) คือโครงสร้างของ Flat ไม่ใช่ Zigzag ตัวเลือก B (3-3-3-3-3) คือ Triangle และ D (5-5-5) ไม่ตรงกับ pattern มาตรฐานใดๆ"}, {"id": "v1q03", "text": "In the standard EWI degree hierarchy, which degree is immediately BELOW Primary?", "choices": [{"id": "a", "letter": "A", "text": "Intermediate"}, {"id": "b", "letter": "B", "text": "Minor"}, {"id": "c", "letter": "C", "text": "Cycle"}, {"id": "d", "letter": "D", "text": "Minuette"}], "correct": ["a"], "expEn": "The EWI degree hierarchy from largest to smallest is: Grand Supercycle → Supercycle → Cycle → Primary → Intermediate → Minor → Minute → Minuette → Sub-Minuette. Intermediate (A) is immediately below Primary. Minor (B) is two degrees below. Cycle (C) is above Primary. Minuette (D) is far below.", "expTh": "ลำดับ degree จากใหญ่ไปเล็ก: Grand Supercycle → Supercycle → Cycle → Primary → Intermediate → Minor → Minute → Minuette → Sub-Minuette ดังนั้น Intermediate (A) อยู่ถัดลงมาจาก Primary Minor (B) ต่ำกว่าสองระดับ Cycle (C) อยู่เหนือ Primary และ Minuette (D) ต่ำกว่ามาก"}, {"id": "v1q04", "text": "The guideline of alternation in Elliott Wave Theory primarily predicts that which pair of waves will differ in form and character?", "choices": [{"id": "a", "letter": "A", "text": "Waves 1 and 3"}, {"id": "b", "letter": "B", "text": "Waves 3 and 5"}, {"id": "c", "letter": "C", "text": "Waves 1 and 5"}, {"id": "d", "letter": "D", "text": "Waves 2 and 4"}], "correct": ["d"], "expEn": "The guideline of alternation states that corrective Waves 2 and 4 will typically alternate in form. If Wave 2 is a sharp correction (e.g., zigzag), Wave 4 tends to be a sideways correction (e.g., flat or triangle), and vice versa. This applies to corrections, not the motive waves 1, 3, and 5.", "expTh": "Guideline of alternation กล่าวว่า Wave 2 และ Wave 4 จะมีรูปแบบต่างกัน ถ้า Wave 2 เป็น sharp correction (เช่น zigzag) Wave 4 มักเป็น sideways correction (เช่น flat หรือ triangle) และในทางกลับกัน ไม่ได้ใช้กับ motive waves 1, 3, 5"}, {"id": "v1q05", "text": "Which Fibonacci retracement level is most commonly associated with the depth of Wave 2 within an impulse?", "choices": [{"id": "a", "letter": "A", "text": "61.8%"}, {"id": "b", "letter": "B", "text": "23.6%"}, {"id": "c", "letter": "C", "text": "38.2%"}, {"id": "d", "letter": "D", "text": "14.6%"}], "correct": ["a"], "expEn": "Wave 2 typically retraces deeply, most commonly to the 61.8% Fibonacci level of Wave 1. It can also retrace to 50% or 76.4%, but 61.8% is the most frequently observed relationship. A retrace to 23.6% (B) or 14.6% (D) would be very shallow for Wave 2 and less typical. 38.2% (C) is more common for Wave 4 retracements.", "expTh": "Wave 2 มักย้อนกลับลึก โดยระดับที่พบบ่อยที่สุดคือ 61.8% Fibonacci ของ Wave 1 อาจย้อนไปที่ 50% หรือ 76.4% ได้เช่นกัน แต่ 61.8% พบบ่อยที่สุด ค่า 23.6% (B) หรือ 14.6% (D) ตื้นเกินไปสำหรับ Wave 2 และ 38.2% (C) พบบ่อยในการย้อนกลับของ Wave 4"}, {"id": "v1q06", "text": "In which wave positions can a LEADING diagonal triangle appear?", "choices": [{"id": "a", "letter": "A", "text": "Wave 3 or Wave C"}, {"id": "b", "letter": "B", "text": "Wave 2 or Wave B"}, {"id": "c", "letter": "C", "text": "Wave 1 or Wave A"}, {"id": "d", "letter": "D", "text": "Wave 5 or Wave B"}], "correct": ["c"], "expEn": "Leading diagonals appear only in first-wave positions: Wave 1 of an impulse or Wave A of a zigzag (C). Ending diagonals appear in terminal positions: Wave 5 or Wave C. Wave 3 (A) cannot be any type of diagonal. Waves 2 and B (B) are corrective waves, not motive wave positions. Wave B (D) is corrective.", "expTh": "Leading diagonal ปรากฏเฉพาะในตำแหน่งเริ่มต้น ได้แก่ Wave 1 ของ impulse หรือ Wave A ของ zigzag (C) Ending diagonal ปรากฏในตำแหน่งท้าย ได้แก่ Wave 5 หรือ Wave C Wave 3 (A) ไม่สามารถเป็น diagonal ได้ และ Waves 2 กับ B (B) เป็น corrective wave ไม่ใช่ motive"}, {"id": "v1q07", "text": "In a REGULAR flat correction (3-3-5), what is the typical relationship between Wave B and Wave A?", "choices": [{"id": "a", "letter": "A", "text": "Wave B retraces approximately 38.2% of Wave A"}, {"id": "b", "letter": "B", "text": "Wave B retraces approximately 100% of Wave A, returning near Wave A's origin"}, {"id": "c", "letter": "C", "text": "Wave B exceeds the origin of Wave A by more than 105%"}, {"id": "d", "letter": "D", "text": "Wave B retraces approximately 61.8% of Wave A"}], "correct": ["b"], "expEn": "In a regular flat, Wave B returns to approximately 100% of Wave A, close to where the correction began. In an expanded flat, Wave B exceeds 100% of Wave A (going beyond the origin). In a running flat, Wave B also exceeds the origin. A retracement of 38.2% (A) or 61.8% (D) is too shallow to form a regular flat.", "expTh": "ใน Regular Flat Wave B ย้อนกลับประมาณ 100% ของ Wave A กลับใกล้จุดเริ่มต้น ใน Expanded Flat Wave B เกิน 100% ของ Wave A ใน Running Flat Wave B ก็เกินต้นกำเนิดเช่นกัน การย้อนกลับ 38.2% (A) หรือ 61.8% (D) ตื้นเกินไปสำหรับ Regular Flat"}, {"id": "v1q08", "text": "Which of the following BEST defines a wave extension in Elliott Wave analysis?", "choices": [{"id": "a", "letter": "A", "text": "A corrective wave that becomes unusually prolonged in time"}, {"id": "b", "letter": "B", "text": "Any wave that overlaps the price range of the previous wave"}, {"id": "c", "letter": "C", "text": "A Wave 5 that exceeds the upper channel line of the impulse"}, {"id": "d", "letter": "D", "text": "An unusually elongated motive wave (Wave 1, 3, or 5) that subdivides into clearly visible sub-waves of equal or larger scale"}], "correct": ["d"], "expEn": "Extension refers to an unusually elongated impulse wave — one of Waves 1, 3, or 5 grows much larger than the others and its five internal sub-waves become clearly visible at the same scale as the surrounding waves. A (time prolongation) is about duration, not price extension. B (overlap) would violate impulse rules, and C describes a throw-over rather than extension.", "expTh": "Extension คือ motive wave ที่ยาวผิดปกติ ได้แก่ Wave 1, 3 หรือ 5 ที่ยาวกว่าคลื่นอื่นมาก และ sub-wave ภายในสามารถมองเห็นได้ชัดในสเกลเดียวกัน ตัวเลือก A พูดถึงระยะเวลา ไม่ใช่ราคา B (overlap) จะละเมิดกฎ impulse และ C อธิบาย throw-over ไม่ใช่ extension"}, {"id": "v1q09", "text": "Which of the following scenarios would directly VIOLATE a cardinal rule of an impulse wave?", "choices": [{"id": "a", "letter": "A", "text": "Wave 5 failing to exceed the end of Wave 3 (truncation)"}, {"id": "b", "letter": "B", "text": "Wave 4 retracing 38.2% of Wave 3 with no overlap into Wave 1"}, {"id": "c", "letter": "C", "text": "Wave 4 overlapping into Wave 1 territory in a cash spot market"}, {"id": "d", "letter": "D", "text": "Wave 2 retracing 61.8% of Wave 1"}], "correct": ["c"], "expEn": "The cardinal rule states that Wave 4 must NEVER overlap Wave 1 price territory (in non-leveraged cash markets). C directly violates this rule. A (truncation) is allowed as an exception to the Wave 5 guideline. B (38.2% retracement with no overlap) is a perfectly valid Wave 4. D (Wave 2 retracing 61.8%) is a common, acceptable relationship.", "expTh": "กฎเหล็กระบุว่า Wave 4 ต้องไม่ overlap กับ Wave 1 (ในตลาด cash spot ที่ไม่มี leverage) ตัวเลือก C ละเมิดกฎนี้โดยตรง ตัวเลือก A (truncation) เป็นข้อยกเว้นที่ยอมรับได้ B (retracement 38.2% ไม่ overlap) ถูกต้องสมบูรณ์ และ D (Wave 2 retrace 61.8%) เป็นความสัมพันธ์ปกติที่ยอมรับได้"}, {"id": "v1q10", "text": "According to Frost and Prechter, in which wave position does extension MOST commonly occur in equity markets?", "choices": [{"id": "a", "letter": "A", "text": "Wave 3"}, {"id": "b", "letter": "B", "text": "Wave 5"}, {"id": "c", "letter": "C", "text": "Wave 1"}, {"id": "d", "letter": "D", "text": "Wave 4"}], "correct": ["a"], "expEn": "In equity (stock) markets, Wave 3 is most commonly the extended wave, as described by Frost and Prechter. Its extension manifests as the strongest, longest, and most powerful leg of the impulse. Wave 5 extensions (B) are more typical in commodity markets. Wave 1 (C) extensions are the rarest type. Wave 4 (D) is corrective and cannot extend.", "expTh": "ในตลาดหุ้น (equity) Wave 3 เป็น wave ที่ extend บ่อยที่สุดตามที่ Frost และ Prechter ระบุ Wave 3 ที่ extend ออกมาเป็นขาที่แข็งแกร่ง ยาว และทรงพลังที่สุดของ impulse Wave 5 (B) extend พบบ่อยในตลาดสินค้าโภคภัณฑ์ Wave 1 (C) extend พบน้อยที่สุด และ Wave 4 (D) เป็น corrective wave ไม่สามารถ extend ในแบบ motive ได้"}, {"id": "v1q11", "text": "What is the internal subwave structure of a contracting triangle (A-B-C-D-E) in Elliott Wave Theory?", "choices": [{"id": "a", "letter": "A", "text": "5-3-5-3-5"}, {"id": "b", "letter": "B", "text": "5-5-5-5-5"}, {"id": "c", "letter": "C", "text": "3-5-3-5-3"}, {"id": "d", "letter": "D", "text": "3-3-3-3-3"}], "correct": ["d"], "expEn": "A triangle consists of five waves (A through E), each of which subdivides into three-wave structures, giving a 3-3-3-3-3 pattern. This makes triangles purely corrective. A (5-3-5-3-5) describes the sub-wave structure of a complete impulse at the sub-wave level. B (5-5-5-5-5) is not a recognized pattern. C (3-5-3-5-3) has no standard meaning.", "expTh": "Triangle ประกอบด้วย 5 คลื่น (A ถึง E) และแต่ละคลื่นแบ่งย่อยเป็น 3 คลื่น จึงได้โครงสร้าง 3-3-3-3-3 ตัวเลือก A (5-3-5-3-5) คือโครงสร้างย่อยของ impulse wave เต็มรูปแบบ B (5-5-5-5-5) ไม่ใช่ pattern มาตรฐาน และ C (3-5-3-5-3) ไม่มีความหมายมาตรฐาน"}, {"id": "v1q12", "text": "The Fibonacci golden ratio (phi, φ) equals approximately:", "choices": [{"id": "a", "letter": "A", "text": "1.382"}, {"id": "b", "letter": "B", "text": "1.618"}, {"id": "c", "letter": "C", "text": "0.786"}, {"id": "d", "letter": "D", "text": "2.000"}], "correct": ["b"], "expEn": "The golden ratio phi (φ) ≈ 1.618. It is derived from the Fibonacci sequence: as the sequence progresses, each number divided by its predecessor converges to 1.618. Its reciprocal is 0.618 (1/φ). The value 1.382 (A) is not a primary Fibonacci ratio. 0.786 (C) is the square root of 0.618, used in technical analysis but not the golden ratio itself. 2.000 (D) is not a Fibonacci ratio.", "expTh": "Golden ratio phi (φ) ≈ 1.618 ได้มาจากอนุกรม Fibonacci โดยอัตราส่วนของตัวเลขในอนุกรมต่อตัวก่อนหน้าลู่เข้าหา 1.618 และส่วนกลับ (reciprocal) คือ 0.618 ค่า 1.382 (A) ไม่ใช่ Fibonacci ratio หลัก 0.786 (C) คือรากที่สองของ 0.618 และ 2.000 (D) ไม่ใช่ Fibonacci ratio"}, {"id": "v1q13", "text": "Which feature MOST clearly distinguishes an ENDING diagonal from a standard impulse wave?", "choices": [{"id": "a", "letter": "A", "text": "All five sub-waves (1 through 5) subdivide into three-wave (corrective) structures, and Waves 1 and 4 overlap"}, {"id": "b", "letter": "B", "text": "Wave 3 is the shortest wave and the diagonal has a wedge shape"}, {"id": "c", "letter": "C", "text": "Wave 2 retraces more than 100% of Wave 1"}, {"id": "d", "letter": "D", "text": "Only Waves 2 and 4 subdivide into three-wave structures"}], "correct": ["a"], "expEn": "The key distinguishing features of an ending diagonal are: (1) Waves 1 and 4 overlap in price, and (2) all five sub-waves (including motive waves 1, 3, and 5) subdivide into three-wave structures (3-3-3-3-3). In a standard impulse, motive waves 1, 3, and 5 must be five-wave structures. B is wrong because Wave 3 being shortest would violate cardinal rules. C describes a cardinal rule violation.", "expTh": "Ending diagonal มีลักษณะเด่นคือ: (1) Wave 1 และ Wave 4 overlap กัน และ (2) sub-wave ทั้ง 5 (รวมถึง motive waves 1, 3, 5) แบ่งย่อยเป็น 3-wave structure (3-3-3-3-3) ใน standard impulse wave ธรรมดา motive waves 1, 3 และ 5 ต้องเป็น 5-wave structure B ผิดเพราะ Wave 3 สั้นที่สุดละเมิดกฎเหล็ก"}, {"id": "v1q14", "text": "Which statement MOST accurately describes the personality of Wave 4 in a bull market impulse?", "choices": [{"id": "a", "letter": "A", "text": "Wave 4 is the fastest and most powerful wave, generating maximum momentum"}, {"id": "b", "letter": "B", "text": "Wave 4 is driven mainly by retail investor speculation and euphoria"}, {"id": "c", "letter": "C", "text": "Wave 4 often consolidates sideways, is complex in structure, and can be frustrating to traders"}, {"id": "d", "letter": "D", "text": "Wave 4 always produces a deeper retracement than Wave 2"}], "correct": ["c"], "expEn": "Wave 4 personality is characterized by sideways consolidation, complexity, and often a sense of frustration or boredom for traders. It alternates with Wave 2 in form. A describes Wave 3 personality. B describes Wave 5. D is incorrect — Wave 4 often retraces less than Wave 2 when Wave 2 is the deep corrective wave (though it alternates in form, not necessarily depth).", "expTh": "Wave 4 มักเคลื่อนที่แนวข้าง มีโครงสร้างซับซ้อน และทำให้นักเทรดรู้สึกหงุดหงิดหรือเบื่อ ตัวเลือก A อธิบาย Wave 3 ตัวเลือก B อธิบาย Wave 5 และ D ผิดเพราะ Wave 4 ไม่จำเป็นต้อง retrace ลึกกว่า Wave 2 เสมอไป"}, {"id": "v1q15", "text": "In a typical zigzag (A-B-C), Wave B most commonly retraces what percentage of Wave A?", "choices": [{"id": "a", "letter": "A", "text": "Approximately 100% of Wave A"}, {"id": "b", "letter": "B", "text": "More than 100% of Wave A"}, {"id": "c", "letter": "C", "text": "Approximately 90% to 140% of Wave A"}, {"id": "d", "letter": "D", "text": "Between 38.2% and approximately 79% of Wave A"}], "correct": ["d"], "expEn": "In a zigzag, Wave B typically retraces between about 38.2% and 79% of Wave A, distinguishing it from a flat where Wave B retraces close to 100% or more. If Wave B retraces 100% or beyond, it is likely a flat, not a zigzag. Options A and B describe flat or expanded flat behavior. C (90–140%) also suggests a flat or expanded flat.", "expTh": "ใน Zigzag Wave B มักย้อนกลับประมาณ 38.2% ถึง 79% ของ Wave A ซึ่งแตกต่างจาก Flat ที่ Wave B ย้อนกลับใกล้ 100% หรือมากกว่า ถ้า Wave B ย้อนกลับ 100% ขึ้นไป แสดงว่าน่าจะเป็น Flat ไม่ใช่ Zigzag ตัวเลือก A และ B อธิบาย Flat/Expanded Flat และ C (90–140%) ก็สอดคล้องกับ Flat เช่นกัน"}, {"id": "v1q16", "text": "Which of the following BEST describes a double three (W-X-Y) in Elliott Wave Theory?", "choices": [{"id": "a", "letter": "A", "text": "An impulse wave where two of the five waves extend simultaneously"}, {"id": "b", "letter": "B", "text": "A combination correction consisting of two simple corrective patterns linked by an X wave"}, {"id": "c", "letter": "C", "text": "A flat correction with a double bottom in Wave B"}, {"id": "d", "letter": "D", "text": "A triangle that has two contracting sub-patterns within it"}], "correct": ["b"], "expEn": "A double three is W-X-Y: two simple corrective patterns (W and Y) connected by an intervening corrective X wave. Common combinations include flat-triangle, zigzag-flat, zigzag-triangle, etc. A (simultaneous extensions) is not a recognized concept. C (double bottom) is a technical analysis term, not an Elliott Wave pattern. D (nested triangles) is not how double threes work.", "expTh": "Double three คือ W-X-Y: corrective pattern สองรูปแบบ (W และ Y) เชื่อมต่อด้วย X wave ที่เป็น corrective ตัวอย่างที่พบบ่อยคือ flat-triangle, zigzag-flat เป็นต้น ตัวเลือก A (extension พร้อมกัน) ไม่ใช่ concept ที่รู้จัก C (double bottom) เป็นคำทางเทคนิคทั่วไป ไม่ใช่ pattern Elliott Wave และ D ไม่ใช่รูปแบบ double three"}, {"id": "v1q17", "text": "What does the Elliott Wave channeling technique involve?", "choices": [{"id": "a", "letter": "A", "text": "Drawing parallel trendlines along wave highs and lows to project future wave targets and boundaries"}, {"id": "b", "letter": "B", "text": "Filtering market data to remove price noise before counting waves"}, {"id": "c", "letter": "C", "text": "Using moving averages to identify wave boundaries"}, {"id": "d", "letter": "D", "text": "Computing Fibonacci time cycles to predict when each wave will end"}], "correct": ["a"], "expEn": "Channeling in Elliott Wave analysis means drawing parallel trendlines that bound the wave structure, which can project where future waves will start and end. After Wave 2 completes, an initial channel is formed; after Wave 3, it is refined. B describes data processing, not channeling. C describes moving average analysis, unrelated to channeling. D describes time projection, not the channeling technique.", "expTh": "Channeling ใน Elliott Wave หมายถึงการลากเส้นแนวโน้มคู่ขนานตามแนวคลื่น เพื่อ project เป้าหมายและขอบเขตของคลื่นในอนาคต หลัง Wave 2 สมบูรณ์จะเริ่มสร้าง channel แรก และปรับปรุงหลัง Wave 3 ตัวเลือก B พูดถึงการกรองข้อมูล C เกี่ยวกับ moving average และ D เกี่ยวกับ time projection"}, {"id": "v1q18", "text": "The Elliott Wave guideline known as the rule of equality states that when Wave 3 is extended, which relationship is MOST likely?", "choices": [{"id": "a", "letter": "A", "text": "Waves 2 and 4 must be equal in both depth and duration"}, {"id": "b", "letter": "B", "text": "Wave 1 and Wave 4 will be approximately equal in length"}, {"id": "c", "letter": "C", "text": "Waves 1 and 5 tend to be approximately equal in length or related by a 0.618 ratio"}, {"id": "d", "letter": "D", "text": "Wave 3 must be exactly twice the length of Wave 1"}], "correct": ["c"], "expEn": "The rule of equality states that when Wave 3 is extended (the most common scenario in equities), Waves 1 and 5 tend to approximate equality or be related by a 0.618 ratio. This guideline is used to project Wave 5 price targets. A (equality of Waves 2 and 4) is about alternation, not the rule of equality. B (Waves 1 and 4 equal) is not a recognized guideline. D specifies an exact ratio that has no basis in the literature.", "expTh": "Rule of equality ระบุว่าเมื่อ Wave 3 เป็น extended wave (พบบ่อยที่สุดในตลาดหุ้น) Waves 1 และ 5 มักมีความยาวใกล้เคียงกันหรืออัตราส่วน 0.618 ใช้เป็น guideline ในการ project เป้าหมาย Wave 5 ตัวเลือก A เกี่ยวกับ alternation ไม่ใช่ rule of equality B (Wave 1 และ 4 เท่ากัน) ไม่ใช่ guideline ที่รู้จัก และ D ระบุอัตราส่วนเฉพาะเจาะจงที่ไม่มีในตำรา"}, {"id": "v1q19", "text": "After a contracting triangle completes in Wave 4 position, what type of move is MOST expected in Wave 5?", "choices": [{"id": "a", "letter": "A", "text": "A slow, gradual advance that mirrors the duration of the triangle"}, {"id": "b", "letter": "B", "text": "A deep retracement into the body of the triangle before continuing the trend"}, {"id": "c", "letter": "C", "text": "A new triangle of equal magnitude"}, {"id": "d", "letter": "D", "text": "A sharp, swift thrust in the direction of the main trend, often approximating the triangle width"}], "correct": ["d"], "expEn": "After a contracting triangle in Wave 4, the following Wave 5 produces a sharp, fast thrust in the direction of the main trend. The price distance of this thrust often approximates the maximum width of the triangle (distance from Wave A to Wave B at their widest). A (slow, gradual) is incorrect — the post-triangle thrust is characteristically fast. B (retracement into triangle) and C (new triangle) do not match this guideline.", "expTh": "หลัง Contracting Triangle ใน Wave 4 Wave 5 ที่ตามมามักเป็น thrust ที่เฉียบพลัน รวดเร็ว ในทิศทางของแนวโน้มหลัก และระยะทางของ thrust มักเท่ากับความกว้างสูงสุดของ triangle ตัวเลือก A (ช้า, ค่อยเป็นค่อยไป) ผิดเพราะ thrust หลัง triangle มักรวดเร็ว B (retrace เข้า triangle) และ C (triangle ใหม่) ไม่ตรงกับ guideline นี้"}, {"id": "v1q20", "text": "How does an EXPANDED flat differ from a regular flat?", "choices": [{"id": "a", "letter": "A", "text": "An expanded flat has a 5-3-5 structure while a regular flat has a 3-3-5 structure"}, {"id": "b", "letter": "B", "text": "In an expanded flat, Wave B exceeds the origin of Wave A and Wave C typically extends beyond the end of Wave A"}, {"id": "c", "letter": "C", "text": "An expanded flat always takes longer in time than a regular flat"}, {"id": "d", "letter": "D", "text": "In an expanded flat, Wave B retraces exactly 100% of Wave A"}], "correct": ["b"], "expEn": "In an expanded flat: Wave B exceeds the start of Wave A (retraces more than 100%), and Wave C extends beyond the end of Wave A. Both flat types share the same 3-3-5 internal structure (making A incorrect). Time duration (C) is not the defining criterion. D describes a regular flat behavior where Wave B returns approximately to Wave A's start, not an expanded flat.", "expTh": "ใน Expanded Flat: Wave B เกินจุดเริ่มต้นของ Wave A (retrace มากกว่า 100%) และ Wave C ขยายเลยจุดสิ้นสุดของ Wave A ทั้ง Expanded Flat และ Regular Flat มีโครงสร้าง 3-3-5 เหมือนกัน (ทำให้ A ผิด) ระยะเวลา (C) ไม่ใช่เกณฑ์ที่แตกต่าง และ D อธิบายพฤติกรรม Regular Flat ไม่ใช่ Expanded Flat"}, {"id": "v1q21", "text": "Wave 3 in a bull market impulse is often nicknamed the wave of wonders because it exhibits which characteristics?", "choices": [{"id": "a", "letter": "A", "text": "It is typically the longest, fastest, and most powerful wave with the highest volume and broadest market participation"}, {"id": "b", "letter": "B", "text": "It is driven entirely by retail investor speculation and euphoria"}, {"id": "c", "letter": "C", "text": "It is characterized by above-average volume but a narrow advance with few stocks participating"}, {"id": "d", "letter": "D", "text": "It is the easiest wave to identify in real time due to its clearly visible 3-wave structure"}], "correct": ["a"], "expEn": "Wave 3 is the most powerful, typically the longest and fastest wave, with the highest volume and broadest market participation. Fundamentals are confirming the new trend. B describes Wave 5 personality (speculation and euphoria). C is incorrect — Wave 3 has broad participation across many stocks, not narrow advances. D is wrong because Wave 3 subdivides into 5 waves, not 3, and its strength makes it identifiable, not its sub-wave count.", "expTh": "Wave 3 ทรงพลังที่สุด มักยาวและเร็วที่สุด มี volume สูงสุดและมีหุ้นเข้าร่วมแนวโน้มในวงกว้าง ตัวเลือก B อธิบาย Wave 5 (การเก็งกำไรและความตื่นเต้น) C ผิดเพราะ Wave 3 มีหุ้นเข้าร่วมกว้าง ไม่แคบ และ D ผิดเพราะ Wave 3 แบ่งย่อยเป็น 5 คลื่น ไม่ใช่ 3"}, {"id": "v1q22", "text": "A truncated fifth wave (failed fifth) is best described as:", "choices": [{"id": "a", "letter": "A", "text": "A Wave 5 that exceeds Wave 3 by less than 5 price units"}, {"id": "b", "letter": "B", "text": "A Wave 5 that does not reach the upper channel trendline"}, {"id": "c", "letter": "C", "text": "A Wave 5 in which the internal five sub-waves are missing"}, {"id": "d", "letter": "D", "text": "A Wave 5 that has a valid five-wave internal structure but fails to exceed the price extreme of Wave 3"}], "correct": ["d"], "expEn": "A truncated fifth still contains a valid five-wave internal structure but its price high (in a bull market) falls short of Wave 3's high. It typically occurs after an exceptionally strong Wave 3 and warns of a powerful reversal. A describes a small margin of exceedance, not truncation. B describes an undershoot of a channel line, not truncation. C describes a structurally invalid wave, not truncation.", "expTh": "Wave 5 ที่ truncated ยังมี 5 sub-wave ภายในที่ถูกต้อง แต่จุด high (ในตลาดกระทิง) ไม่เกิน high ของ Wave 3 มักเกิดหลัง Wave 3 ที่รุนแรงมากและเตือนถึงการกลับตัวครั้งใหญ่ ตัวเลือก A พูดถึงส่วนต่างราคาเล็กน้อย B พูดถึงการขาด upper channel และ C อธิบาย wave ที่ไม่มีโครงสร้างที่ถูกต้อง"}, {"id": "v1q23", "text": "Which of the following is TRUE about corrective waves in general?", "choices": [{"id": "a", "letter": "A", "text": "Corrective waves always subdivide into five-wave structures"}, {"id": "b", "letter": "B", "text": "Corrective waves never contain more than three labeled sub-waves"}, {"id": "c", "letter": "C", "text": "Corrective waves move against the trend of one larger degree"}, {"id": "d", "letter": "D", "text": "Corrective waves always move in the same direction as the main trend"}], "correct": ["c"], "expEn": "By definition, corrective waves move against the trend of one larger degree and are labeled with letters (A, B, C, W, X, Y, Z). A is incorrect — corrective waves can have 3, 5, 7, 9, or 11 sub-waves depending on the structure (zigzag = 3, flat = 3, triangle = 5 labeled waves, combinations can total 7 or more). B is too restrictive for the same reason. D is the opposite of the definition.", "expTh": "Corrective wave เคลื่อนที่ขัดกับแนวโน้มของ degree ที่ใหญ่กว่าหนึ่งระดับ และใช้ label ตัวอักษร (A, B, C, W, X, Y, Z) ตัวเลือก A ผิดเพราะ corrective wave อาจมี 3, 5, 7, 9 หรือ 11 sub-wave ขึ้นกับรูปแบบ B จำกัดเกินไป และ D ตรงข้ามกับนิยาม"}, {"id": "v1q24", "text": "The most common Fibonacci ratio for Wave 3 relative to Wave 1 in an impulse is:", "choices": [{"id": "a", "letter": "A", "text": "0.618 times Wave 1"}, {"id": "b", "letter": "B", "text": "1.618 times Wave 1"}, {"id": "c", "letter": "C", "text": "1.000 times Wave 1"}, {"id": "d", "letter": "D", "text": "0.382 times Wave 1"}], "correct": ["b"], "expEn": "The most common projection for Wave 3 is 1.618 times the length of Wave 1, measured from the end of Wave 2. In cases of strong extension, Wave 3 can be 2.618 or 4.236 times Wave 1. A ratio of 0.618 (A) or 0.382 (D) would make Wave 3 shorter than Wave 1 and potentially violate the cardinal rule that Wave 3 cannot be the shortest. A ratio of 1.000 (C) is the equality relationship more associated with Waves 1 and 5.", "expTh": "การ project Wave 3 ที่พบบ่อยที่สุดคือ 1.618 เท่าของ Wave 1 นับจากจุดสิ้นสุดของ Wave 2 ในกรณี extension รุนแรง Wave 3 อาจเป็น 2.618 หรือ 4.236 เท่า อัตราส่วน 0.618 (A) หรือ 0.382 (D) จะทำให้ Wave 3 สั้นกว่า Wave 1 ซึ่งอาจละเมิดกฎเหล็ก และ 1.000 (C) มักพบในความสัมพันธ์ระหว่าง Waves 1 และ 5"}, {"id": "v1q25", "text": "Which statement BEST describes R.N. Elliott's fundamental discovery about financial market structure?", "choices": [{"id": "a", "letter": "A", "text": "Market prices move in repetitive patterns of 5 motive waves in the trend direction followed by 3 corrective waves"}, {"id": "b", "letter": "B", "text": "Markets move in cycles of 7 waves corresponding to days of the week"}, {"id": "c", "letter": "C", "text": "Price movements follow a sequence of 3 motive waves and 2 corrective waves"}, {"id": "d", "letter": "D", "text": "All price movements can be divided into waves of exactly equal length and time duration"}], "correct": ["a"], "expEn": "Elliott discovered that market prices progress in a pattern of five waves in the direction of the main trend (impulse) followed by three corrective waves — giving the basic 5-3 cycle of eight waves. This pattern repeats at every degree of trend in a fractal manner. B (7 waves) is fictitious. C (3 motive waves) is incorrect. D (equal waves) is incorrect — waves vary in length and duration.", "expTh": "Elliott ค้นพบว่าราคาตลาดเคลื่อนที่เป็น 5 คลื่นตามแนวโน้มหลัก (impulse) ตามด้วย 3 คลื่นย้อนกลับ (correction) รวม 8 คลื่นเป็นวัฏจักรพื้นฐาน และซ้ำในทุก degree ของแนวโน้มในลักษณะ fractal ตัวเลือก B (7 คลื่น) ไม่ถูกต้อง C (3 motive waves) ผิด และ D (คลื่นเท่ากัน) ก็ผิด"}, {"id": "v1q26", "text": "In a combination correction (double three or triple three), what letter label is used for the CONNECTING wave between the two main corrective patterns?", "choices": [{"id": "a", "letter": "A", "text": "W wave"}, {"id": "b", "letter": "B", "text": "Y wave"}, {"id": "c", "letter": "C", "text": "Z wave"}, {"id": "d", "letter": "D", "text": "X wave"}], "correct": ["d"], "expEn": "In a double three (W-X-Y), the corrective patterns are W and Y, with X as the connecting wave between them. In a triple three (W-X-Y-X-Z), there are two X waves as connectors. The X wave is always the label for these intermediate connecting corrective waves. W (A) and Y (B) are the main corrective patterns. Z (C) is the third main pattern in a triple three.", "expTh": "ใน Double Three (W-X-Y) pattern corrective หลักคือ W และ Y ส่วน X คือ connecting wave ที่เชื่อมระหว่างกัน ใน Triple Three (W-X-Y-X-Z) มี X wave สอง wave ทำหน้าที่เป็น connector ตัวเลือก W (A) และ Y (B) คือ pattern corrective หลัก และ Z (C) คือ pattern ที่สามใน Triple Three"}, {"id": "v1q27", "text": "According to the guideline of wave personality, which wave in a bull market is associated with the broadest market participation, strong fundamentals, and widespread public recognition of the new trend?", "choices": [{"id": "a", "letter": "A", "text": "Wave 5"}, {"id": "b", "letter": "B", "text": "Wave 1"}, {"id": "c", "letter": "C", "text": "Wave 3"}, {"id": "d", "letter": "D", "text": "Wave B"}], "correct": ["c"], "expEn": "Wave 3 personality is characterized by massive participation, confirming fundamentals, runaway gaps, and public recognition that a new trend is underway. Wave 5 (A) is driven by speculation with deteriorating breadth. Wave 1 (B) is early and skeptical — many see it as a bounce in a downtrend. Wave B (D) is a counter-trend move within a correction, not a motive wave.", "expTh": "Wave 3 มีบุคลิกที่มีนักลงทุนเข้าร่วมในวงกว้าง, fundamentals ยืนยัน, เกิด runaway gap และสาธารณชนยอมรับแนวโน้มใหม่ Wave 5 (A) ขับเคลื่อนด้วยการเก็งกำไรและ breadth เริ่มแคบลง Wave 1 (B) มีความสงสัยอยู่มาก และ Wave B (D) เป็น counter-trend ใน correction ไม่ใช่ motive wave"}, {"id": "v1q28", "text": "In Elliott Wave analysis, Fibonacci time relationships are considered:", "choices": [{"id": "a", "letter": "A", "text": "More reliable and precise than Fibonacci price relationships"}, {"id": "b", "letter": "B", "text": "Less reliable and precise than Fibonacci price relationships, though they can provide useful supplementary context"}, {"id": "c", "letter": "C", "text": "Equally reliable as Fibonacci price relationships when applied correctly"}, {"id": "d", "letter": "D", "text": "Not part of the Elliott Wave methodology as described by Frost and Prechter"}], "correct": ["b"], "expEn": "Frost and Prechter acknowledge Fibonacci time relationships but note they are less reliable than price relationships. Price targets based on Fibonacci ratios are more consistently confirmed in the market than exact time targets. A reverses this reality. C overstates time reliability. D is incorrect — Frost and Prechter do discuss time relationships in the Elliott Wave Principle.", "expTh": "Frost และ Prechter ยอมรับ Fibonacci time relationship แต่ระบุว่ามีความน่าเชื่อถือน้อยกว่าความสัมพันธ์ด้านราคา เป้าหมายราคาจาก Fibonacci ยืนยันได้สม่ำเสมอกว่าการ predict เวลา ตัวเลือก A สลับความจริง C ประเมิน reliability ของเวลาสูงเกินไป และ D ผิดเพราะ Frost และ Prechter กล่าวถึง time relationship ในตำรา"}, {"id": "v1q29", "text": "Which of the following CORRECTLY describes a running flat correction?", "choices": [{"id": "a", "letter": "A", "text": "A 3-3-5 correction where Wave C fails to reach the price extreme of Wave A, suggesting a very strong main trend"}, {"id": "b", "letter": "B", "text": "A 5-3-5 correction where Wave C dramatically overshoots Wave A"}, {"id": "c", "letter": "C", "text": "A 3-3-3-3-3 correction where Wave E fails to reach the lower boundary of the triangle"}, {"id": "d", "letter": "D", "text": "A 3-3-5 correction where both Wave B and Wave C exceed their respective starting points"}], "correct": ["a"], "expEn": "A running flat is a type of flat (3-3-5) where Wave C does not reach the end of Wave A, implying the main trend is so strong it cuts the correction short. This is relatively rare and is a very bullish (or bearish) signal. B describes a 5-3-5 structure which is a zigzag, not a flat. C describes a contracting triangle. D is partially correct about Wave B but the combined description of C overshooting is an expanded flat, not running.", "expTh": "Running Flat เป็น flat (3-3-5) ที่ Wave C ไม่ถึงจุดสิ้นสุดของ Wave A บอกว่าแนวโน้มหลักแข็งแกร่งมากจนตัด correction สั้น พบได้น้อยและเป็นสัญญาณกระทิง (หรือหมี) รุนแรงมาก ตัวเลือก B คือ Zigzag (5-3-5) ไม่ใช่ Flat C อธิบาย Contracting Triangle และ D บอกว่า Wave C เกินซึ่งเป็น Expanded Flat ไม่ใช่ Running Flat"}, {"id": "v1q30", "text": "A motive wave is defined as a wave that:", "choices": [{"id": "a", "letter": "A", "text": "Moves against the trend of one larger degree"}, {"id": "b", "letter": "B", "text": "Consists of exactly three sub-waves"}, {"id": "c", "letter": "C", "text": "Appears only in Wave 3 and Wave C positions"}, {"id": "d", "letter": "D", "text": "Moves in the same direction as the trend of one larger degree"}], "correct": ["d"], "expEn": "A motive wave moves in the direction of the trend of one larger degree and includes impulse waves and diagonal triangles. Corrective waves (A) move against the trend of one larger degree. The sub-wave count for motive waves is five, not three (B). Motive waves can appear in Wave 1, 3, 5, A, or C positions (not just 3 and C as stated in C).", "expTh": "Motive wave เคลื่อนที่ในทิศทางเดียวกับแนวโน้มของ degree ที่ใหญ่กว่า ประกอบด้วย impulse wave และ diagonal triangle Corrective wave (A) เคลื่อนที่ขัดกับแนวโน้ม Motive wave มี sub-wave 5 ตัว ไม่ใช่ 3 (B) และ motive wave ปรากฏใน Wave 1, 3, 5, A หรือ C ไม่ใช่แค่ 3 และ C (C)"}, {"id": "v1q31", "text": "Which of the following is NOT a characteristic of a valid contracting triangle?", "choices": [{"id": "a", "letter": "A", "text": "Each leg (A through E) subdivides into a three-wave structure"}, {"id": "b", "letter": "B", "text": "The bounding trendlines converge progressively toward an apex"}, {"id": "c", "letter": "C", "text": "Wave C extends beyond the start of Wave A"}, {"id": "d", "letter": "D", "text": "A sharp thrust typically follows when the triangle completes in Wave 4"}], "correct": ["c"], "expEn": "In a contracting triangle, each successive wave is smaller than the preceding one, so Wave C cannot extend beyond Wave A's start — that would describe an expanding (reverse) triangle. All of A, B, and D correctly describe contracting triangles. The converging trendlines (B) are the defining visual feature of a contracting triangle.", "expTh": "ใน Contracting Triangle แต่ละคลื่นที่ตามมาเล็กกว่าคลื่นก่อนหน้า ดังนั้น Wave C ไม่สามารถเกิน start ของ Wave A ได้ — แบบนั้นจะเป็น Expanding Triangle ตัวเลือก A, B, D ล้วนอธิบาย Contracting Triangle ได้ถูกต้อง เส้น trendline ที่ลู่เข้า (B) คือลักษณะสำคัญที่สุดของ Contracting Triangle"}, {"id": "v1q32", "text": "Due to the guideline of alternation, if Wave 2 was a sharp, deep zigzag, Wave 4 is MOST commonly expected to be:", "choices": [{"id": "a", "letter": "A", "text": "An even deeper and sharper zigzag"}, {"id": "b", "letter": "B", "text": "A flat correction, triangle, or other sideways structure"}, {"id": "c", "letter": "C", "text": "A wave that subdivides into five motive waves"}, {"id": "d", "letter": "D", "text": "A very brief correction retracing exactly 23.6% of Wave 3"}], "correct": ["b"], "expEn": "The guideline of alternation predicts that Waves 2 and 4 will differ in form. If Wave 2 is a sharp correction (zigzag), Wave 4 tends to be a sideways correction — typically a flat, triangle, or combination. A is the opposite of alternation. C is impossible since Wave 4 is corrective. D is overly specific and unlikely given that alternation emphasizes form differences, not exact depth.", "expTh": "Guideline of alternation ระบุว่า Wave 2 และ Wave 4 จะมีรูปแบบต่างกัน ถ้า Wave 2 เป็น sharp correction (zigzag) Wave 4 มักเป็น sideways correction เช่น Flat, Triangle หรือ Combination ตัวเลือก A ขัดกับ alternation C เป็นไปไม่ได้เพราะ Wave 4 เป็น corrective wave และ D ระบุค่าเจาะจงเกินไป"}, {"id": "v1q33", "text": "An extended fifth wave is MOST accurately characterized as:", "choices": [{"id": "a", "letter": "A", "text": "A Wave 5 exactly twice the length of Wave 3"}, {"id": "b", "letter": "B", "text": "A Wave 5 that retraces all of Wave 3"}, {"id": "c", "letter": "C", "text": "A Wave 5 that ends precisely at the upper channel boundary"}, {"id": "d", "letter": "D", "text": "A Wave 5 that is unusually long, clearly subdivides into five visible waves of similar scale as surrounding waves, and often overshoots typical projection targets"}], "correct": ["d"], "expEn": "A Wave 5 extension is identified when Wave 5 is dramatically longer than normal and its five internal sub-waves become visible at the same scale as the surrounding main waves. A (exactly twice Wave 3) is an arbitrary and incorrect definition. B (retracing Wave 3) would constitute a Wave 4 overlap violation. C describes reaching a channel line, which is typical Wave 5 behavior without requiring an extension.", "expTh": "Wave 5 extension เกิดเมื่อ Wave 5 ยาวผิดปกติและ sub-wave ภายใน 5 ตัวสามารถมองเห็นได้ชัดในสเกลเดียวกับคลื่นหลัก ตัวเลือก A (สองเท่าของ Wave 3) ไม่ถูกต้อง B (retrace Wave 3) จะละเมิดกฎ overlap และ C (ถึง channel line) คือพฤติกรรมปกติของ Wave 5 ไม่ใช่ extension"}, {"id": "v1q34", "text": "Which statement about the Fibonacci number sequence is CORRECT in the context of Elliott Wave Theory?", "choices": [{"id": "a", "letter": "A", "text": "The ratio of any Fibonacci number to the NEXT larger Fibonacci number converges toward 0.618 as the sequence progresses"}, {"id": "b", "letter": "B", "text": "Adjacent Fibonacci numbers are always in a 1.000 ratio to one another"}, {"id": "c", "letter": "C", "text": "Fibonacci ratios apply only to time analysis, not to price target projection"}, {"id": "d", "letter": "D", "text": "Fibonacci ratios emerge from geometric rather than additive progressions"}], "correct": ["a"], "expEn": "As the Fibonacci sequence progresses (1,1,2,3,5,8,13,21...), the ratio of any number to the next LARGER number converges to 0.618 (the inverse of phi). Conversely, the ratio of any number to the next smaller converges to 1.618 (phi). B is incorrect — the ratio between adjacent numbers is never exactly 1. C is wrong — Fibonacci ratios are used extensively for price projections. D is incorrect — the Fibonacci sequence is additive.", "expTh": "เมื่ออนุกรม Fibonacci (1,1,2,3,5,8...) ดำเนินไป อัตราส่วนของตัวเลขใดๆ ต่อตัวถัดไปที่ใหญ่กว่าลู่เข้าหา 0.618 และในทางกลับกัน อัตราส่วนต่อตัวก่อนหน้าลู่เข้าหา 1.618 ตัวเลือก B ผิดเพราะอัตราส่วนระหว่างตัวเลขที่อยู่ติดกันไม่เคยเท่ากับ 1 C ผิดเพราะใช้ทั้งราคาและเวลา และ D ผิดเพราะเป็น additive progression"}, {"id": "v1q35", "text": "In equity markets, which volume pattern is MOST consistent with a valid five-wave Elliott Wave impulse?", "choices": [{"id": "a", "letter": "A", "text": "Volume peaks in Wave 5 and is lowest in Wave 3"}, {"id": "b", "letter": "B", "text": "Volume remains approximately constant across all five waves"}, {"id": "c", "letter": "C", "text": "Volume typically peaks during Wave 3 and is often lighter in Wave 5 than in Wave 3 (unless Wave 5 is extended)"}, {"id": "d", "letter": "D", "text": "Volume is always highest in the corrective waves (2 and 4)"}], "correct": ["c"], "expEn": "In equity markets, volume confirms wave counts: it typically peaks during Wave 3 (the most powerful wave) and often shows declining volume during Wave 5 compared to Wave 3. Very light Wave 5 volume can signal a potential truncation or ending diagonal. Exception: if Wave 5 is extended, volume can increase. A reverses the typical pattern. B ignores the volume confirmation role. D is incorrect — corrections typically see reduced volume.", "expTh": "ในตลาดหุ้น volume ยืนยัน wave count: มักพีคใน Wave 3 (คลื่นที่ทรงพลังที่สุด) และมักลดลงใน Wave 5 เมื่อเทียบกับ Wave 3 Volume ที่ลดลงมากใน Wave 5 อาจเป็นสัญญาณของ truncation หรือ ending diagonal ยกเว้นถ้า Wave 5 เป็น extension ตัวเลือก A กลับทิศทาง B ไม่สนใจ volume D ผิดเพราะ correction มักเห็น volume ลดลง"}, {"id": "v1q36", "text": "Wave B within an A-B-C corrective structure can take which of the following forms?", "choices": [{"id": "a", "letter": "A", "text": "Only a five-wave impulse"}, {"id": "b", "letter": "B", "text": "Any corrective pattern: zigzag, flat, triangle, or combination"}, {"id": "c", "letter": "C", "text": "Only a zigzag or flat"}, {"id": "d", "letter": "D", "text": "Only an expanding triangle"}], "correct": ["b"], "expEn": "Wave B is itself a corrective wave and can take the form of any corrective pattern — zigzag, flat, triangle, expanding flat, combination (double/triple three), etc. This is one reason why A-B-C corrections can look so different from one another. A is incorrect — Wave B cannot be an impulse since it is a corrective wave. C and D are both too restrictive.", "expTh": "Wave B เป็น corrective wave และสามารถมีรูปแบบได้ทุกประเภท ทั้ง zigzag, flat, triangle, expanding flat หรือ combination (double/triple three) นี่คือเหตุผลที่ A-B-C correction ดูแตกต่างกันมาก ตัวเลือก A ผิดเพราะ Wave B ไม่สามารถเป็น impulse C และ D จำกัดเกินไป"}, {"id": "v1q37", "text": "After a contracting triangle completes as Wave 4 of a bull market impulse, Wave 5 is BEST described as:", "choices": [{"id": "a", "letter": "A", "text": "A slow, methodical advance that mirrors the triangle duration"}, {"id": "b", "letter": "B", "text": "A downward gap that marks the start of a new bear market"}, {"id": "c", "letter": "C", "text": "A complex Wave 5 containing multiple internal corrections"}, {"id": "d", "letter": "D", "text": "A brief, sharp, and fast upward thrust often approximating the widest part of the triangle in price distance"}], "correct": ["d"], "expEn": "After a contracting Wave 4 triangle, the subsequent Wave 5 (post-triangle thrust) is characteristically brief and swift, often limited in price to approximately the widest measurement of the triangle. This is a key predictive tool: analysts use the triangle width to estimate the Wave 5 target. A (slow, methodical) and C (complex) contradict the thrust characteristic. B (downward gap) is incorrect.", "expTh": "หลัง Contracting Triangle ใน Wave 4 Wave 5 ที่ตามมาเป็น thrust ที่สั้น เฉียบพลัน และรวดเร็ว มักมีระยะทางประมาณความกว้างสูงสุดของ triangle นี่คือเครื่องมือพยากรณ์สำคัญ ตัวเลือก A (ช้า) และ C (ซับซ้อน) ขัดกับลักษณะ thrust และ B (gap ลง) ไม่ถูกต้อง"}, {"id": "v1q38", "text": "In a five-wave downward impulse (bear market), which wave is associated with the greatest bearish momentum, maximum fear, and the largest single price decline?", "choices": [{"id": "a", "letter": "A", "text": "Wave 3 of the downward impulse"}, {"id": "b", "letter": "B", "text": "Wave 5 of the downward impulse"}, {"id": "c", "letter": "C", "text": "Wave A of the subsequent corrective rally"}, {"id": "d", "letter": "D", "text": "Wave 1 of the downward impulse"}], "correct": ["a"], "expEn": "Just as Wave 3 of a bull market impulse is the most powerful upward wave, Wave 3 of a bear market impulse is the most powerful downward wave, generating maximum fear, panic selling, and typically the largest single-wave price decline. Wave 5 (B) often shows deteriorating breadth but is not as powerful as Wave 3. Wave 1 (D) often surprises participants but is not the most powerful. Wave A (C) is corrective.", "expTh": "เช่นเดียวกับที่ Wave 3 ในตลาดกระทิงทรงพลังที่สุดขาขึ้น Wave 3 ในตลาดหมีก็ทรงพลังที่สุดขาลง สร้างความกลัวสูงสุด การขายแบบตื่นตระหนก และการลดลงของราคาในครั้งเดียวที่ใหญ่ที่สุด Wave 5 (B) แสดง breadth ที่แย่ลงแต่ไม่ทรงพลังเท่า Wave 3 Wave 1 (D) มักเป็นเรื่องเซอร์ไพรส์แต่ไม่แรงที่สุด และ Wave A (C) เป็น corrective"}, {"id": "v1q39", "text": "Which statement BEST describes diagonal triangles in Elliott Wave Theory?", "choices": [{"id": "a", "letter": "A", "text": "Diagonals are purely corrective and appear only in Wave 4 and Wave B positions"}, {"id": "b", "letter": "B", "text": "Diagonals always have five waves that are all five-wave structures, making them look like impulses"}, {"id": "c", "letter": "C", "text": "Diagonals are motive patterns with a wedge shape and overlapping Waves 1 and 4, appearing in Wave 1, Wave 5, Wave A, or Wave C positions"}, {"id": "d", "letter": "D", "text": "Diagonals occur only when Wave 3 is the extended wave and all trendlines must converge"}], "correct": ["c"], "expEn": "Diagonal triangles are motive waves (moving with the larger trend) with a wedge shape where Waves 1 and 4 overlap. Leading diagonals appear in Wave 1 or Wave A; ending diagonals in Wave 5 or Wave C. A is incorrect — diagonals are motive, not corrective. B is incorrect — in ending diagonals, sub-waves are three-wave structures. D is incorrect — diagonals can appear regardless of which wave is extended.", "expTh": "Diagonal triangle เป็น motive wave (เคลื่อนตามแนวโน้มหลัก) รูปลิ่มที่ Wave 1 และ Wave 4 overlap กัน Leading diagonal ปรากฏใน Wave 1 หรือ A Ending diagonal ปรากฏใน Wave 5 หรือ C ตัวเลือก A ผิดเพราะ diagonal เป็น motive ไม่ใช่ corrective B ผิดเพราะ sub-wave ของ ending diagonal เป็น 3-wave structure และ D ผิดเพราะ diagonal ไม่ขึ้นกับว่า wave ใดที่ extend"}, {"id": "v1q40", "text": "Wave 1 personality in the early stage of a new bull market is MOST accurately described as:", "choices": [{"id": "a", "letter": "A", "text": "Aggressive and unmistakable, with record-high volume and gap-up openings"}, {"id": "b", "letter": "B", "text": "Subtle and often unrecognized, frequently misidentified as a bounce or short-covering rally within a continuing downtrend"}, {"id": "c", "letter": "C", "text": "Driven by speculative euphoria with many retail investors buying aggressively"}, {"id": "d", "letter": "D", "text": "Accompanied by very positive news coverage and fundamental upgrades"}], "correct": ["b"], "expEn": "Wave 1 is typically early and subtle. Most market participants still believe the preceding downtrend is ongoing and view Wave 1 as merely a counter-trend bounce. Volume may pick up but rarely dramatically. Fundamentals are still poor. A describes the typical Wave 3 launch environment. C describes Wave 5 psychology. D is incorrect — Wave 1 usually begins when news is still negative.", "expTh": "Wave 1 มักเริ่มต้นเงียบๆ และผู้เล่นส่วนใหญ่ยังคิดว่าแนวโน้มขาลงยังดำเนินอยู่ มองว่า Wave 1 เป็นแค่ bounce ชั่วคราว Volume เพิ่มขึ้นบ้างแต่ไม่มาก fundamentals ยังแย่ ตัวเลือก A อธิบาย Wave 3 C อธิบาย Wave 5 และ D ผิดเพราะ Wave 1 มักเริ่มเมื่อข่าวยังเป็นลบ"}, {"id": "v1q41", "text": "At which stage of an impulse wave can the analyst FIRST construct a meaningful Elliott channel to project future targets?", "choices": [{"id": "a", "letter": "A", "text": "After the complete five-wave impulse finishes"}, {"id": "b", "letter": "B", "text": "Immediately after Wave 1 completes, using only one data point"}, {"id": "c", "letter": "C", "text": "After Wave 3 completes, using a three-point channel"}, {"id": "d", "letter": "D", "text": "After Wave 2 completes, establishing a base channel using Wave 0, Wave 1 end, and Wave 2 end as reference points"}], "correct": ["d"], "expEn": "The initial (base) channel can first be drawn after Wave 2 completes. A line connects the origin (Wave 0) and the end of Wave 2, with a parallel line through the top of Wave 1. This gives the first meaningful channel projection. With only Wave 1 complete (B), only one end-point exists, insufficient for a channel. After Wave 3 (C), a refined channel is drawn — but the FIRST channel comes after Wave 2. A is too late.", "expTh": "Channel เริ่มต้น (base channel) สร้างได้ครั้งแรกหลัง Wave 2 สมบูรณ์ โดยลากเส้นเชื่อมจุดเริ่มต้น (Wave 0) กับจุดสิ้นสุดของ Wave 2 แล้วลากเส้นขนานผ่าน top ของ Wave 1 ถ้ามีแค่ Wave 1 (B) มีจุดอ้างอิงเดียว ไม่พอสร้าง channel หลัง Wave 3 (C) ปรับ channel ใหม่ — แต่ channel แรกมาจากหลัง Wave 2 ตัวเลือก A สายเกินไป"}, {"id": "v1q42", "text": "According to Frost and Prechter, which statement BEST captures Wave 5 personality in a bull market?", "choices": [{"id": "a", "letter": "A", "text": "Wave 5 is driven by speculation and widespread optimism, but momentum indicators and market breadth often deteriorate relative to Wave 3"}, {"id": "b", "letter": "B", "text": "Wave 5 always features the highest volume and fastest price advance of the entire impulse"}, {"id": "c", "letter": "C", "text": "Wave 5 is the only wave in which the fundamentals are completely negative"}, {"id": "d", "letter": "D", "text": "Wave 5 personality is identical to Wave 3 in all measurable respects"}], "correct": ["a"], "expEn": "Wave 5 is characterized by speculative enthusiasm and widespread optimism, but technical deterioration: fewer stocks make new highs (narrowing breadth), momentum oscillators often fail to confirm the price high (negative divergence), and volume may lag Wave 3. B is typically Wave 3. C is incorrect — Wave 5 usually occurs when fundamentals are still reasonably positive. D is incorrect — Wave 5 and Wave 3 have very different personalities.", "expTh": "Wave 5 มีบุคลิกของการเก็งกำไรและความมั่นใจสูง แต่เทคนิคเริ่มเสื่อมลง: หุ้นน้อยลงที่ทำ new high (breadth แคบ) oscillators มักไม่ยืนยัน high ใหม่ (negative divergence) และ volume อาจน้อยกว่า Wave 3 ตัวเลือก B มักเป็น Wave 3 C ผิดเพราะ fundamentals ยังดีพอสมควรใน Wave 5 D ผิดเพราะ Wave 5 และ Wave 3 มีบุคลิกต่างกันมาก"}, {"id": "v1q43", "text": "Why can Wave 2 NEVER retrace 100% of Wave 1 according to the cardinal rules?", "choices": [{"id": "a", "letter": "A", "text": "Mathematical constraints from Fibonacci ratios physically prevent it"}, {"id": "b", "letter": "B", "text": "Market participants always place stop-loss orders at Wave 1 origin, preventing the price from reaching it"}, {"id": "c", "letter": "C", "text": "A 100% retracement would eliminate Wave 1 as a distinct wave and negate the entire impulse count"}, {"id": "d", "letter": "D", "text": "The guideline of alternation prohibits Wave 2 from ever reaching Wave 1 origin"}], "correct": ["c"], "expEn": "If Wave 2 returned to exactly Wave 1's origin, it would effectively erase Wave 1 as a distinct upward movement. With no separate Wave 1, the five-wave impulse structure cannot exist — the count fails entirely and must be relabeled. A is incorrect — Fibonacci ratios are guidelines, not physical barriers. B describes stop-losses which are market mechanics, not Elliott Wave rules. D confuses alternation (about form) with retracement depth.", "expTh": "ถ้า Wave 2 ย้อนกลับถึงจุดเริ่มต้นของ Wave 1 พอดี จะลบ Wave 1 ออกในฐานะคลื่นที่แตกต่าง และโครงสร้าง impulse 5-wave ก็จะหายไปต้องนับใหม่ทั้งหมด ตัวเลือก A ผิดเพราะ Fibonacci เป็น guideline ไม่ใช่กำแพงกายภาพ B พูดถึง stop-loss ซึ่งเป็นกลไกตลาด ไม่ใช่กฎ Elliott Wave และ D สับสนระหว่าง alternation (รูปแบบ) กับความลึกของ retracement"}, {"id": "v1q44", "text": "A double zigzag in Elliott Wave Theory is CORRECTLY described as:", "choices": [{"id": "a", "letter": "A", "text": "A single zigzag (A-B-C) that takes twice the normal time to complete"}, {"id": "b", "letter": "B", "text": "Two individual zigzag patterns (W and Y) connected by an intervening corrective X wave, forming a W-X-Y structure"}, {"id": "c", "letter": "C", "text": "A flat correction in which Wave B contains a zigzag sub-structure"}, {"id": "d", "letter": "D", "text": "A 10-wave pattern formed from two separate five-wave impulses"}], "correct": ["b"], "expEn": "A double zigzag is a combination (W-X-Y) where W = first zigzag (5-3-5), X = an intervening corrective wave (typically brief), and Y = second zigzag (5-3-5). It produces a deeper correction than a single zigzag. A describes time extension, not a double zigzag. C mislabels a flat with a complex Wave B. D (10-wave pattern from two impulses) is incorrect structurally.", "expTh": "Double Zigzag คือ combination (W-X-Y) ที่ W = zigzag แรก (5-3-5), X = corrective wave ที่เชื่อม (มักสั้น), Y = zigzag ที่สอง (5-3-5) สร้าง correction ที่ลึกกว่า zigzag เดียว ตัวเลือก A พูดถึงระยะเวลา C เรียก flat ที่มี Wave B ซับซ้อนผิด และ D (10 คลื่นจาก impulse สองตัว) ผิดโครงสร้าง"}, {"id": "v1q45", "text": "In which market scenario is a running flat MOST likely to form?", "choices": [{"id": "a", "letter": "A", "text": "When the market has definitively reversed and the correction is retracing a large portion of the prior trend"}, {"id": "b", "letter": "B", "text": "When Wave B fails to retrace more than 50% of Wave A"}, {"id": "c", "letter": "C", "text": "When both Wave B and Wave C are shorter than Wave A"}, {"id": "d", "letter": "D", "text": "When the underlying trend is so powerful that the correction runs in the trend direction, and Wave C fails to reach Wave A's end"}], "correct": ["d"], "expEn": "A running flat occurs when the main trend is exceptionally strong, causing the correction to be skewed in the direction of the trend. Wave B exceeds Wave A's origin, and Wave C fails to fully retrace Wave A — the correction runs instead of fully retracing. This is a very bullish (or bearish) signal indicating the dominant trend has overwhelming force. A, B, and C describe different (incorrect) characteristics.", "expTh": "Running Flat เกิดเมื่อแนวโน้มหลักทรงพลังมากจน correction เอนไปในทิศทางของแนวโน้ม Wave B เกินต้นกำเนิดของ Wave A และ Wave C ไม่ถึงจุดสิ้นสุดของ Wave A เป็นสัญญาณกระทิง (หรือหมี) รุนแรงที่บอกว่าแนวโน้มครอบงำอย่างท่วมท้น ตัวเลือก A, B, C อธิบายลักษณะที่ผิด"}, {"id": "v1q46", "text": "In the standard EWI degree hierarchy, which degree is immediately ABOVE Cycle?", "choices": [{"id": "a", "letter": "A", "text": "Supercycle"}, {"id": "b", "letter": "B", "text": "Primary"}, {"id": "c", "letter": "C", "text": "Grand Supercycle"}, {"id": "d", "letter": "D", "text": "Intermediate"}], "correct": ["a"], "expEn": "The EWI degree hierarchy from largest to smallest: Grand Supercycle → Supercycle → Cycle → Primary → Intermediate → Minor → Minute → Minuette → Sub-Minuette. Supercycle (A) is directly above Cycle. Grand Supercycle (C) is two degrees above Cycle. Primary (B) and Intermediate (D) are both BELOW Cycle in the hierarchy.", "expTh": "ลำดับ degree EWI จากใหญ่ไปเล็ก: Grand Supercycle → Supercycle → Cycle → Primary → Intermediate → Minor → Minute → Minuette → Sub-Minuette ดังนั้น Supercycle (A) อยู่เหนือ Cycle โดยตรง Grand Supercycle (C) อยู่เหนือสองระดับ ส่วน Primary (B) และ Intermediate (D) อยู่ต่ำกว่า Cycle"}, {"id": "v1q47", "text": "Which statement about applying Elliott Wave Theory across different financial markets is MOST accurate?", "choices": [{"id": "a", "letter": "A", "text": "The Wave Principle applies exclusively to stock markets"}, {"id": "b", "letter": "B", "text": "The 5-3 wave structure applies identically with no differences between markets"}, {"id": "c", "letter": "C", "text": "While the 5-3 wave structure appears universally, Wave 5 extensions are more common in commodities and Wave 3 extensions are more typical in equities"}, {"id": "d", "letter": "D", "text": "Corrective waves are always more complex in currency markets than in any other market"}], "correct": ["c"], "expEn": "The Wave Principle applies across stocks, commodities, currencies, and cryptocurrencies. However, there are typical differences: in equity markets, Wave 3 is most often extended; in commodity markets (especially gold, oil), Wave 5 blow-off tops with extensions are more frequently observed. A is incorrect — the principle applies across markets. B overstates uniformity. D makes an unsupported absolute claim about currencies.", "expTh": "Wave Principle ใช้ได้กับหุ้น สินค้าโภคภัณฑ์ สกุลเงิน และ crypto แต่มีความแตกต่างทั่วไป: ในตลาดหุ้น Wave 3 extend บ่อยกว่า ในตลาดสินค้าโภคภัณฑ์ (ทอง น้ำมัน) Wave 5 blow-off top พร้อม extension พบบ่อยกว่า ตัวเลือก A ผิดเพราะใช้ได้หลายตลาด B ประเมินความสม่ำเสมอสูงเกิน และ D อ้างอย่างไม่มีหลักฐาน"}, {"id": "v1q48", "text": "In Elliott Wave analysis, a throw-over is best described as:", "choices": [{"id": "a", "letter": "A", "text": "When Wave 3 exceeds Wave 1 by more than 261.8%"}, {"id": "b", "letter": "B", "text": "A brief, final price penetration through a bounding trendline (channel or wedge) that is quickly reversed, commonly seen at Wave 5 peaks or at the end of ending diagonals"}, {"id": "c", "letter": "C", "text": "When Wave 5 reaches exactly the upper channel line without any penetration"}, {"id": "d", "letter": "D", "text": "A gap-up opening that begins Wave 3 from the channel lower boundary"}], "correct": ["b"], "expEn": "A throw-over is a brief overshoot of a defining trendline — the upper boundary of a channel or wedge — followed by an immediate reversal back inside. It appears at the exhaustion point of Wave 5 impulses and especially at the completion of ending diagonals, signaling an impending sharp reversal. A describes an extreme Wave 3 extension, not a throw-over. C describes a precise channel touch, not a throw-over. D describes a Wave 3 launch.", "expTh": "Throw-over คือการทะลุเส้น trendline บน (upper boundary ของ channel หรือ wedge) ชั่วคราวแล้วย้อนกลับทันที ปรากฏที่จุด exhaustion ของ Wave 5 impulse และโดยเฉพาะที่จุดสมบูรณ์ของ Ending Diagonal เป็นสัญญาณการกลับตัวที่รุนแรงที่กำลังจะเกิดขึ้น ตัวเลือก A อธิบาย extreme Wave 3 C คือการแตะ channel line พอดี และ D อธิบายการเปิดตัว Wave 3"}, {"id": "v1q49", "text": "What is a Fibonacci cluster in the context of Elliott Wave price target analysis?", "choices": [{"id": "a", "letter": "A", "text": "A group of three or more consecutive Fibonacci numbers in the sequence"}, {"id": "b", "letter": "B", "text": "A moment in time when waves at multiple degrees all complete simultaneously"}, {"id": "c", "letter": "C", "text": "An area where multiple Fibonacci time cycles converge"}, {"id": "d", "letter": "D", "text": "A narrow price zone where multiple Fibonacci measurements from different reference points converge, creating a high-probability target or reversal zone"}], "correct": ["d"], "expEn": "A Fibonacci cluster (or confluence) is a price zone where multiple Fibonacci calculations — retracements, extensions, and projections from different wave pivot points — align within a tight price range. When several independent Fibonacci measurements converge at the same price zone, the significance of that zone as support or resistance increases substantially. A describes the number sequence itself. B describes temporal clustering. C describes time analysis.", "expTh": "Fibonacci cluster (หรือ confluence) คือโซนราคาที่การคำนวณ Fibonacci หลายอย่าง ทั้ง retracement, extension และ projection จากจุดอ้างอิงต่างๆ ลงมาบรรจบกันในช่วงราคาแคบ เมื่อหลายการวัด Fibonacci อิสระลงมาตรงกัน ความสำคัญของโซนนั้นในฐานะ support หรือ resistance เพิ่มขึ้นมาก ตัวเลือก A พูดถึงตัวเลขในอนุกรม B คือ temporal clustering และ C คือ time analysis"}, {"id": "v1q50", "text": "What is the PRIMARY purpose of maintaining an ALTERNATING wave count in Elliott Wave analysis?", "choices": [{"id": "a", "letter": "A", "text": "To consider all valid interpretations simultaneously and determine which count best satisfies the most Elliott Wave rules and guidelines as the market unfolds"}, {"id": "b", "letter": "B", "text": "To automatically generate the optimal risk-reward trade entry and exit signals"}, {"id": "c", "letter": "C", "text": "To use artificial intelligence to eliminate subjective wave labeling"}, {"id": "d", "letter": "D", "text": "To switch between bullish and bearish scenarios solely based on current news sentiment"}], "correct": ["a"], "expEn": "When a wave count is ambiguous, analysts maintain alternating (alternate) counts — multiple valid interpretations of the same price structure. The primary purpose is to identify which interpretation best satisfies the greatest number of Elliott Wave rules and guidelines as new price action unfolds. Market movement then progressively eliminates less valid interpretations. B, C, and D are not the purpose of alternating counts; they describe different activities.", "expTh": "เมื่อ wave count ไม่ชัดเจน นักวิเคราะห์รักษา alternate count หลายแบบพร้อมกัน จุดประสงค์หลักคือหาว่า interpretation ใดตอบสนองกฎและ guideline Elliott Wave ได้มากที่สุดเมื่อราคาเคลื่อนที่ต่อไป การเคลื่อนไหวของตลาดจะค่อยๆ กำจัด interpretation ที่ไม่ถูกต้องออก ตัวเลือก B, C, D ไม่ใช่จุดประสงค์ของ alternate count"}]}, {"label": "Level II · Part 1", "title": "Advanced Elliott Wave — Part 1", "time": 45, "type": "single", "topics": ["Advanced Counting", "Diagonals", "Complex Corrections", "Wave Analysis"], "bank": [{"id": "v2q01", "text": "An analyst observes: a five-wave decline, followed by a three-wave rally, followed by the beginning of another five-wave decline. What is the MOST consistent Elliott Wave interpretation of this developing structure?", "choices": [{"id": "a", "letter": "A", "text": "A leading diagonal followed immediately by an expanded flat"}, {"id": "b", "letter": "B", "text": "A completed zigzag where all three legs are now visible"}, {"id": "c", "letter": "C", "text": "An intermediate-degree downward impulse developing, with the first 5-wave decline as Wave 1, the 3-wave rally as Wave 2, and the second 5-wave decline beginning as Wave 3"}, {"id": "d", "letter": "D", "text": "A triple-three combination correction at the primary degree"}], "correct": ["c"], "expEn": "A 5-wave decline (Wave 1) followed by a 3-wave rally (Wave 2) followed by another 5-wave decline beginning (Wave 3) is the classic developing three-wave sequence of a downward impulse at the next higher degree. This 5-3-5 pattern at the intermediate level is the most consistent interpretation. A (leading diagonal + expanded flat) would not match the structure. B (completed zigzag) requires A-B-C with 5-3-5 structure but does not explain the third wave down beginning. D (triple three) is a complex correction, not a motive sequence.", "expTh": "การลดลง 5 คลื่น (Wave 1) ตามด้วยการเพิ่มขึ้น 3 คลื่น (Wave 2) และการลดลง 5 คลื่นใหม่ที่กำลังเริ่ม (Wave 3) เป็นลำดับ 3 คลื่นที่พัฒนาแบบคลาสสิคของ downward impulse ในระดับสูงกว่า รูปแบบ 5-3-5 ในระดับ intermediate สอดคล้องที่สุด ตัวเลือก A ไม่ตรงกับโครงสร้าง B (zigzag สมบูรณ์) ไม่อธิบายการเริ่มต้นของคลื่นที่สาม และ D (triple three) เป็น complex correction ไม่ใช่ motive sequence"}, {"id": "v2q02", "text": "Which characteristic MOST reliably distinguishes an ENDING diagonal from a LEADING diagonal?", "choices": [{"id": "a", "letter": "A", "text": "In an ending diagonal all five sub-waves (including 1, 3, 5) are three-wave structures; in a leading diagonal, sub-waves 1, 3, and 5 are typically five-wave structures"}, {"id": "b", "letter": "B", "text": "Ending diagonals always appear in Wave 5; leading diagonals can appear in both Wave 1 and Wave 5"}, {"id": "c", "letter": "C", "text": "Leading diagonals have diverging trendlines; ending diagonals have converging trendlines"}, {"id": "d", "letter": "D", "text": "Only ending diagonals are followed by a sharp reversal; leading diagonals are not"}], "correct": ["a"], "expEn": "The most reliable distinguishing characteristic is the internal structure of the sub-waves. In an ending diagonal, ALL five sub-waves subdivide into three-wave structures (3-3-3-3-3). In a leading diagonal, the motive sub-waves (1, 3, and 5) typically subdivide into five-wave structures (5-3-5-3-5). B is partially incorrect — ending diagonals appear in Wave 5 or Wave C (not only Wave 5), and leading diagonals appear in Wave 1 or Wave A (not Wave 5). C is incorrect — both types typically have converging trendlines (contracting). D is incorrect — both types can be followed by sharp reversals or continuations.", "expTh": "ลักษณะที่แยกแยะได้น่าเชื่อถือที่สุดคือโครงสร้าง sub-wave ภายใน ใน Ending Diagonal sub-wave ทั้ง 5 แบ่งย่อยเป็น 3-wave structure (3-3-3-3-3) ส่วนใน Leading Diagonal motive sub-waves (1, 3 และ 5) มักแบ่งย่อยเป็น 5-wave (5-3-5-3-5) ตัวเลือก B ผิดบางส่วน เพราะ Ending diagonal ปรากฏใน Wave 5 หรือ C และ Leading ใน Wave 1 หรือ A C ผิดเพราะทั้งสองมักมีเส้น converge และ D ผิดเพราะทั้งสองตามด้วยการกลับตัวได้"}, {"id": "v2q03", "text": "An analyst is counting what appears to be a five-wave bullish impulse, but discovers that Wave 4 overlaps Wave 1 price territory in a cash spot market. What is the MOST appropriate re-interpretation?", "choices": [{"id": "a", "letter": "A", "text": "The count must be entirely abandoned; no valid Elliott Wave pattern can be labeled here"}, {"id": "b", "letter": "B", "text": "Accept the count as valid since the overlap rule only applies in leveraged futures markets"}, {"id": "c", "letter": "C", "text": "Relabel Wave 3 as the extended wave and accept the overlap as normal"}, {"id": "d", "letter": "D", "text": "Re-interpret the five-wave structure as a diagonal triangle (leading or ending), since overlap of Waves 1 and 4 is a defining characteristic of diagonals"}], "correct": ["d"], "expEn": "When a structure shows five waves with Wave 4 overlapping Wave 1, the overlap immediately disqualifies it as a standard impulse. The most likely correct interpretation is a diagonal triangle, since Waves 1 and 4 overlap is the defining structural characteristic of both leading and ending diagonals. A is too extreme — a diagonal is the valid interpretation. B is incorrect — the overlap rule applies in cash markets (futures markets may have minor overlaps due to price gaps). C is wrong — no matter which wave is extended, Wave 4 overlap is still not permitted in an impulse.", "expTh": "เมื่อโครงสร้างแสดง 5 คลื่นที่ Wave 4 overlap กับ Wave 1 overlap นี้ทำให้ไม่สามารถเป็น standard impulse ได้ทันที การตีความที่ถูกต้องที่สุดคือ Diagonal Triangle เพราะ Wave 1 และ Wave 4 overlap เป็นลักษณะเฉพาะของ diagonal ทั้ง leading และ ending ตัวเลือก A รุนแรงเกินไป B ผิดเพราะกฎ overlap ใช้กับ cash market และ C ผิดเพราะไม่ว่า wave ใดจะ extend Wave 4 overlap ยังคงผิดกฎใน impulse"}, {"id": "v2q04", "text": "In a W-X-Y double three combination, which of the following MOST accurately describes the characteristics of the X wave?", "choices": [{"id": "a", "letter": "A", "text": "X must always be a contracting triangle to link the two main corrections"}, {"id": "b", "letter": "B", "text": "X is typically a smaller and simpler corrective pattern that serves as a connector between W and Y, and can be any corrective pattern"}, {"id": "c", "letter": "C", "text": "X must retrace at least 90% of the W wave to be a valid connector"}, {"id": "d", "letter": "D", "text": "X always extends beyond the price extreme of W"}], "correct": ["b"], "expEn": "The X wave is a connecting corrective wave between W and Y. It is typically smaller and simpler than either W or Y, and can be any corrective pattern — zigzag, flat, or triangle. Its primary role is to separate the two main corrections while remaining subordinate to them. A (must be a triangle) is too restrictive. C (retracing 90% of W) describes an unusually deep X; typically X retraces 50–79% of W. D (extending beyond W) would make X larger than W, which is atypical.", "expTh": "X wave เป็น corrective wave ที่เชื่อม W และ Y มักเล็กกว่าและเรียบง่ายกว่าทั้ง W และ Y และสามารถเป็น
