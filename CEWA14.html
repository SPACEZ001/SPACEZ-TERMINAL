ใช่ corrective pattern"}, {"id": "v3q03", "text": "A trader is evaluating a suspected Wave 3. Which observations would support (not prove, but support) this labeling? (Select all that apply)", "choices": [{"id": "v3q03_a", "letter": "a", "text": "The move is the shortest among waves 1, 3, and 5"}, {"id": "v3q03_b", "letter": "b", "text": "Momentum oscillators reach their strongest reading of the sequence"}, {"id": "v3q03_c", "letter": "c", "text": "Broad market participation increases as the trend becomes apparent"}, {"id": "v3q03_d", "letter": "d", "text": "Volume expands noticeably as price accelerates"}], "correct": ["b", "c", "d"], "expEn": "Expanding volume, peak momentum, and broadening participation are all typical Wave 3 characteristics. A Wave 3 being the shortest of 1/3/5 would violate a cardinal rule and cannot support the labeling.", "expTh": "ปริมาณการซื้อขายที่เพิ่มขึ้น โมเมนตัมที่แข็งแกร่งที่สุด และผู้เข้าร่วมตลาดที่กว้างขึ้น ล้วนเป็นลักษณะเฉพาะทั่วไปของ Wave 3 ส่วนการที่ Wave 3 เป็นคลื่นที่สั้นที่สุดในบรรดา 1/3/5 จะขัดกับกฎเหล็ก จึงไม่สามารถสนับสนุนการนับคลื่นนี้ได้"}, {"id": "v3q04", "text": "Which of the following are guidelines (not absolute rules) in Elliott Wave analysis? (Select all that apply)", "choices": [{"id": "v3q04_a", "letter": "a", "text": "Wave 4 often finding support near the prior fourth wave of one lesser degree"}, {"id": "v3q04_b", "letter": "b", "text": "Alternation between Wave 2 and Wave 4"}, {"id": "v3q04_c", "letter": "c", "text": "Wave 5 often approximating 61.8% of waves 1 through 3 when Wave 3 is not extended"}, {"id": "v3q04_d", "letter": "d", "text": "Wave 2 cannot retrace beyond the start of Wave 1"}], "correct": ["a", "b", "c"], "expEn": "Alternation, the 61.8% Wave 5 relationship, and Wave 4 terminating near the previous lesser-degree fourth wave are all guidelines that can be violated without invalidating a count. The Wave 2 retracement limit is one of the three cardinal rules.", "expTh": "Alternation, ความสัมพันธ์ Wave 5 ที่ 61.8% และ Wave 4 ที่มักสิ้นสุดใกล้ fourth wave ระดับย่อยก่อนหน้า ล้วนเป็นแนวทางที่สามารถถูกละเมิดได้โดยไม่ทำให้การนับคลื่นผิดพลาด ส่วนขีดจำกัดการย่อของ Wave 2 คือหนึ่งในกฎเหล็กสามข้อ"}, {"id": "v3q05", "text": "Which characteristics distinguish a leading diagonal from an ending diagonal? (Select all that apply)", "choices": [{"id": "v3q05_a", "letter": "a", "text": "A leading diagonal most commonly subdivides 5-3-5-3-5"}, {"id": "v3q05_b", "letter": "b", "text": "A leading diagonal occupies the Wave 1 or Wave A position"}, {"id": "v3q05_c", "letter": "c", "text": "Both diagonal types always subdivide 3-3-3-3-3"}, {"id": "v3q05_d", "letter": "d", "text": "An ending diagonal occupies the Wave 5 or Wave C position"}], "correct": ["a", "b", "d"], "expEn": "Leading diagonals appear at Wave 1/A and typically subdivide 5-3-5-3-5, while ending diagonals appear at Wave 5/C and subdivide 3-3-3-3-3 — so the two do not share the same internal structure.", "expTh": "Leading diagonal ปรากฏที่ตำแหน่ง Wave 1/A และมักแบ่งย่อยเป็น 5-3-5-3-5 ในขณะที่ ending diagonal ปรากฏที่ตำแหน่ง Wave 5/C และแบ่งย่อยเป็น 3-3-3-3-3 ดังนั้นทั้งสองประเภทจึงไม่มีโครงสร้างภายในแบบเดียวกัน"}, {"id": "v3q06", "text": "An analyst identifies a possible flat correction. Which of the following observations would be consistent with a valid flat (regular or expanded)? (Select all that apply)", "choices": [{"id": "v3q06_a", "letter": "a", "text": "Wave C always exceeds Wave A by exactly 261.8%"}, {"id": "v3q06_b", "letter": "b", "text": "Wave B can, in an expanded flat, exceed the starting point of Wave A"}, {"id": "v3q06_c", "letter": "c", "text": "The overall structure subdivides as 3-3-5 (A-B-C)"}, {"id": "v3q06_d", "letter": "d", "text": "Wave B retraces 90% or more of Wave A"}], "correct": ["b", "c", "d"], "expEn": "A deep Wave B (90%+), the 3-3-5 subdivision, and Wave B potentially exceeding Wave A's start (expanded flat) are all valid flat characteristics. There is no rule fixing Wave C at exactly 261.8% of Wave A.", "expTh": "Wave B ที่ย่อลึก (90%+), การแบ่งย่อยแบบ 3-3-5 และ Wave B ที่อาจเคลื่อนที่เลยจุดเริ่มต้นของ Wave A (ใน expanded flat) ล้วนเป็นลักษณะที่ถูกต้องของ flat ไม่มีกฎที่กำหนดตายตัวว่า Wave C ต้องเท่ากับ 261.8% ของ Wave A พอดี"}, {"id": "v3q07", "text": "Which of the following would immediately invalidate a proposed impulse wave count? (Select all that apply)", "choices": [{"id": "v3q07_a", "letter": "a", "text": "Wave 4 dips into the price territory of Wave 1 in what is claimed to be a standard (non-diagonal) impulse"}, {"id": "v3q07_b", "letter": "b", "text": "Wave 5 fails to exceed the end of Wave 3 (truncates)"}, {"id": "v3q07_c", "letter": "c", "text": "Wave 3 is shorter than both Wave 1 and Wave 5"}, {"id": "v3q07_d", "letter": "d", "text": "Wave 2 retraces 78% of Wave 1"}], "correct": ["a", "c"], "expEn": "Wave 4 overlapping Wave 1 (outside diagonals) and Wave 3 being the shortest of 1/3/5 both break cardinal rules and invalidate the count. A 78% retracement of Wave 2 is deep but permissible (under 100%), and truncation is a recognized, valid (if less common) variation.", "expTh": "Wave 4 ที่ทับซ้อน Wave 1 (นอกเหนือจาก diagonal) และ Wave 3 ที่สั้นที่สุดในบรรดา 1/3/5 ล้วนละเมิดกฎเหล็กและทำให้การนับคลื่นใช้ไม่ได้ ส่วนการย่อ 78% ของ Wave 2 นั้นลึกแต่ยังอยู่ในเกณฑ์ที่ยอมรับได้ (ไม่เกิน 100%) และ truncation ก็เป็นรูปแบบที่ถูกต้องแม้จะพบได้น้อยกว่า"}, {"id": "v3q08", "text": "Which of the following are recognized as complex corrective combinations in Elliott Wave theory? (Select all that apply)", "choices": [{"id": "v3q08_a", "letter": "a", "text": "Single impulse repeated five times"}, {"id": "v3q08_b", "letter": "b", "text": "Triple three"}, {"id": "v3q08_c", "letter": "c", "text": "Zigzag combined with X wave and a triangle"}, {"id": "v3q08_d", "letter": "d", "text": "Double three"}], "correct": ["b", "c", "d"], "expEn": "Double threes, triple threes, and combinations like zigzag-X-triangle are all recognized complex correction structures. Repeating a single impulse five times in sequence is not a defined Elliott Wave combination pattern.", "expTh": "Double three, triple three และ combination เช่น zigzag-X-triangle ล้วนเป็นโครงสร้าง correction ที่ซับซ้อนซึ่งได้รับการยอมรับ ส่วนการเกิด impulse เดี่ยวซ้ำห้าครั้งติดต่อกันไม่ใช่รูปแบบ combination ที่มีการนิยามไว้ใน Elliott Wave"}, {"id": "v3q09", "text": "Which factors should an analyst weigh when choosing between two technically valid alternate wave counts? (Select all that apply)", "choices": [{"id": "v3q09_a", "letter": "a", "text": "Whichever count matches the analyst's prior public prediction"}, {"id": "v3q09_b", "letter": "b", "text": "Overall visual proportionality ('right look') of the pattern"}, {"id": "v3q09_c", "letter": "c", "text": "Consistency with the alternation guideline"}, {"id": "v3q09_d", "letter": "d", "text": "Adherence to common Fibonacci relationships among the waves"}], "correct": ["b", "c", "d"], "expEn": "Fibonacci consistency, alternation, and visual proportionality are all legitimate criteria for selecting the higher-probability count. Favoring a count merely to match a prior public prediction is a bias that should not influence objective analysis.", "expTh": "ความสอดคล้องกับ Fibonacci, alternation และสัดส่วนที่ดูสมเหตุสมผล ('right look') ล้วนเป็นเกณฑ์ที่ถูกต้องในการเลือกการนับคลื่นที่มีความน่าจะเป็นสูงกว่า ส่วนการเลือกการนับคลื่นเพียงเพื่อให้ตรงกับคำทำนายที่เคยประกาศไว้ก่อนหน้าเป็นอคติที่ไม่ควรมีอิทธิพลต่อการวิเคราะห์อย่างเป็นกลาง"}, {"id": "v3q10", "text": "Which statements correctly describe Wave 5 behavior? (Select all that apply)", "choices": [{"id": "v3q10_a", "letter": "a", "text": "Wave 5 can truncate, failing to exceed the end of Wave 3"}, {"id": "v3q10_b", "letter": "b", "text": "Wave 5 often shows momentum divergence versus Wave 3"}, {"id": "v3q10_c", "letter": "c", "text": "Wave 5 can extend well beyond typical Fibonacci projections in rare cases"}, {"id": "v3q10_d", "letter": "d", "text": "Wave 5 must always be the longest wave in the impulse"}], "correct": ["a", "b", "c"], "expEn": "Truncation, momentum divergence, and occasional extension beyond typical projections are all recognized Wave 5 behaviors. There is no rule requiring Wave 5 to be the longest wave — that role more commonly belongs to Wave 3.", "expTh": "Truncation, การแยกทางของโมเมนตัม และการยืดตัวเกินกว่าที่คาดการณ์ไว้ในบางกรณี ล้วนเป็นพฤติกรรมของ Wave 5 ที่ได้รับการยอมรับ ไม่มีกฎที่กำหนดให้ Wave 5 ต้องเป็นคลื่นที่ยาวที่สุด เพราะบทบาทนั้นมักตกเป็นของ Wave 3 มากกว่า"}, {"id": "v3q11", "text": "In a contracting triangle (A-B-C-D-E), which of the following are generally true? (Select all that apply)", "choices": [{"id": "v3q11_a", "letter": "a", "text": "The triangle guarantees a full trend reversal upon completion"}, {"id": "v3q11_b", "letter": "b", "text": "Each wave typically subdivides into three sub-waves"}, {"id": "v3q11_c", "letter": "c", "text": "Wave E may 'throw over' the A-C trendline in some cases"}, {"id": "v3q11_d", "letter": "d", "text": "The pattern typically precedes the final move of a larger sequence"}], "correct": ["b", "c", "d"], "expEn": "Contracting triangles typically have three-wave legs, appear in a penultimate position (e.g., Wave 4 or Wave B) before a final thrust, and can feature a throw-over on Wave E. They do not guarantee a full trend reversal — the subsequent thrust continues the prior larger trend.", "expTh": "Contracting triangle มักมีขาคลื่นแบบ 3 คลื่น ปรากฏในตำแหน่งรองสุดท้าย (เช่น Wave 4 หรือ Wave B) ก่อนการเคลื่อนไหวครั้งสุดท้าย และอาจมี throw-over ใน Wave E แต่ไม่ได้รับประกันว่าจะเกิดการกลับตัวของแนวโน้มอย่างสมบูรณ์ เนื่องจากการ thrust ที่ตามมามักไปในทิศทางแนวโน้มใหญ่เดิม"}, {"id": "v3q12", "text": "Which of the following would be red flags suggesting a proposed Elliott Wave count may be unreliable, even without an outright rule violation? (Select all that apply)", "choices": [{"id": "v3q12_a", "letter": "a", "text": "The count conflicts with well-established Fibonacci relationships across multiple waves"}, {"id": "v3q12_b", "letter": "b", "text": "The count ignores alternation entirely across several instances in the same sequence"}, {"id": "v3q12_c", "letter": "c", "text": "The count aligns closely with textbook Fibonacci retracement zones"}, {"id": "v3q12_d", "letter": "d", "text": "The count requires an unusually contorted or implausible-looking wave shape ('poor right look')"}], "correct": ["a", "b", "d"], "expEn": "A poor visual look, repeated conflicts with Fibonacci relationships, and consistent disregard of alternation are all warning signs of a weaker interpretation, even absent a hard rule violation. Close alignment with textbook Fibonacci zones is a positive, not negative, indicator.", "expTh": "รูปทรงที่ดูอึดอัดผิดปกติ ('right look' ที่ไม่ดี'), ความขัดแย้งซ้ำๆ กับความสัมพันธ์ Fibonacci และการละเลย alternation อย่างต่อเนื่องในลำดับเดียวกัน ล้วนเป็นสัญญาณเตือนของการตีความที่อ่อนแอ แม้จะไม่มีการละเมิดกฎอย่างชัดเจนก็ตาม ส่วนความสอดคล้องใกล้เคียงกับโซน Fibonacci retracement ตามตำราถือเป็นสัญญาณบวก ไม่ใช่ลบ"}, {"id": "v3q13", "text": "Which of the following statements about wave degree labeling are correct? (Select all that apply)", "choices": [{"id": "v3q13_a", "letter": "a", "text": "The same basic patterns (motive and corrective) recur fractally across all degrees"}, {"id": "v3q13_b", "letter": "b", "text": "Analysts may use different labeling conventions (e.g., numerals, letters, colors) as long as the nested logic remains clear"}, {"id": "v3q13_c", "letter": "c", "text": "Degree labels must remain internally consistent — a sub-wave should carry a smaller degree label than the wave it belongs to"}, {"id": "v3q13_d", "letter": "d", "text": "Grand Supercycle is smaller in degree than Minute"}], "correct": ["a", "b", "c"], "expEn": "Consistent nesting of degree labels, fractal recurrence of patterns across degrees, and flexibility in labeling convention (as long as logic is clear) are all correct. Grand Supercycle is one of the let uiLang = 'en';
let state = {
  variant: null,
  questions: [],
  answers: {},   // qid -> array of selected letters
  currentIndex: 0,
  timeLeft: 0,
  timerInterval: null,
  startTime: null,
  shuffled: false
};

function setUiLang(lang) {
  uiLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  renderVariantGrid();
}

function renderVariantGrid() {
  const grid = document.getElementById('variantGrid');
  grid.innerHTML = '';
  Object.keys(VARIANTS).forEach(key => {
    const v = VARIANTS[key];
    const card = document.createElement('div');
    card.className = 'vcard' + (state.variant === key ? ' active' : '');
    card.dataset.variant = key;
    card.onclick = () => selectVariant(key);
    const label = uiLang === 'th' ? v.labelTh : v.label;
    const title = uiLang === 'th' ? v.titleTh : v.title;
    card.innerHTML = `
      <span class="tag">${label}</span>
      <h3>${title}</h3>
      <div class="topics">${v.topics}</div>
      <div class="meta">
        <span>📝 ${v.n} ${uiLang==='th'?'ข้อ':'questions'}</span>
        <span>⏱ ${v.minutes} ${uiLang==='th'?'นาที':'min'}</span>
        <span>${v.type==='multi' ? '☑' : '●'} ${v.typeLabel}</span>
      </div>`;
    grid.appendChild(card);
  });
}

function selectVariant(key) {
  state.variant = key;
  renderVariantGrid();
  const btn = document.getElementById('startBtn');
  btn.disabled = false;
  btn.textContent = uiLang === 'th' ? 'เริ่มทำข้อสอบ' : 'Start Exam';
}

/* Fisher-Yates shuffle with deep clone */
function shuffleDeep(arr) {
  const clone = JSON.parse(JSON.stringify(arr));
  for (let i = clone.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [clone[i], clone[j]] = [clone[j], clone[i]];
  }
  return clone;
}

function startExam() {
  if (!state.variant) return;
  const v = VARIANTS[state.variant];
  state.questions = shuffleDeep(QUESTION_BANK[state.variant]);
  // also shuffle choices within each question (deep clone, independent)
  state.questions.forEach(q => {
    q.choices = shuffleDeep(q.choices);
  });
  state.answers = {};
  state.currentIndex = 0;
  state.timeLeft = v.minutes * 60;
  state.startTime = Date.now();

  document.getElementById('portalScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');

  startTimer();
  renderQuestion();
}

function startTimer() {
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      finishExam();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  el.classList.remove('warn5','warn1');
  if (state.timeLeft <= 60) el.classList.add('warn1');
  else if (state.timeLeft <= 300) el.classList.add('warn5');
}

function renderQuestion() {
  const v = VARIANTS[state.variant];
  const q = state.questions[state.currentIndex];
  const container = document.getElementById('qContainer');
  const selected = state.answers[q.id] || [];
  const isMulti = v.type === 'multi';

  document.getElementById('progressText').textContent = `Q${state.currentIndex+1} / ${v.n}`;
  document.getElementById('progressFill').style.width = `${((state.currentIndex+1)/v.n)*100}%`;

  const choicesHtml = q.choices.map(c => {
    const isSel = selected.includes(c.letter);
    return `<div class="choice ${isMulti?'checkbox':''} ${isSel?'selected':''}" data-qid="${q.id}" data-letter="${c.letter}" onclick="selectChoice(this)">
      <div class="letter">${c.letter.toUpperCase()}</div>
      <div class="ctext">${c.text}</div>
    </div>`;
  }).join('');

  container.innerHTML = `
    <div class="qcard">
      <div class="qnum">${state.variant.toUpperCase()} · QUESTION ${state.currentIndex+1}${isMulti?' · SELECT ALL THAT APPLY':''}</div>
      <div class="qtext">${q.text}</div>
      ${choicesHtml}
    </div>`;

  document.getElementById('prevBtn').style.visibility = state.currentIndex === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').textContent = state.currentIndex === v.n - 1 ? 'Finish ✓' : 'Next ›';
}

function selectChoice(el) {
  const qid = el.dataset.qid;
  const letter = el.dataset.letter;
  const v = VARIANTS[state.variant];
  const isMulti = v.type === 'multi';

  if (!state.answers[qid]) state.answers[qid] = [];
  const arr = state.answers[qid];

  if (isMulti) {
    const idx = arr.indexOf(letter);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(letter);
  } else {
    state.answers[qid] = [letter];
  }
  renderQuestion();
}

function navQ(dir) {
  const v = VARIANTS[state.variant];
  const newIndex = state.currentIndex + dir;
  if (newIndex < 0) return;
  if (newIndex >= v.n) {
    openSubmitModal();
    return;
  }
  state.currentIndex = newIndex;
  renderQuestion();
}

function openSubmitModal() {
  const v = VARIANTS[state.variant];
  const answeredCount = Object.keys(state.answers).filter(k => state.answers[k].length > 0).length;
  const unanswered = v.n - answeredCount;
  document.getElementById('modalTitle').textContent = uiLang === 'th' ? 'ส่งคำตอบข้อสอบ?' : 'Submit Exam?';
  document.getElementById('modalBody').textContent = unanswered > 0
    ? (uiLang === 'th' ? `คุณยังไม่ได้ตอบ ${unanswered} ข้อ ต้องการส่งคำตอบเลยหรือไม่?` : `You have ${unanswered} unanswered question(s). Submit anyway?`)
    : (uiLang === 'th' ? 'คุณตอบครบทุกข้อแล้ว ต้องการส่งคำตอบหรือไม่?' : 'All questions answered. Ready to submit?');
  document.getElementById('submitModal').classList.add('show');
}
function closeModal() { document.getElementById('submitModal').classList.remove('show'); }
function confirmSubmit() { closeModal(); finishExam(); }

function finishExam() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.remove('hidden');
  renderResults();
}

function renderResults() {
  const v = VARIANTS[state.variant];
  let correctCount = 0;
  const results = state.questions.map(q => {
    const sel = (state.answers[q.id] || []).slice().sort();
    const correct = q.correct.slice().sort();
    const isCorrect = sel.length === correct.length && sel.every((v,i) => v === correct[i]);
    if (isCorrect) correctCount++;
    return { q, sel, isCorrect };
  });

  const pct = Math.round((correctCount / v.n) * 100);
  const circumference = 490;
  const offset = circumference - (circumference * pct / 100);
  document.getElementById('scoreArc').style.strokeDashoffset = offset;
  document.getElementById('scorePctText').textContent = `${pct}%`;
  document.getElementById('scoreFracText').textContent = `${correctCount}/${v.n}`;

  let arcColor = '#ff4d4d';
  let gradeClass = 'grade-fail';
  let gradeText = uiLang === 'th' ? 'ไม่ผ่าน' : 'FAIL';
  if (pct >= 90) { arcColor = '#4dff91'; gradeClass = 'grade-master'; gradeText = uiLang === 'th' ? 'CEWA MASTER' : 'CEWA MASTER'; }
  else if (pct >= 80) { arcColor = '#4d9fff'; gradeClass = 'grade-pass'; gradeText = uiLang === 'th' ? 'ผ่าน' : 'PASS'; }
  document.getElementById('scoreArc').style.stroke = arcColor;
  const badge = document.getElementById('gradeBadge');
  badge.className = 'grade-badge ' + gradeClass;
  badge.textContent = gradeText;

  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = v.n - correctCount;
  const elapsed = v.minutes * 60 - state.timeLeft;
  const em = Math.floor(elapsed / 60), es = elapsed % 60;
  document.getElementById('statTime').textContent = `${em}:${String(es).padStart(2,'0')}`;

  const reviewContainer = document.getElementById('reviewContainer');
  reviewContainer.innerHTML = results.map((r, idx) => {
    const q = r.q;
    const choicesHtml = q.choices.map(c => {
      const isCorrectChoice = q.correct.includes(c.letter);
      const isSelected = r.sel.includes(c.letter);
      let cls = '';
      if (isCorrectChoice) cls = 'correct-answer';
      else if (isSelected && !isCorrectChoice) cls = 'wrong-selected';
      return `<div class="review-choice ${cls}">${c.letter.toUpperCase()}. ${c.text} ${isCorrectChoice?'✓':(isSelected?'✗':'')}</div>`;
    }).join('');
    return `
    <div class="review-item">
      <div class="review-head" data-action="toggle-review" data-idx="${idx}" onclick="toggleReview(${idx})">
        <div class="qsummary">Q${idx+1}. ${q.text.length > 70 ? q.text.slice(0,70)+'…' : q.text}</div>
        <div class="status">${r.isCorrect ? '✅' : '❌'}</div>
      </div>
      <div class="review-body" id="reviewBody${idx}">
        <div class="qtext" style="margin-bottom:12px;">${q.text}</div>
        ${choicesHtml}
        <div class="explanation">
          <strong>EN:</strong> ${q.expEn}
          <span class="th-exp"><strong>TH:</strong> ${q.expTh}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleReview(idx) {
  const el = document.getElementById(`reviewBody${idx}`);
  el.classList.toggle('open');
}

/* init */
renderVariantGrid();
</script>
</body>
</html>
