<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CEWA14 — Certified Elliott Wave Analyst Mock Exam | SPACEZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111111;
  --surface:#1a1a1a;
  --border:#2e2e2e;
  --lime:#c8f135;
  --text:#f0f0f0;
  --muted:#777;
  --radius:14px;
  --red:#ff4d4d;
  --green:#4dff91;
  --yellow:#ffd84d;
  --blue:#4d9fff;
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans Thai', 'IBM Plex Mono', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 900px; margin: 0 auto; padding: 24px 18px 80px; }

/* Header / brand */
.brand {
  text-align:center; padding: 28px 0 8px;
}
.brand h1 {
  font-family:'IBM Plex Mono', monospace;
  font-size: 2.1rem;
  font-weight:700;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #ff4d4d, #ffd84d, #4dff91, #4d9fff, #c8f135, #ff4d4d);
  background-size: 300% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: rgbGlow 6s linear infinite;
}
@keyframes rgbGlow { to { background-position: 300% center; } }
.brand p { color: var(--muted); font-size:.85rem; margin-top:6px; letter-spacing:1px;}

/* Portal screen */
.exam-title { text-align:center; margin: 18px 0 6px; font-size:1.4rem; font-weight:600; }
.exam-sub { text-align:center; color:var(--muted); font-size:.9rem; margin-bottom: 28px; }

.variant-grid { display:grid; gap:16px; grid-template-columns: 1fr; }
@media (min-width:700px){ .variant-grid{ grid-template-columns: repeat(3,1fr);} }

.vcard {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor:pointer;
  transition: all .2s ease;
  position: relative;
}
.vcard:hover, .vcard.active {
  border-color: var(--lime);
  box-shadow: 0 0 24px rgba(200,241,53,0.12);
  transform: translateY(-2px);
}
.vcard .tag {
  display:inline-block; background: rgba(200,241,53,0.12); color: var(--lime);
  font-family:'IBM Plex Mono',monospace; font-size:.7rem; padding:3px 10px; border-radius:20px;
  margin-bottom:10px; letter-spacing:1px;
}
.vcard h3 { font-size:1.05rem; margin-bottom:8px; }
.vcard .meta { font-size:.8rem; color:var(--muted); display:flex; gap:14px; flex-wrap:wrap; margin-top:10px;}
.vcard .meta span { display:flex; align-items:center; gap:5px; }

.topics { font-size:.78rem; color:#999; margin-top:10px; line-height:1.5; }

.lang-toggle-row { display:flex; justify-content:center; gap:8px; margin: 22px 0 4px; }
.lang-btn {
  background:var(--surface); border:1px solid var(--border); color:var(--muted);
  padding:6px 16px; border-radius:20px; font-size:.78rem; cursor:pointer; font-family: inherit;
}
.lang-btn.active { color: var(--bg); background: var(--lime); border-color: var(--lime); font-weight:600; }

.start-btn-row { text-align:center; margin-top: 28px; }
.btn-primary {
  background: var(--lime); color:#111; border:none; padding:14px 36px; border-radius:10px;
  font-weight:700; font-size:1rem; cursor:pointer; font-family:inherit;
  transition: transform .15s ease;
}
.btn-primary:disabled { opacity:.35; cursor:not-allowed; }
.btn-primary:not(:disabled):hover { transform: scale(1.03); }
.btn-secondary {
  background:transparent; color: var(--text); border:1px solid var(--border); padding:12px 28px;
  border-radius:10px; cursor:pointer; font-family:inherit; font-size:.92rem;
}
.btn-secondary:hover { border-color: var(--lime); color: var(--lime); }

/* Quiz screen */
.hud {
  position: sticky; top:0; z-index: 50;
  background: rgba(17,17,17,0.92); backdrop-filter: blur(8px);
  border-bottom:1px solid var(--border);
  padding: 12px 18px; display:flex; justify-content:space-between; align-items:center;
  margin: 0 -18px 20px;
}
.hud .progress-text { font-size:.82rem; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
.timer {
  font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:1.05rem;
  padding: 6px 14px; border-radius:8px; background: var(--surface); border:1px solid var(--border);
}
.timer.warn5 { color: var(--yellow); border-color: var(--yellow); }
.timer.warn1 { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 50% { opacity:.5; } }

.progress-bar-track { height:4px; background:var(--border); border-radius:4px; margin: 0 0 24px; overflow:hidden; }
.progress-bar-fill { height:100%; background: var(--lime); transition: width .3s ease; }

.qcard {
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
  padding: 22px; margin-bottom: 20px;
}
.qcard .qnum { font-family:'IBM Plex Mono',monospace; color:var(--lime); font-size:.78rem; margin-bottom:8px; letter-spacing:1px;}
.qcard .qtext { font-size:1.02rem; margin-bottom:18px; }
.qcard .qtext .th-text { color:#aaa; font-size:.88rem; margin-top:6px; display:block; }

.choice {
  display:flex; align-items:flex-start; gap:12px;
  border:1px solid var(--border); border-radius:10px; padding:13px 14px; margin-bottom:10px;
  cursor:pointer; transition: all .15s ease;
}
.choice:hover { border-color:#555; }
.choice.selected { border-color: var(--lime); background: rgba(200,241,53,0.06); }
.choice .letter {
  flex-shrink:0; width:26px; height:26px; border-radius:50%; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace;
  font-size:.78rem; color:var(--muted);
}
.choice.selected .letter { background: var(--lime); color:#111; border-color: var(--lime); font-weight:700; }
.choice .ctext { font-size:.92rem; flex:1; }
.choice.checkbox .letter { border-radius:6px; }

.nav-row { display:flex; justify-content:space-between; gap:12px; margin-top: 24px; }

/* Modal (replaces window.confirm) */
.modal-overlay {
  position: fixed; inset:0; background: rgba(0,0,0,0.72); backdrop-filter: blur(3px);
  display:none; align-items:center; justify-content:center; z-index: 999; padding: 20px;
}
.modal-overlay.show { display:flex; }
.modal-box {
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
  padding: 26px; max-width: 400px; width:100%; text-align:center;
}
.modal-box h3 { margin-bottom:12px; font-size:1.1rem; }
.modal-box p { color:var(--muted); font-size:.88rem; margin-bottom:22px; }
.modal-actions { display:flex; gap:10px; justify-content:center; }

/* Results screen */
.score-ring-wrap { display:flex; justify-content:center; margin: 24px 0; }
.score-center { font-family:'IBM Plex Mono',monospace; font-size:2.4rem; font-weight:700; }
.grade-badge {
  display:inline-block; padding:6px 18px; border-radius:20px; font-weight:700; font-size:.85rem;
  letter-spacing:1px; margin-top:6px;
}
.grade-fail { background: rgba(255,77,77,0.15); color: var(--red); }
.grade-pass { background: rgba(77,159,255,0.15); color: var(--blue); }
.grade-master { background: rgba(77,255,145,0.15); color: var(--green); }

.stats-row { display:flex; justify-content:center; gap:24px; margin: 18px 0 30px; flex-wrap:wrap; }
.stat { text-align:center; }
.stat .num { font-family:'IBM Plex Mono',monospace; font-size:1.3rem; font-weight:700; }
.stat .lbl { font-size:.72rem; color:var(--muted); letter-spacing:1px; margin-top:2px;}

.review-item {
  background: var(--surface); border:1px solid var(--border); border-radius: var(--radius);
  margin-bottom:12px; overflow:hidden;
}
.review-head {
  padding: 14px 18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer;
  gap: 12px;
}
.review-head .qsummary { font-size:.88rem; flex:1; }
.review-head .status { flex-shrink:0; font-size:1.1rem; }
.review-body { max-height:0; overflow:hidden; transition: max-height .3s ease; padding:0 18px; }
.review-body.open { max-height: 2000px; padding: 0 18px 18px; }
.review-choice { font-size:.85rem; padding:8px 10px; border-radius:8px; margin-bottom:6px; border:1px solid var(--border); }
.review-choice.correct-answer { border-color: var(--green); background: rgba(77,255,145,0.06); }
.review-choice.wrong-selected { border-color: var(--red); background: rgba(255,77,77,0.06); }
.explanation { font-size:.85rem; color:#bbb; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); }
.explanation .th-exp { color:#999; margin-top:8px; display:block; }

.hidden { display:none !important; }
.footer-note { text-align:center; color:var(--muted); font-size:.72rem; margin-top:40px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <h1>SPACEZ</h1>
    <p>EXAM HUB · CEWA14</p>
  </div>

  <!-- PORTAL SCREEN -->
  <div id="portalScreen">
    <div class="exam-title" data-i18n="examTitleTh" data-i18n-en="CEWA Mock Exam 14">CEWA Mock Exam 14</div>
    <div class="exam-sub">Certified Elliott Wave Analyst — Full Practice Suite</div>

    <div class="lang-toggle-row">
      <button class="lang-btn active" data-lang="en" onclick="setUiLang('en')">EN</button>
      <button class="lang-btn" data-lang="th" onclick="setUiLang('th')">TH</button>
    </div>

    <div class="variant-grid" id="variantGrid"></div>

    <div class="start-btn-row">
      <button class="btn-primary" id="startBtn" disabled onclick="startExam()">Select a variant to begin</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="hud">
      <div class="progress-text" id="progressText">Q1 / 50</div>
      <div class="timer" id="timerDisplay">45:00</div>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div id="qContainer"></div>
    <div class="nav-row">
      <button class="btn-secondary" id="prevBtn" onclick="navQ(-1)">‹ Prev</button>
      <button class="btn-primary" id="nextBtn" onclick="navQ(1)">Next ›</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen" class="hidden">
    <div class="score-ring-wrap">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle cx="90" cy="90" r="78" stroke="#2e2e2e" stroke-width="12" fill="none"/>
        <circle id="scoreArc" cx="90" cy="90" r="78" stroke="#c8f135" stroke-width="12" fill="none"
          stroke-linecap="round" stroke-dasharray="490" stroke-dashoffset="490"
          transform="rotate(-90 90 90)" style="transition: stroke-dashoffset 1.2s ease;"/>
        <text x="90" y="82" text-anchor="middle" fill="#f0f0f0" font-family="IBM Plex Mono" font-size="34" font-weight="700" id="scorePctText">0%</text>
        <text x="90" y="106" text-anchor="middle" fill="#777" font-family="IBM Plex Mono" font-size="12" id="scoreFracText">0/0</text>
      </svg>
    </div>
    <div style="text-align:center;">
      <span class="grade-badge" id="gradeBadge">—</span>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="num" id="statCorrect">0</div><div class="lbl">CORRECT</div></div>
      <div class="stat"><div class="num" id="statWrong">0</div><div class="lbl">WRONG</div></div>
      <div class="stat"><div class="num" id="statTime">0:00</div><div class="lbl">TIME USED</div></div>
    </div>
    <div id="reviewContainer"></div>
    <div class="start-btn-row">
      <button class="btn-secondary" onclick="location.reload()">← Back to Portal</button>
    </div>
  </div>

  <div class="footer-note">SPACEZ Exam Hub — CEWA14 · Frost &amp; Prechter / EWI Standard</div>
</div>

<!-- Custom modal (replaces window.confirm — blocked in LINE/in-app webviews) -->
<div class="modal-overlay" id="submitModal">
  <div class="modal-box">
    <h3 id="modalTitle">Submit Exam?</h3>
    <p id="modalBody">You still have unanswered questions. Are you sure you want to submit?</p>
    <div class="modal-actions">
      <button class="btn-secondary" data-action="cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" data-action="confirm" onclick="confirmSubmit()">Submit</button>
    </div>
  </div>
</div>

<script>
/* ====== QUESTION DATA ====== */
const QUESTION_BANK = {"v1": [{"id": "v1q01", "text": "According to Elliott Wave rules, which statement about Wave 2 is correct?", "choices": [{"id": "v1q01_a", "letter": "a", "text": "Wave 2 can move beyond the origin of Wave 1 in a strong trend"}, {"id": "v1q01_b", "letter": "b", "text": "Wave 2 can retrace the entirety of Wave 1 but never move beyond its starting point"}, {"id": "v1q01_c", "letter": "c", "text": "Wave 2 must always retrace at least 61.8% of Wave 1"}, {"id": "v1q01_d", "letter": "d", "text": "Wave 2 must be shorter in time than Wave 4"}], "correct": ["b"], "expEn": "This is one of the three inviolable rules: Wave 2 can retrace up to but not beyond the starting point of Wave 1. If price moves beyond that origin, the count is invalid.", "expTh": "นี่คือหนึ่งในกฎเหล็กสามข้อ: Wave 2 สามารถย่อกลับได้เกือบทั้งหมดของ Wave 1 แต่ห้ามเคลื่อนที่เลยจุดเริ่มต้นของ Wave 1 หากราคาทะลุจุดเริ่มต้นนั้น การนับคลื่นถือว่าใช้ไม่ได้"}, {"id": "v1q02", "text": "Which of the following is an absolute rule (not a guideline) in Elliott Wave analysis?", "choices": [{"id": "v1q02_a", "letter": "a", "text": "Wave 4 must retrace exactly 38.2% of Wave 3"}, {"id": "v1q02_b", "letter": "b", "text": "Wave 3 can never be the shortest among waves 1, 3, and 5"}, {"id": "v1q02_c", "letter": "c", "text": "Wave 4 must exhibit alternation with Wave 2"}, {"id": "v1q02_d", "letter": "d", "text": "Wave 5 must exceed the length of Wave 3"}], "correct": ["b"], "expEn": "Wave 3 being the shortest of waves 1, 3, and 5 is never allowed; it can be the longest or the middle-length wave, but never the shortest. Alternation and Fibonacci ratios are guidelines, not rules.", "expTh": "กฎเหล็กระบุว่า Wave 3 ห้ามเป็นคลื่นที่สั้นที่สุดเมื่อเทียบกับ Wave 1 และ Wave 5 (แต่สามารถเป็นคลื่นที่ยาวที่สุดหรือกลางได้) ส่วน alternation และอัตราส่วน Fibonacci เป็นเพียงแนวทาง (guideline) ไม่ใช่กฎตายตัว"}, {"id": "v1q03", "text": "In a standard (non-diagonal) impulse wave, what is the rule regarding Wave 4?", "choices": [{"id": "v1q03_a", "letter": "a", "text": "Wave 4 must not enter the price territory of Wave 1"}, {"id": "v1q03_b", "letter": "b", "text": "Wave 4 must be equal in time to Wave 2"}, {"id": "v1q03_c", "letter": "c", "text": "Wave 4 must retrace more than Wave 2"}, {"id": "v1q03_d", "letter": "d", "text": "Wave 4 must always form a triangle"}], "correct": ["a"], "expEn": "In a standard impulse, Wave 4 may not overlap the price territory of Wave 1 (this overlap rule is relaxed only in diagonal triangles). This preserves the five-wave structure's integrity.", "expTh": "ใน impulse wave แบบมาตรฐาน Wave 4 ห้ามเคลื่อนที่เข้าไปในอาณาเขตราคาของ Wave 1 (กฎการ overlap นี้จะผ่อนปรนเฉพาะใน diagonal triangle เท่านั้น) เพื่อรักษาโครงสร้างห้าคลื่นให้ถูกต้อง"}, {"id": "v1q04", "text": "Which wave in a five-wave impulse is most frequently the one that extends?", "choices": [{"id": "v1q04_a", "letter": "a", "text": "Wave 1"}, {"id": "v1q04_b", "letter": "b", "text": "Wave 3"}, {"id": "v1q04_c", "letter": "c", "text": "Wave 2"}, {"id": "v1q04_d", "letter": "d", "text": "Wave 4"}], "correct": ["b"], "expEn": "Wave 3 is statistically the most common wave to extend, often displaying the steepest slope and highest volume, though extensions can occur in Wave 1 or Wave 5 as well.", "expTh": "Wave 3 เป็นคลื่นที่มีสถิติการยืดตัว (extension) บ่อยที่สุด มักมีความชันสูงและปริมาณการซื้อขายมากที่สุด แม้ว่า extension อาจเกิดใน Wave 1 หรือ Wave 5 ได้เช่นกัน"}, {"id": "v1q05", "text": "What is 'truncation' in Elliott Wave terminology?", "choices": [{"id": "v1q05_a", "letter": "a", "text": "When Wave 5 fails to move beyond the end of Wave 3"}, {"id": "v1q05_b", "letter": "b", "text": "When Wave 4 overlaps Wave 1"}, {"id": "v1q05_c", "letter": "c", "text": "When Wave 2 retraces 100% of Wave 1"}, {"id": "v1q05_d", "letter": "d", "text": "When a corrective wave subdivides into five waves"}], "correct": ["a"], "expEn": "A truncated fifth occurs when Wave 5 fails to exceed the terminus of Wave 3, often signaling underlying weakness. It is a recognized but relatively rare variation.", "expTh": "Truncated fifth คือกรณีที่ Wave 5 ไม่สามารถเคลื่อนที่ผ่านจุดสิ้นสุดของ Wave 3 ได้ ซึ่งมักบ่งชี้ถึงความอ่อนแอของแนวโน้ม เป็นรูปแบบที่ได้รับการยอมรับแต่พบได้ไม่บ่อยนัก"}, {"id": "v1q06", "text": "In Elliott Wave theory, motive waves subdivide into how many sub-waves?", "choices": [{"id": "v1q06_a", "letter": "a", "text": "Seven"}, {"id": "v1q06_b", "letter": "b", "text": "Three"}, {"id": "v1q06_c", "letter": "c", "text": "Nine"}, {"id": "v1q06_d", "letter": "d", "text": "Five"}], "correct": ["d"], "expEn": "Motive waves (impulses and diagonals) always subdivide into five sub-waves, labeled 1-2-3-4-5, reflecting the trend's direction.", "expTh": "Motive wave (ทั้ง impulse และ diagonal) จะแบ่งย่อยเป็น 5 คลื่นเสมอ โดยมีป้ายกำกับ 1-2-3-4-5 สะท้อนทิศทางของแนวโน้มหลัก"}, {"id": "v1q07", "text": "Corrective waves typically subdivide into how many sub-waves?", "choices": [{"id": "v1q07_a", "letter": "a", "text": "Eight"}, {"id": "v1q07_b", "letter": "b", "text": "Thirteen"}, {"id": "v1q07_c", "letter": "c", "text": "Three"}, {"id": "v1q07_d", "letter": "d", "text": "Five"}], "correct": ["c"], "expEn": "Corrective waves generally subdivide into three sub-waves (labeled a-b-c), reflecting the counter-trend, overlapping nature typical of corrections.", "expTh": "Corrective wave โดยทั่วไปจะแบ่งย่อยเป็น 3 คลื่น (a-b-c) สะท้อนลักษณะการเคลื่อนไหวสวนแนวโน้มและมีการ overlap กัน"}, {"id": "v1q08", "text": "Which of the following best describes an impulse wave?", "choices": [{"id": "v1q08_a", "letter": "a", "text": "A five-wave structure moving with the larger trend, with waves 1, 3, 5 as motive and 2, 4 as corrective"}, {"id": "v1q08_b", "letter": "b", "text": "A corrective structure composed of two zigzags joined by an X wave"}, {"id": "v1q08_c", "letter": "c", "text": "A three-wave structure moving against the larger trend"}, {"id": "v1q08_d", "letter": "d", "text": "A five-wave structure where wave 4 always overlaps wave 1"}], "correct": ["a"], "expEn": "An impulse is a five-wave motive structure trending with the larger degree, where waves 1, 3, 5 move in the trend direction and waves 2, 4 are corrective interruptions.", "expTh": "Impulse wave คือโครงสร้าง 5 คลื่นที่เคลื่อนที่ไปในทิศทางเดียวกับแนวโน้มใหญ่ โดย wave 1, 3, 5 เป็นคลื่นเชิงรุก (motive) ส่วน wave 2 และ 4 เป็นคลื่นปรับฐาน (corrective)"}, {"id": "v1q09", "text": "What distinguishes a diagonal triangle from a standard impulse wave?", "choices": [{"id": "v1q09_a", "letter": "a", "text": "A diagonal never appears at the start of a trend"}, {"id": "v1q09_b", "letter": "b", "text": "A diagonal cannot appear at the end of a trend"}, {"id": "v1q09_c", "letter": "c", "text": "A diagonal allows wave 4 to overlap wave 1's price territory"}, {"id": "v1q09_d", "letter": "d", "text": "A diagonal has only three waves"}], "correct": ["c"], "expEn": "Unlike a standard impulse, diagonal triangles permit overlap between waves 1 and 4 because the diagonal's converging trendlines create a wedge shape reflecting waning momentum.", "expTh": "ต่างจาก impulse มาตรฐาน diagonal triangle อนุญาตให้ wave 4 ทับซ้อนกับอาณาเขตราคาของ wave 1 ได้ เนื่องจากเส้นแนวโน้มที่บรรจบกันสร้างรูปทรงลิ่มซึ่งสะท้อนโมเมนตัมที่อ่อนแรงลง"}, {"id": "v1q10", "text": "An ending diagonal typically appears in which wave position?", "choices": [{"id": "v1q10_a", "letter": "a", "text": "Wave 1 or wave A of a large impulse"}, {"id": "v1q10_b", "letter": "b", "text": "Wave 5 of an impulse or wave C of a correction"}, {"id": "v1q10_c", "letter": "c", "text": "Wave B of a flat correction"}, {"id": "v1q10_d", "letter": "d", "text": "Wave 2 or wave 4 only"}], "correct": ["b"], "expEn": "Ending diagonals form in terminal positions — Wave 5 of an impulse or Wave C of a correction — signaling the exhaustion of the preceding move.", "expTh": "Ending diagonal มักปรากฏในตำแหน่งท้ายสุดของแนวโน้ม เช่น Wave 5 ของ impulse หรือ Wave C ของ correction ซึ่งบ่งบอกถึงการหมดแรงของการเคลื่อนไหวก่อนหน้า"}, {"id": "v1q11", "text": "The Guideline of Alternation suggests that:", "choices": [{"id": "v1q11_a", "letter": "a", "text": "Wave 1 and Wave 5 must always be equal in length"}, {"id": "v1q11_b", "letter": "b", "text": "Wave 2 must always be longer than Wave 4"}, {"id": "v1q11_c", "letter": "c", "text": "Wave 2 and Wave 4 will likely differ in form (e.g., sharp vs. sideways)"}, {"id": "v1q11_d", "letter": "d", "text": "Wave 3 must always be a zigzag"}], "correct": ["c"], "expEn": "Alternation suggests that if Wave 2 is a sharp correction, Wave 4 will likely be sideways (or vice versa), helping analysts anticipate the character of the next corrective wave.", "expTh": "แนวทาง Alternation ชี้ว่าหาก Wave 2 เป็นการปรับฐานแบบรุนแรง (sharp) แล้ว Wave 4 มักจะเป็นแบบเคลื่อนที่ด้านข้าง (sideways) หรือกลับกัน ช่วยให้นักวิเคราะห์คาดการณ์ลักษณะของคลื่นปรับฐานถัดไปได้"}, {"id": "v1q12", "text": "When Wave 3 extends significantly, which relationship is commonly observed between Wave 1 and Wave 5?", "choices": [{"id": "v1q12_a", "letter": "a", "text": "Wave 1 must retrace 100% of Wave 5"}, {"id": "v1q12_b", "letter": "b", "text": "Wave 5 tends to approach equality with Wave 1"}, {"id": "v1q12_c", "letter": "c", "text": "Wave 5 must always truncate"}, {"id": "v1q12_d", "letter": "d", "text": "Wave 1 becomes irrelevant to the count"}], "correct": ["b"], "expEn": "When Wave 3 is extended, Waves 1 and 5 often display near-equality in length or time, a commonly observed guideline (not a strict rule) in impulse structures.", "expTh": "เมื่อ Wave 3 ยืดตัวอย่างมาก มักพบว่า Wave 1 และ Wave 5 มีความยาวหรือระยะเวลาใกล้เคียงกัน ซึ่งเป็นแนวทางที่พบได้บ่อย (ไม่ใช่กฎตายตัว) ในโครงสร้าง impulse"}, {"id": "v1q13", "text": "What is the purpose of drawing a trend channel in Elliott Wave analysis?", "choices": [{"id": "v1q13_a", "letter": "a", "text": "To help project likely termination points for Waves 4 and 5"}, {"id": "v1q13_b", "letter": "b", "text": "To eliminate the need for wave counting"}, {"id": "v1q13_c", "letter": "c", "text": "To determine the exact Fibonacci ratio of Wave 2"}, {"id": "v1q13_d", "letter": "d", "text": "To confirm that Wave 3 is the shortest wave"}], "correct": ["a"], "expEn": "Channeling techniques—drawing parallel lines through wave endpoints—help project where Waves 4 and 5 are likely to terminate, offering a visual guide alongside Fibonacci analysis.", "expTh": "เทคนิคการตีกรอบแนวโน้ม (channeling) โดยลากเส้นขนานผ่านจุดสิ้นสุดของคลื่น ช่วยคาดการณ์ตำแหน่งที่ Wave 4 และ Wave 5 น่าจะสิ้นสุด เป็นเครื่องมือเสริมควบคู่กับการวิเคราะห์ Fibonacci"}, {"id": "v1q14", "text": "If Wave 1 and Wave 3 are both roughly equal in length, what is a common Fibonacci expectation for Wave 5?", "choices": [{"id": "v1q14_a", "letter": "a", "text": "Wave 5 will equal approximately 61.8% of the distance from the start of Wave 1 to the end of Wave 3"}, {"id": "v1q14_b", "letter": "b", "text": "Wave 5 will always retrace 100% of Wave 4"}, {"id": "v1q14_c", "letter": "c", "text": "Wave 5 will be exactly double the length of Wave 4"}, {"id": "v1q14_d", "letter": "d", "text": "Wave 5 cannot be measured using Fibonacci ratios"}], "correct": ["a"], "expEn": "When Waves 1 and 3 are similar in length, Wave 5 often approximates 61.8% of the net travel from the start of Wave 1 to the end of Wave 3, per common EWI measurement techniques.", "expTh": "เมื่อ Wave 1 และ Wave 3 มีความยาวใกล้เคียงกัน Wave 5 มักมีความยาวประมาณ 61.8% ของระยะทางรวมจากจุดเริ่มต้น Wave 1 ถึงจุดสิ้นสุด Wave 3 ตามเทคนิคการวัดที่ใช้กันทั่วไปของ EWI"}, {"id": "v1q15", "text": "Which wave personality trait is most associated with Wave 3?", "choices": [{"id": "v1q15_a", "letter": "a", "text": "A sideways, triangular consolidation"}, {"id": "v1q15_b", "letter": "b", "text": "Hesitant, choppy movement with low volume"}, {"id": "v1q15_c", "letter": "c", "text": "The weakest and shortest wave of the sequence"}, {"id": "v1q15_d", "letter": "d", "text": "Widest participation, strongest momentum, and heaviest volume"}], "correct": ["d"], "expEn": "Wave 3 typically displays the strongest momentum, broadest participation, and highest volume, as the trend becomes obvious to the wider market.", "expTh": "Wave 3 มักแสดงลักษณะโมเมนตัมที่แข็งแกร่งที่สุด มีผู้เข้าร่วมตลาดกว้างขวางที่สุด และปริมาณการซื้อขายสูงที่สุด เนื่องจากแนวโน้มเริ่มชัดเจนต่อตลาดในวงกว้าง"}, {"id": "v1q16", "text": "Wave 1 in an impulse is typically characterized by:", "choices": [{"id": "v1q16_a", "letter": "a", "text": "Being the longest wave in the sequence"}, {"id": "v1q16_b", "letter": "b", "text": "Extremely high volume and universal market recognition"}, {"id": "v1q16_c", "letter": "c", "text": "Never subdividing into five waves"}, {"id": "v1q16_d", "letter": "d", "text": "Being mistaken for a mere correction of the prior trend"}], "correct": ["d"], "expEn": "Wave 1 often occurs at the start of a new trend when sentiment is still bearish (in an up-move) or bullish (in a down-move), so it is frequently mistaken for a countertrend correction.", "expTh": "Wave 1 มักเกิดขึ้นในช่วงเริ่มต้นของแนวโน้มใหม่ ขณะที่ความเชื่อมั่นตลาดยังคงเป็นลบ (ในกรณีขาขึ้น) หรือเป็นบวก (ในกรณีขาลง) จึงมักถูกเข้าใจผิดว่าเป็นเพียงการปรับฐานของแนวโน้มเดิม"}, {"id": "v1q17", "text": "What typically characterizes Wave 5 in terms of momentum indicators like the Awesome Oscillator?", "choices": [{"id": "v1q17_a", "letter": "a", "text": "Bearish divergence often appears as price makes new highs on weakening momentum"}, {"id": "v1q17_b", "letter": "b", "text": "Volume is typically the highest of the entire cycle"}, {"id": "v1q17_c", "letter": "c", "text": "Momentum is always stronger than in Wave 3"}, {"id": "v1q17_d", "letter": "d", "text": "Wave 5 always fails to reach a new price extreme"}], "correct": ["a"], "expEn": "Wave 5 commonly shows momentum divergence—price reaches a new extreme while oscillators like the AO show weaker readings than during Wave 3—signaling waning strength.", "expTh": "Wave 5 มักแสดงการแยกทางของโมเมนตัม (divergence) กล่าวคือราคาทำจุดสูงสุด/ต่ำสุดใหม่ แต่ oscillator เช่น Awesome Oscillator กลับอ่อนแรงกว่าช่วง Wave 3 ซึ่งบ่งชี้ถึงแรงส่งที่ลดลง"}, {"id": "v1q18", "text": "In terms of the Wave 2 guideline, which statement is most accurate?", "choices": [{"id": "v1q18_a", "letter": "a", "text": "Wave 2 must subdivide into five waves"}, {"id": "v1q18_b", "letter": "b", "text": "Wave 2 often retraces a large portion of Wave 1, frequently near the 61.8% or deeper Fibonacci level"}, {"id": "v1q18_c", "letter": "c", "text": "Wave 2 always forms a triangle"}, {"id": "v1q18_d", "letter": "d", "text": "Wave 2 typically only retraces 10% of Wave 1"}], "correct": ["b"], "expEn": "Wave 2 frequently retraces a deep portion of Wave 1—commonly around the 61.8% level or deeper—though it must not exceed 100% (the start of Wave 1).", "expTh": "Wave 2 มักย่อกลับเป็นสัดส่วนที่ค่อนข้างมากของ Wave 1 บ่อยครั้งใกล้ระดับ 61.8% หรือลึกกว่านั้น แต่ต้องไม่เกิน 100% (จุดเริ่มต้นของ Wave 1)"}, {"id": "v1q19", "text": "Which guideline concerns the relationship between Wave 4's low and Wave 2's territory in a strongly trending impulse?", "choices": [{"id": "v1q19_a", "letter": "a", "text": "Wave 4 must always be deeper than Wave 2"}, {"id": "v1q19_b", "letter": "b", "text": "Wave 4 always forms a zigzag"}, {"id": "v1q19_c", "letter": "c", "text": "Wave 4 typically does not overlap Wave 2's price territory, and often finds support near the prior fourth wave of one lesser degree"}, {"id": "v1q19_d", "letter": "d", "text": "Wave 4 must equal Wave 2 in both price and time"}], "correct": ["c"], "expEn": "A well-known guideline (not a rule) is that Wave 4 often terminates near the territory of the previous fourth wave of one lesser degree, offering a useful support/resistance reference.", "expTh": "แนวทางที่รู้จักกันดี (ไม่ใช่กฎ) คือ Wave 4 มักสิ้นสุดใกล้บริเวณ fourth wave ระดับย่อยก่อนหน้า (wave 4 ของดีกรีที่เล็กกว่า) ซึ่งเป็นจุดอ้างอิงแนวรับ/แนวต้านที่มีประโยชน์"}, {"id": "v1q20", "text": "What does 'equality guideline' commonly refer to in impulse waves?", "choices": [{"id": "v1q20_a", "letter": "a", "text": "Waves 1 and 5 tend to be equal in length when Wave 3 is extended"}, {"id": "v1q20_b", "letter": "b", "text": "Wave 2 and Wave 4 are always equal in time"}, {"id": "v1q20_c", "letter": "c", "text": "All five waves must be identical in length"}, {"id": "v1q20_d", "letter": "d", "text": "Wave 3 must equal Wave 1 exactly"}], "correct": ["a"], "expEn": "The equality guideline observes that when Wave 3 extends, Waves 1 and 5 tend toward similar magnitude, useful for projecting Wave 5's likely target.", "expTh": "แนวทาง equality สังเกตว่าเมื่อ Wave 3 ยืดตัว Wave 1 และ Wave 5 มักมีขนาดใกล้เคียงกัน ซึ่งมีประโยชน์ในการประมาณเป้าหมายของ Wave 5"}, {"id": "v1q21", "text": "Which Fibonacci ratio is most commonly associated with Wave 2 retracements?", "choices": [{"id": "v1q21_a", "letter": "a", "text": "23.6% of Wave 1"}, {"id": "v1q21_b", "letter": "b", "text": "161.8% of Wave 1"}, {"id": "v1q21_c", "letter": "c", "text": "423.6% of Wave 1"}, {"id": "v1q21_d", "letter": "d", "text": "50% to 61.8% of Wave 1"}], "correct": ["d"], "expEn": "Wave 2 retracements commonly fall in the 50% to 61.8% range of Wave 1, reflecting a deep but not complete retracement.", "expTh": "การย่อของ Wave 2 มักอยู่ในช่วง 50% ถึง 61.8% ของ Wave 1 สะท้อนการย่อที่ค่อนข้างลึกแต่ไม่ถึงกับกลับไปจุดเริ่มต้น"}, {"id": "v1q22", "text": "Which Fibonacci extension is frequently used to project the length of an extended Wave 3?", "choices": [{"id": "v1q22_a", "letter": "a", "text": "38.2% of Wave 1"}, {"id": "v1q22_b", "letter": "b", "text": "161.8% of Wave 1"}, {"id": "v1q22_c", "letter": "c", "text": "78.6% of Wave 1"}, {"id": "v1q22_d", "letter": "d", "text": "23.6% of Wave 1"}], "correct": ["b"], "expEn": "An extended Wave 3 is commonly projected at 161.8% of Wave 1's length, one of the most frequently observed Fibonacci relationships in impulse waves.", "expTh": "Wave 3 ที่ยืดตัวมักถูกประมาณที่ 161.8% ของความยาว Wave 1 ซึ่งเป็นความสัมพันธ์ Fibonacci ที่พบได้บ่อยที่สุดใน impulse wave"}, {"id": "v1q23", "text": "Wave 4 retracements of Wave 3 most commonly fall around which Fibonacci level?", "choices": [{"id": "v1q23_a", "letter": "a", "text": "161.8%"}, {"id": "v1q23_b", "letter": "b", "text": "100%"}, {"id": "v1q23_c", "letter": "c", "text": "38.2%"}, {"id": "v1q23_d", "letter": "d", "text": "78.6%"}], "correct": ["c"], "expEn": "Wave 4 typically retraces around 38.2% of Wave 3, reflecting a shallower correction consistent with the alternation guideline when Wave 2 was deep.", "expTh": "Wave 4 มักย่อกลับประมาณ 38.2% ของ Wave 3 สะท้อนการปรับฐานที่ตื้นกว่า สอดคล้องกับแนวทาง alternation หากก่อนหน้านี้ Wave 2 ย่อลึก"}, {"id": "v1q24", "text": "In a zigzag correction (A-B-C), Wave C is frequently related to Wave A by which ratio?", "choices": [{"id": "v1q24_a", "letter": "a", "text": "Always exactly 23.6% of Wave A"}, {"id": "v1q24_b", "letter": "b", "text": "Always exactly double Wave B"}, {"id": "v1q24_c", "letter": "c", "text": "Never more than 20% of Wave A"}, {"id": "v1q24_d", "letter": "d", "text": "Equal to Wave A, or 161.8% of Wave A"}], "correct": ["d"], "expEn": "Wave C in a zigzag is frequently equal to Wave A in length, or extends to 161.8% of Wave A, both being common Fibonacci relationships in this pattern.", "expTh": "Wave C ใน zigzag มักมีความยาวเท่ากับ Wave A หรือยืดออกไปถึง 161.8% ของ Wave A ซึ่งเป็นความสัมพันธ์ Fibonacci ที่พบได้บ่อยในรูปแบบนี้"}, {"id": "v1q25", "text": "In a flat correction, Wave B typically retraces what portion of Wave A?", "choices": [{"id": "v1q25_a", "letter": "a", "text": "Exactly 50%"}, {"id": "v1q25_b", "letter": "b", "text": "Never more than 38.2%"}, {"id": "v1q25_c", "letter": "c", "text": "Only around 10%-20%"}, {"id": "v1q25_d", "letter": "d", "text": "90% or more, sometimes exceeding 100%"}], "correct": ["d"], "expEn": "In a regular or expanded flat, Wave B retraces a large portion of Wave A—90% or more, and in expanded flats can exceed 100% of Wave A's length.", "expTh": "ใน flat correction (ทั้งแบบ regular และ expanded) Wave B มักย่อกลับเป็นสัดส่วนมากของ Wave A คือ 90% ขึ้นไป และใน expanded flat อาจเกิน 100% ของความยาว Wave A ได้"}, {"id": "v1q26", "text": "Which Fibonacci ratio commonly describes Wave 5's length when Wave 3 is not extended?", "choices": [{"id": "v1q26_a", "letter": "a", "text": "Wave 5 always equals 261.8% of Wave 1"}, {"id": "v1q26_b", "letter": "b", "text": "Wave 5 must equal Wave 4"}, {"id": "v1q26_c", "letter": "c", "text": "Wave 5 approximates 61.8% of the length of Waves 1 through 3"}, {"id": "v1q26_d", "letter": "d", "text": "Wave 5 is unrelated to any prior wave by Fibonacci ratio"}], "correct": ["c"], "expEn": "When Wave 3 is not the extended wave, Wave 5 often approximates 61.8% of the net distance traveled from the start of Wave 1 through the end of Wave 3.", "expTh": "เมื่อ Wave 3 ไม่ใช่คลื่นที่ยืดตัว Wave 5 มักมีความยาวประมาณ 61.8% ของระยะทางสุทธิที่เคลื่อนที่จากจุดเริ่มต้น Wave 1 ถึงจุดสิ้นสุด Wave 3"}, {"id": "v1q27", "text": "Which statement about Fibonacci time relationships in Elliott Wave analysis is accurate?", "choices": [{"id": "v1q27_a", "letter": "a", "text": "Fibonacci time analysis guarantees exact turning points"}, {"id": "v1q27_b", "letter": "b", "text": "Fibonacci ratios apply only to price, never to time"}, {"id": "v1q27_c", "letter": "c", "text": "Time spans between wave turning points can sometimes align with Fibonacci numbers, but this is a secondary tool used with caution"}, {"id": "v1q27_d", "letter": "d", "text": "Fibonacci time is more reliable than Fibonacci price and should always take precedence"}], "correct": ["c"], "expEn": "Fibonacci time analysis is a supplementary, lower-confidence tool—turning points sometimes cluster near Fibonacci time counts, but practitioners treat it as secondary to price-based wave structure.", "expTh": "การวิเคราะห์ Fibonacci ด้านเวลาเป็นเครื่องมือเสริมที่มีความน่าเชื่อถือรองลงมา — จุดกลับตัวบางครั้งใกล้เคียงกับจำนวน Fibonacci ด้านเวลา แต่นักวิเคราะห์มักถือเป็นเครื่องมือรองจากโครงสร้างคลื่นที่อิงราคา"}, {"id": "v1q28", "text": "What Fibonacci relationship is often seen between an ending diagonal's Wave 5 and Wave 1?", "choices": [{"id": "v1q28_a", "letter": "a", "text": "Wave 5 always exceeds Wave 1 by 261.8%"}, {"id": "v1q28_b", "letter": "b", "text": "Wave 5 often approximates 38.2% or 61.8% of Wave 1 due to the diagonal's contracting structure"}, {"id": "v1q28_c", "letter": "c", "text": "Wave 5 must always equal Wave 3"}, {"id": "v1q28_d", "letter": "d", "text": "Wave 5 has no Fibonacci relationship in diagonals"}], "correct": ["b"], "expEn": "Because ending diagonals contract, later waves tend to be shorter than earlier ones; Wave 5 often measures 38.2% to 61.8% of Wave 1, consistent with the wedge's narrowing shape.", "expTh": "เนื่องจาก ending diagonal มีโครงสร้างบีบแคบลง คลื่นในภายหลังมักสั้นกว่าคลื่นก่อนหน้า Wave 5 มักมีความยาวประมาณ 38.2% ถึง 61.8% ของ Wave 1 ซึ่งสอดคล้องกับรูปทรงลิ่มที่แคบลง"}, {"id": "v1q29", "text": "When measuring a corrective triangle's waves (A-B-C-D-E), what Fibonacci ratio commonly applies between adjacent waves?", "choices": [{"id": "v1q29_a", "letter": "a", "text": "There is no measurable relationship among triangle waves"}, {"id": "v1q29_b", "letter": "b", "text": "Each subsequent wave often relates to the prior by approximately 61.8%"}, {"id": "v1q29_c", "letter": "c", "text": "Waves expand by 261.8% at each stage"}, {"id": "v1q29_d", "letter": "d", "text": "Each wave is exactly equal in length"}], "correct": ["b"], "expEn": "In contracting triangles, each wave (B, C, D, E) commonly relates to the wave two positions prior by approximately 61.8%, reflecting the pattern's converging geometry.", "expTh": "ใน contracting triangle แต่ละคลื่น (B, C, D, E) มักมีความสัมพันธ์กับคลื่นสองตำแหน่งก่อนหน้าประมาณ 61.8% สะท้อนรูปทรงเรขาคณิตที่บีบเข้าหากันของรูปแบบนี้"}, {"id": "v1q30", "text": "If Wave 1 = 100 points and Wave 3 extends to 261.8% of Wave 1, what is the length of Wave 3?", "choices": [{"id": "v1q30_a", "letter": "a", "text": "100 points"}, {"id": "v1q30_b", "letter": "b", "text": "38.2 points"}, {"id": "v1q30_c", "letter": "c", "text": "161.8 points"}, {"id": "v1q30_d", "letter": "d", "text": "261.8 points"}], "correct": ["d"], "expEn": "261.8% of 100 points equals 261.8 points, a common extension ratio applied when Wave 3 is the extended wave in a powerful impulse.", "expTh": "261.8% ของ 100 จุด เท่ากับ 261.8 จุด ซึ่งเป็นอัตราส่วนการยืดตัวที่พบได้บ่อยเมื่อ Wave 3 เป็นคลื่นที่ยืดตัวในแนวโน้มที่แข็งแกร่ง"}, {"id": "v1q31", "text": "What is the defining feature of a 'running' flat correction?", "choices": [{"id": "v1q31_a", "letter": "a", "text": "Wave C always exceeds Wave A by 161.8%"}, {"id": "v1q31_b", "letter": "b", "text": "Wave B retraces less than 50% of Wave A"}, {"id": "v1q31_c", "letter": "c", "text": "It always subdivides into five waves instead of three"}, {"id": "v1q31_d", "letter": "d", "text": "Wave B exceeds the start of Wave A, and Wave C fails to travel as far as Wave A's terminus"}], "correct": ["d"], "expEn": "In a running flat, Wave B moves beyond the origin of Wave A (a strong sign of underlying trend strength), while Wave C falls short of reaching Wave A's terminus — a relatively rare, bullish/bearish continuation signal.", "expTh": "ใน running flat นั้น Wave B เคลื่อนที่เลยจุดเริ่มต้นของ Wave A ไป (สัญญาณของแนวโน้มที่แข็งแกร่ง) ในขณะที่ Wave C ไปไม่ถึงจุดสิ้นสุดของ Wave A ถือเป็นรูปแบบที่พบได้ไม่บ่อยและมักบ่งชี้การไปต่อของแนวโน้มเดิม"}, {"id": "v1q32", "text": "Which corrective pattern consists of a 3-3-5 wave structure where wave B travels beyond the start of wave A?", "choices": [{"id": "v1q32_a", "letter": "a", "text": "Zigzag"}, {"id": "v1q32_b", "letter": "b", "text": "Contracting triangle"}, {"id": "v1q32_c", "letter": "c", "text": "Expanded (irregular) flat"}, {"id": "v1q32_d", "letter": "d", "text": "Ending diagonal"}], "correct": ["c"], "expEn": "An expanded flat has a 3-3-5 structure where Wave B exceeds the starting point of Wave A, and Wave C typically extends well beyond the end of Wave A.", "expTh": "Expanded flat มีโครงสร้าง 3-3-5 โดย Wave B เคลื่อนที่เลยจุดเริ่มต้นของ Wave A และ Wave C มักยืดออกไปเกินจุดสิ้นสุดของ Wave A อย่างชัดเจน"}, {"id": "v1q33", "text": "A zigzag correction has which internal wave structure?", "choices": [{"id": "v1q33_a", "letter": "a", "text": "3-3-5"}, {"id": "v1q33_b", "letter": "b", "text": "3-3-3"}, {"id": "v1q33_c", "letter": "c", "text": "5-3-5 (waves A, B, C)"}, {"id": "v1q33_d", "letter": "d", "text": "5-5-5"}], "correct": ["c"], "expEn": "A zigzag subdivides as 5-3-5: Wave A is five waves, Wave B is three waves, and Wave C is five waves, producing a sharp, deep correction.", "expTh": "Zigzag แบ่งย่อยเป็น 5-3-5: Wave A เป็น 5 คลื่น, Wave B เป็น 3 คลื่น และ Wave C เป็น 5 คลื่น ทำให้เกิดการปรับฐานที่ชันและลึก"}, {"id": "v1q34", "text": "Which type of triangle can appear only in Wave 4 or Wave B position, never as a final corrective wave of the largest degree in a sequence?", "choices": [{"id": "v1q34_a", "letter": "a", "text": "Only diagonals"}, {"id": "v1q34_b", "letter": "b", "text": "Only zigzags"}, {"id": "v1q34_c", "letter": "c", "text": "Only flats"}, {"id": "v1q34_d", "letter": "d", "text": "Any triangle (contracting, expanding, or barrier)"}], "correct": ["d"], "expEn": "Triangles (of any subtype) are continuation patterns that appear in Wave 4, Wave B, or the penultimate wave of a larger correction—never as the final wave of the sequence, as they precede a thrust in the prior trend direction.", "expTh": "Triangle (ทุกประเภทย่อย) เป็นรูปแบบที่บ่งบอกการไปต่อของแนวโน้ม มักปรากฏใน Wave 4, Wave B หรือคลื่นรองสุดท้ายของ correction ที่ใหญ่กว่า แต่จะไม่ปรากฏเป็นคลื่นสุดท้ายของลำดับ เนื่องจากตามด้วยการ thrust ไปในทิศทางแนวโน้มเดิม"}, {"id": "v1q35", "text": "What follows the completion of a contracting triangle?", "choices": [{"id": "v1q35_a", "letter": "a", "text": "An immediate new Wave 1 of one higher degree"}, {"id": "v1q35_b", "letter": "b", "text": "A sharp thrust move in the direction of the preceding larger trend"}, {"id": "v1q35_c", "letter": "c", "text": "Another triangle of equal size"}, {"id": "v1q35_d", "letter": "d", "text": "A reversal of the larger trend"}], "correct": ["b"], "expEn": "Triangles are typically followed by a fast, often powerful 'thrust' move in the direction of the trend that preceded the triangle, marking the final sub-wave of the larger pattern.", "expTh": "หลังจาก triangle จบ มักตามมาด้วยการเคลื่อนไหวแบบ thrust ที่รวดเร็วและรุนแรงไปในทิศทางเดียวกับแนวโน้มที่เกิดขึ้นก่อนหน้า triangle ถือเป็นคลื่นย่อยสุดท้ายของรูปแบบที่ใหญ่กว่า"}, {"id": "v1q36", "text": "A double three correction is best described as:", "choices": [{"id": "v1q36_a", "letter": "a", "text": "A single zigzag repeated three times"}, {"id": "v1q36_b", "letter": "b", "text": "Five consecutive triangles"}, {"id": "v1q36_c", "letter": "c", "text": "Two impulse waves joined by a Wave 4"}, {"id": "v1q36_d", "letter": "d", "text": "Two corrective patterns joined by an X wave"}], "correct": ["d"], "expEn": "A double three combines two corrective structures (e.g., zigzag-X-flat) connected by a linking X wave, forming a more complex sideways correction.", "expTh": "Double three คือการรวมโครงสร้าง corrective สองรูปแบบ (เช่น zigzag-X-flat) เชื่อมกันด้วยคลื่น X ซึ่งสร้างการปรับฐานแบบซับซ้อนที่เคลื่อนที่ด้านข้าง"}, {"id": "v1q37", "text": "In a combination correction, what is the role of the 'X' wave?", "choices": [{"id": "v1q37_a", "letter": "a", "text": "It must be a five-wave motive structure"}, {"id": "v1q37_b", "letter": "b", "text": "It marks the exact midpoint of the larger trend"}, {"id": "v1q37_c", "letter": "c", "text": "It always signals the start of a new impulse"}, {"id": "v1q37_d", "letter": "d", "text": "It links two or more simple corrective patterns and is itself typically a corrective structure"}], "correct": ["d"], "expEn": "The X wave serves as a connector between two simple corrective patterns in a combination, and it is itself a corrective (often zigzag-like) structure rather than a motive wave.", "expTh": "คลื่น X ทำหน้าที่เชื่อมโยงระหว่างรูปแบบ corrective แบบง่ายสองรูปแบบใน combination และตัวมันเองก็เป็นโครงสร้างแบบ corrective (มักมีลักษณะคล้าย zigzag) ไม่ใช่คลื่นเชิงรุก (motive)"}, {"id": "v1q38", "text": "Which of the following is NOT a valid category of corrective wave pattern in Elliott Wave theory?", "choices": [{"id": "v1q38_a", "letter": "a", "text": "Extended fifth"}, {"id": "v1q38_b", "letter": "b", "text": "Flat"}, {"id": "v1q38_c", "letter": "c", "text": "Zigzag"}, {"id": "v1q38_d", "letter": "d", "text": "Triangle"}], "correct": ["a"], "expEn": "'Extended fifth' describes an extension phenomenon within motive (impulse) waves, not a corrective pattern category; zigzags, flats, and triangles are the primary corrective pattern families.", "expTh": "'Extended fifth' เป็นปรากฏการณ์การยืดตัวภายใน motive wave (impulse) ไม่ใช่หมวดหมู่ของ corrective pattern ในขณะที่ zigzag, flat และ triangle คือกลุ่มรูปแบบ corrective หลัก"}, {"id": "v1q39", "text": "What best distinguishes an expanding (reverse) triangle from a contracting triangle?", "choices": [{"id": "v1q39_a", "letter": "a", "text": "An expanding triangle always has only three waves"}, {"id": "v1q39_b", "letter": "b", "text": "An expanding triangle cannot appear in Wave 4"}, {"id": "v1q39_c", "letter": "c", "text": "Each subsequent wave in an expanding triangle is progressively larger rather than smaller"}, {"id": "v1q39_d", "letter": "d", "text": "An expanding triangle always precedes a triangle of equal size"}], "correct": ["c"], "expEn": "In an expanding triangle, each successive wave (B, C, D, E) grows progressively larger than the last, the opposite of the converging geometry of a contracting triangle; it is a rarer variant.", "expTh": "ใน expanding triangle แต่ละคลื่นถัดไป (B, C, D, E) จะมีขนาดใหญ่ขึ้นเรื่อยๆ ตรงข้ามกับ contracting triangle ที่บีบเข้าหากัน ถือเป็นรูปแบบที่พบได้น้อยกว่า"}, {"id": "v1q40", "text": "In a corrective triangle, which internal wave structure is most common for its five legs (A-B-C-D-E)?", "choices": [{"id": "v1q40_a", "letter": "a", "text": "Legs A and C subdivide into five waves, others into three"}, {"id": "v1q40_b", "letter": "b", "text": "Each leg subdivides into five waves"}, {"id": "v1q40_c", "letter": "c", "text": "Each leg subdivides into three waves"}, {"id": "v1q40_d", "letter": "d", "text": "All legs are single, non-subdividing moves"}], "correct": ["c"], "expEn": "Each of the five legs (A through E) of a triangle typically subdivides into three waves, consistent with the overall corrective nature of the triangle pattern.", "expTh": "แต่ละขาทั้งห้า (A ถึง E) ของ triangle มักแบ่งย่อยเป็น 3 คลื่น สอดคล้องกับลักษณะโดยรวมของ triangle ที่เป็น corrective pattern"}, {"id": "v1q41", "text": "Which internal structure characterizes a leading diagonal's five sub-waves (in the classic, more common variant)?", "choices": [{"id": "v1q41_a", "letter": "a", "text": "5-3-5-3-5"}, {"id": "v1q41_b", "letter": "b", "text": "3-3-3-3-3"}, {"id": "v1q41_c", "letter": "c", "text": "3-5-3-5-3"}, {"id": "v1q41_d", "letter": "d", "text": "5-5-5-5-5"}], "correct": ["a"], "expEn": "A leading diagonal (per EWI's updated guidelines) most commonly subdivides as 5-3-5-3-5, distinguishing it from the ending diagonal's 3-3-3-3-3 structure.", "expTh": "Leading diagonal (ตามแนวทางที่ปรับปรุงของ EWI) ส่วนใหญ่แบ่งย่อยเป็น 5-3-5-3-5 ซึ่งแตกต่างจาก ending diagonal ที่มีโครงสร้าง 3-3-3-3-3"}, {"id": "v1q42", "text": "What is the typical internal structure of an ending diagonal's five sub-waves?", "choices": [{"id": "v1q42_a", "letter": "a", "text": "5-3-5-3-5"}, {"id": "v1q42_b", "letter": "b", "text": "5-5-5-5-5"}, {"id": "v1q42_c", "letter": "c", "text": "3-3-3-3-3"}, {"id": "v1q42_d", "letter": "d", "text": "3-5-3-5-3"}], "correct": ["c"], "expEn": "An ending diagonal's five sub-waves each subdivide into threes (3-3-3-3-3), reflecting the pattern's overall corrective, wedge-shaped character despite occupying a motive wave position.", "expTh": "คลื่นย่อยทั้งห้าของ ending diagonal แต่ละคลื่นแบ่งย่อยเป็นสาม (3-3-3-3-3) สะท้อนลักษณะโดยรวมที่คล้าย corrective และเป็นรูปทรงลิ่ม แม้จะอยู่ในตำแหน่งของ motive wave"}, {"id": "v1q43", "text": "In wave degree labeling per EWI convention, which sequence correctly moves from smallest to largest degree?", "choices": [{"id": "v1q43_a", "letter": "a", "text": "Subminuette, Minuette, Minute, Minor, Intermediate, Primary"}, {"id": "v1q43_b", "letter": "b", "text": "Primary, Intermediate, Minor, Minute, Minuette, Subminuette"}, {"id": "v1q43_c", "letter": "c", "text": "Minor, Primary, Intermediate, Minute"}, {"id": "v1q43_d", "letter": "d", "text": "Cycle, Supercycle, Grand Supercycle, Primary"}], "correct": ["a"], "expEn": "The standard EWI degree nomenclature from small to large includes Subminuette, Minuette, Minute, Minor, Intermediate, Primary, and continues upward to Cycle, Supercycle, and Grand Supercycle.", "expTh": "ลำดับดีกรีมาตรฐานของ EWI จากเล็กไปใหญ่ ได้แก่ Subminuette, Minuette, Minute, Minor, Intermediate, Primary และไล่ขึ้นไปถึง Cycle, Supercycle และ Grand Supercycle"}, {"id": "v1q44", "text": "Why is consistent wave degree labeling important in Elliott Wave analysis?", "choices": [{"id": "v1q44_a", "letter": "a", "text": "It ensures that wave counts remain internally consistent across timeframes and avoids conflating waves of different scale"}, {"id": "v1q44_b", "letter": "b", "text": "It is only relevant for academic publications"}, {"id": "v1q44_c", "letter": "c", "text": "It has no practical impact on analysis"}, {"id": "v1q44_d", "letter": "d", "text": "It replaces the need for Fibonacci analysis"}], "correct": ["a"], "expEn": "Proper degree labeling keeps the analyst from mixing waves of different scale (e.g., treating a Minute wave as if it were Primary), preserving the internal logic and nested consistency of the wave count.", "expTh": "การกำหนดดีกรีคลื่นอย่างถูกต้องช่วยป้องกันไม่ให้นักวิเคราะห์ปะปนคลื่นต่างสเกลกัน (เช่น การนับ Minute wave ราวกับเป็น Primary wave) ทำให้การนับคลื่นมีความสอดคล้องและเป็นระบบซ้อนกันอย่างถูกต้อง"}, {"id": "v1q45", "text": "A triple three correction consists of:", "choices": [{"id": "v1q45_a", "letter": "a", "text": "A single triangle repeated three times"}, {"id": "v1q45_b", "letter": "b", "text": "Three simple corrective patterns joined by two X waves"}, {"id": "v1q45_c", "letter": "c", "text": "Three consecutive impulse waves"}, {"id": "v1q45_d", "letter": "d", "text": "Three zigzags with no connecting waves"}], "correct": ["b"], "expEn": "A triple three links three simple corrective structures using two connecting X waves, forming an extended, complex sideways correction.", "expTh": "Triple three คือการเชื่อมโยงโครงสร้าง corrective แบบง่ายสามรูปแบบด้วยคลื่น X สองคลื่น ก่อให้เกิดการปรับฐานแบบซับซ้อนที่ยืดยาวและเคลื่อนที่ด้านข้าง"}, {"id": "v1q46", "text": "Which statement about Wave B in a zigzag is generally accurate?", "choices": [{"id": "v1q46_a", "letter": "a", "text": "Wave B always exceeds the origin of Wave A"}, {"id": "v1q46_b", "letter": "b", "text": "Wave B typically retraces 38.2% to 79% of Wave A and does not exceed its starting point"}, {"id": "v1q46_c", "letter": "c", "text": "Wave B must subdivide into five waves"}, {"id": "v1q46_d", "letter": "d", "text": "Wave B is always longer than Wave C"}], "correct": ["b"], "expEn": "In a standard zigzag, Wave B is a relatively shallow retracement of Wave A, commonly 38.2% to 79%, and it should not travel beyond the starting point of Wave A (which would suggest a flat instead).", "expTh": "ใน zigzag มาตรฐาน Wave B มักย่อกลับเป็นสัดส่วนที่ไม่ลึกมากของ Wave A โดยทั่วไปอยู่ที่ 38.2% ถึง 79% และไม่ควรเคลื่อนที่เลยจุดเริ่มต้นของ Wave A (มิฉะนั้นจะกลายเป็น flat แทน)"}, {"id": "v1q47", "text": "What is the primary purpose of the 'right look' guideline when validating a wave count?", "choices": [{"id": "v1q47_a", "letter": "a", "text": "The wave's proportions and appearance should be visually consistent with typical Elliott Wave patterns"}, {"id": "v1q47_b", "letter": "b", "text": "It refers only to text alignment on charts"}, {"id": "v1q47_c", "letter": "c", "text": "It requires all waves to move to the right on the time axis"}, {"id": "v1q47_d", "letter": "d", "text": "It is a rule for triangle waves exclusively"}], "correct": ["a"], "expEn": "The 'right look' guideline is a qualitative check: a valid wave should visually resemble the typical proportions and character of its pattern type, helping analysts reject implausible counts even when technically permissible.", "expTh": "แนวทาง 'right look' คือการตรวจสอบเชิงคุณภาพ: คลื่นที่ถูกต้องควรมีสัดส่วนและลักษณะที่สอดคล้องกับรูปแบบทั่วไปของ Elliott Wave ช่วยให้นักวิเคราะห์ปฏิเสธการนับคลื่นที่ไม่สมเหตุสมผล แม้จะเป็นไปได้ในทางเทคนิคก็ตาม"}, {"id": "v1q48", "text": "Which of the following best explains why Wave 4 corrections are often shallower and more sideways than Wave 2?", "choices": [{"id": "v1q48_a", "letter": "a", "text": "There is no established reason; it is coincidental"}, {"id": "v1q48_b", "letter": "b", "text": "The alternation guideline, combined with the market having absorbed much of the trend already"}, {"id": "v1q48_c", "letter": "c", "text": "Wave 4 always forms a zigzag by rule"}, {"id": "v1q48_d", "letter": "d", "text": "Wave 4 always must retrace exactly 23.6%"}], "correct": ["b"], "expEn": "The alternation guideline plus the broader market's advanced participation by this stage often produces a shallower, sideways Wave 4, in contrast to a deeper, sharper Wave 2 earlier in the sequence.", "expTh": "แนวทาง alternation ประกอบกับการที่ตลาดมีผู้เข้าร่วมกว้างขวางขึ้นแล้วในช่วงนี้ มักทำให้ Wave 4 เป็นการปรับฐานที่ตื้นและเคลื่อนที่ด้านข้างมากกว่า ตรงข้ามกับ Wave 2 ที่มักลึกและรุนแรงกว่าในช่วงต้นของลำดับ"}, {"id": "v1q49", "text": "What key feature separates a leading diagonal from an ending diagonal in terms of wave position?", "choices": [{"id": "v1q49_a", "letter": "a", "text": "A leading diagonal occupies the Wave 1 or Wave A position; an ending diagonal occupies Wave 5 or Wave C"}, {"id": "v1q49_b", "letter": "b", "text": "There is no positional difference between them"}, {"id": "v1q49_c", "letter": "c", "text": "A leading diagonal only occurs in corrective waves"}, {"id": "v1q49_d", "letter": "d", "text": "An ending diagonal only occurs at market bottoms"}], "correct": ["a"], "expEn": "A leading diagonal appears at the start of a move, in the Wave 1 or Wave A position, whereas an ending diagonal appears at the terminal Wave 5 or Wave C position of a sequence.", "expTh": "Leading diagonal ปรากฏที่จุดเริ่มต้นของการเคลื่อนไหว คือในตำแหน่ง Wave 1 หรือ Wave A ในขณะที่ ending diagonal ปรากฏที่ตำแหน่งท้ายสุดคือ Wave 5 หรือ Wave C ของลำดับ"}, {"id": "v1q50", "text": "Which principle underlies the Elliott Wave concept of fractals across degrees?", "choices": [{"id": "v1q50_a", "letter": "a", "text": "Only the largest degree waves are fractal in nature"}, {"id": "v1q50_b", "letter": "b", "text": "Each degree of wave must use a completely different pattern than adjacent degrees"}, {"id": "v1q50_c", "letter": "c", "text": "Fractality only applies to triangles"}, {"id": "v1q50_d", "letter": "d", "text": "Wave patterns are self-similar, repeating their basic structure at both larger and smaller degrees"}], "correct": ["d"], "expEn": "The fractal nature of Elliott Wave means the same basic 5-3 (motive-corrective) patterns repeat at every degree, from the smallest Subminuette moves up through Grand Supercycle, forming a self-similar nested structure.", "expTh": "ธรรมชาติแบบ fractal ของ Elliott Wave หมายถึงรูปแบบพื้นฐาน 5-3 (motive-corrective) เดียวกันนี้เกิดซ้ำในทุกดีกรี ตั้งแต่ Subminuette ที่เล็กที่สุดไปจนถึง Grand Supercycle ก่อให้เกิดโครงสร้างที่คล้ายคลึงกันแบบซ้อนกันเป็นชั้นๆ"}], "v2": [{"id": "v2q01", "text": "A market forms a corrective sequence: zigzag, then X wave, then flat, then X wave, then triangle. What is this structure called?", "choices": [{"id": "v2q01_a", "letter": "a", "text": "Running triangle"}, {"id": "v2q01_b", "letter": "b", "text": "Double zigzag"}, {"id": "v2q01_c", "letter": "c", "text": "Expanded flat"}, {"id": "v2q01_d", "letter": "d", "text": "Triple three"}], "correct": ["d"], "expEn": "This is a triple three: three simple corrective patterns (zigzag, flat, triangle) connected by two X waves — a valid, if complex, combination correction.", "expTh": "นี่คือ triple three: รูปแบบ corrective แบบง่ายสามแบบ (zigzag, flat, triangle) เชื่อมโยงกันด้วยคลื่น X สองคลื่น เป็น combination correction ที่ซับซ้อนแต่ถูกต้องตามหลักการ"}, {"id": "v2q02", "text": "A double zigzag (WXY structure using two zigzags) is typically used to explain which market behavior?", "choices": [{"id": "v2q02_a", "letter": "a", "text": "A five-wave impulsive advance"}, {"id": "v2q02_b", "letter": "b", "text": "A correction that is deeper or more time-consuming than a single zigzag alone would suggest"}, {"id": "v2q02_c", "letter": "c", "text": "A single, simple retracement of under 20%"}, {"id": "v2q02_d", "letter": "d", "text": "A triangle that fails to complete"}], "correct": ["b"], "expEn": "When a single zigzag doesn't fully satisfy the depth or duration expected of a correction, analysts often identify a double zigzag (zigzag-X-zigzag), extending the correction's scope while retaining a corrective character.", "expTh": "เมื่อ zigzag เดี่ยวไม่สามารถอธิบายความลึกหรือระยะเวลาที่คาดหวังของการปรับฐานได้ครบถ้วน นักวิเคราะห์มักระบุเป็น double zigzag (zigzag-X-zigzag) ซึ่งขยายขอบเขตของการปรับฐานแต่ยังคงลักษณะ corrective ไว้"}, {"id": "v2q03", "text": "In complex corrections, what is the general guideline regarding the X wave's depth of retracement?", "choices": [{"id": "v2q03_a", "letter": "a", "text": "X waves have no defined range and are purely random"}, {"id": "v2q03_b", "letter": "b", "text": "X waves must always exceed 100% retracement"}, {"id": "v2q03_c", "letter": "c", "text": "X waves can vary widely in depth, but shallower X waves are more common than deep ones"}, {"id": "v2q03_d", "letter": "d", "text": "X waves must always retrace exactly 50% of the prior pattern"}], "correct": ["c"], "expEn": "While X waves can range in depth, EWI observes that shallower X wave retracements are statistically more common, though deep X waves do occur and do not by themselves invalidate the count.", "expTh": "แม้ว่าคลื่น X จะมีความลึกได้หลากหลาย แต่ EWI สังเกตว่าคลื่น X ที่ตื้นพบได้บ่อยกว่าทางสถิติ แม้คลื่น X ที่ลึกจะเกิดขึ้นได้และไม่ได้ทำให้การนับคลื่นผิดพลาดในตัวมันเอง"}, {"id": "v2q04", "text": "Which volume characteristic would raise doubt about labeling a move as Wave 3 of an impulse?", "choices": [{"id": "v2q04_a", "letter": "a", "text": "Declining volume as price makes new highs/lows throughout the move"}, {"id": "v2q04_b", "letter": "b", "text": "Rising volume accompanying the price move"}, {"id": "v2q04_c", "letter": "c", "text": "Volume expanding sharply as the move breaks recent extremes"}, {"id": "v2q04_d", "letter": "d", "text": "Volume that is broadly consistent with strong trending conditions"}], "correct": ["a"], "expEn": "Wave 3 typically shows expanding volume alongside price strength; declining volume as price extends would be atypical and should prompt the analyst to reconsider whether the move is truly Wave 3 or possibly a weaker corrective wave.", "expTh": "Wave 3 มักมาพร้อมปริมาณการซื้อขายที่เพิ่มขึ้นสอดคล้องกับความแข็งแกร่งของราคา หากปริมาณลดลงขณะที่ราคาขยายตัว ถือเป็นความผิดปกติที่ควรทำให้นักวิเคราะห์ทบทวนว่าคลื่นนั้นเป็น Wave 3 จริงหรืออาจเป็นคลื่น corrective ที่อ่อนแอกว่า"}, {"id": "v2q05", "text": "When a suspected Wave 4 triangle fails to produce the expected sharp thrust afterward, what should the analyst consider?", "choices": [{"id": "v2q05_a", "letter": "a", "text": "Assuming the market has permanently reversed trend"}, {"id": "v2q05_b", "letter": "b", "text": "Re-examining whether the pattern is actually a triangle, since triangles should be followed by a thrust in the prior trend direction"}, {"id": "v2q05_c", "letter": "c", "text": "Concluding that Elliott Wave theory does not apply to this market"}, {"id": "v2q05_d", "letter": "d", "text": "Ignoring the anomaly since triangles never require a thrust"}], "correct": ["b"], "expEn": "Since a genuine triangle should be followed by a fast thrust in the direction of the preceding trend, the absence of such a thrust is a strong signal to revisit the wave count and consider alternative labels.", "expTh": "เนื่องจาก triangle ที่แท้จริงควรตามด้วยการ thrust อย่างรวดเร็วไปในทิศทางแนวโน้มก่อนหน้า การไม่เกิด thrust จึงเป็นสัญญาณสำคัญที่ควรทบทวนการนับคลื่นและพิจารณาป้ายกำกับทางเลือกอื่น"}, {"id": "v2q06", "text": "In nested wave counts, if Minor Wave 3 is subdividing, which of the following sub-wave counts would violate Elliott Wave rules?", "choices": [{"id": "v2q06_a", "letter": "a", "text": "Minute wave 3 (within Minor 3) is the longest of Minute waves 1, 3, and 5"}, {"id": "v2q06_b", "letter": "b", "text": "Minute wave 4 (within Minor 3) does not overlap Minute wave 1"}, {"id": "v2q06_c", "letter": "c", "text": "Minute wave 2 (within Minor 3) retraces below the start of Minute wave 1"}, {"id": "v2q06_d", "letter": "d", "text": "Minute wave 5 (within Minor 3) truncates slightly"}], "correct": ["c"], "expEn": "Rules apply at every degree: if Minute Wave 2 retraces beyond the start of Minute Wave 1, this violates the core rule regardless of the higher-degree wave (Minor 3) it belongs to.", "expTh": "กฎเหล็กใช้บังคับในทุกดีกรี หาก Minute Wave 2 ย่อกลับเลยจุดเริ่มต้นของ Minute Wave 1 ถือเป็นการละเมิดกฎหลัก ไม่ว่าจะอยู่ภายใต้ Minor Wave 3 ที่ใหญ่กว่าหรือไม่ก็ตาม"}, {"id": "v2q07", "text": "A market shows an A-B-C decline where Wave C is only three sub-waves rather than five. What does this suggest?", "choices": [{"id": "v2q07_a", "letter": "a", "text": "The pattern must be an impulse mislabeled as corrective"}, {"id": "v2q07_b", "letter": "b", "text": "Wave C must always subdivide into three waves regardless of pattern type"}, {"id": "v2q07_c", "letter": "c", "text": "This is impossible under Elliott Wave rules"}, {"id": "v2q07_d", "letter": "d", "text": "The pattern is likely not a standard zigzag, and may instead be a flat or a different corrective structure"}], "correct": ["d"], "expEn": "Since a standard zigzag requires Wave C to subdivide into five waves, a three-wave C suggests the analyst should consider alternate labels such as a flat (which also has a three-wave C, but different B-wave behavior) or another corrective variant.", "expTh": "เนื่องจาก zigzag มาตรฐานกำหนดให้ Wave C ต้องแบ่งย่อยเป็น 5 คลื่น การที่ Wave C เป็นเพียง 3 คลื่นบ่งชี้ว่าควรพิจารณาป้ายกำกับทางเลือกอื่น เช่น flat (ซึ่งก็มี Wave C แบบ 3 คลื่นเช่นกัน แต่พฤติกรรมของ Wave B จะแตกต่างกัน) หรือ corrective รูปแบบอื่น"}, {"id": "v2q08", "text": "Which best explains why analysts prefer counts that maintain proper Fibonacci relationships over those that do not?", "choices": [{"id": "v2q08_a", "letter": "a", "text": "Counts without Fibonacci alignment are automatically invalid"}, {"id": "v2q08_b", "letter": "b", "text": "Fibonacci ratios guarantee the count is correct"}, {"id": "v2q08_c", "letter": "c", "text": "Fibonacci relationships are absolute rules that must always be satisfied"}, {"id": "v2q08_d", "letter": "d", "text": "Fibonacci-consistent counts are statistically more common and improve the count's overall probability, even though relationships are guidelines, not guarantees"}], "correct": ["d"], "expEn": "While Fibonacci relationships are guidelines rather than strict rules, wave counts that align with common Fibonacci ratios are statistically more frequent in practice, so they are favored as the higher-probability interpretation among valid alternatives.", "expTh": "แม้ว่าความสัมพันธ์ Fibonacci จะเป็นเพียงแนวทางไม่ใช่กฎตายตัว แต่การนับคลื่นที่สอดคล้องกับอัตราส่วน Fibonacci ทั่วไปมักพบได้บ่อยกว่าในทางสถิติ จึงได้รับความนิยมเป็นการตีความที่มีความน่าจะเป็นสูงกว่าในบรรดาทางเลือกที่ถูกต้องทั้งหมด"}, {"id": "v2q09", "text": "What is the key difference between a 'running correction' and a standard corrective pattern?", "choices": [{"id": "v2q09_a", "letter": "a", "text": "A running correction always takes the form of a triangle"}, {"id": "v2q09_b", "letter": "b", "text": "A running correction ends well short of typical retracement levels, reflecting strong underlying trend momentum"}, {"id": "v2q09_c", "letter": "c", "text": "A running correction always retraces more than 100% of the prior move"}, {"id": "v2q09_d", "letter": "d", "text": "A running correction cannot occur in a bull market"}], "correct": ["b"], "expEn": "Running corrections (such as a running flat or running triangle) end at shallower retracement levels than typical, signaling that the underlying trend is so powerful that even the correction struggles to develop fully.", "expTh": "Running correction (เช่น running flat หรือ running triangle) มักสิ้นสุดที่ระดับการย่อที่ตื้นกว่าปกติ บ่งบอกว่าแนวโน้มหลักมีความแข็งแกร่งมากจนแม้แต่การปรับฐานก็ยังพัฒนาได้ไม่เต็มที่"}, {"id": "v2q10", "text": "When two alternate wave counts are both technically valid (no rule violations), which factor is generally given the LEAST weight in choosing between them?", "choices": [{"id": "v2q10_a", "letter": "a", "text": "The overall 'right look' and proportionality of the pattern"}, {"id": "v2q10_b", "letter": "b", "text": "Fibonacci ratio relationships among the waves"}, {"id": "v2q10_c", "letter": "c", "text": "The analyst's personal directional bias on where price 'should' go"}, {"id": "v2q10_d", "letter": "d", "text": "Guideline conformity such as alternation and channeling"}], "correct": ["c"], "expEn": "Personal directional bias should carry no analytical weight; robust Elliott Wave practice relies on guideline conformity, Fibonacci relationships, and pattern proportionality to select the higher-probability count, not a preconceived market opinion.", "expTh": "อคติส่วนตัวเกี่ยวกับทิศทางที่ราคา 'ควรจะ' ไปไม่ควรมีน้ำหนักในการวิเคราะห์เลย การปฏิบัติตามหลัก Elliott Wave ที่ดีอาศัยความสอดคล้องกับแนวทาง (guideline), ความสัมพันธ์ Fibonacci และสัดส่วนของรูปแบบในการเลือกการนับคลื่นที่มีความน่าจะเป็นสูงกว่า ไม่ใช่ความเห็นตลาดที่มีมาก่อน"}, {"id": "v2q11", "text": "A five-wave decline is followed by a three-wave rally that fully retraces the decline and then some. What does this sequence most likely represent?", "choices": [{"id": "v2q11_a", "letter": "a", "text": "An impossible sequence under Elliott Wave theory"}, {"id": "v2q11_b", "letter": "b", "text": "Proof that Elliott Wave rules have been violated"}, {"id": "v2q11_c", "letter": "c", "text": "A confirmed reversal into a new five-wave uptrend"}, {"id": "v2q11_d", "letter": "d", "text": "The five-wave decline was Wave A of a larger correction (or the three-wave rally is a running correction of a larger downtrend), not a completed impulse"}], "correct": ["d"], "expEn": "A three-wave rally that fully retraces and exceeds a preceding five-wave decline suggests the five-wave move was corrective (e.g., Wave A of a flat or a diagonal within a larger correction) rather than a completed trend-establishing impulse, since impulses are not typically erased so quickly and fully by a mere three-wave move.", "expTh": "การรีบาวด์แบบ 3 คลื่นที่ย่อกลับครบและเกินกว่าการลดลงแบบ 5 คลื่นก่อนหน้า บ่งชี้ว่าคลื่นลดลง 5 คลื่นนั้นน่าจะเป็นคลื่น corrective (เช่น Wave A ของ flat หรือ diagonal ภายใน correction ที่ใหญ่กว่า) มากกว่าจะเป็น impulse ที่สมบูรณ์และสร้างแนวโน้มใหม่ เนื่องจาก impulse มักไม่ถูกลบล้างอย่างรวดเร็วและครบถ้วนด้วยการเคลื่อนไหวเพียง 3 คลื่น"}, {"id": "v2q12", "text": "In applying the Elliott Wave Oscillator (or similar momentum tool) to validate Wave 3, what pattern would you expect to see?", "choices": [{"id": "v2q12_a", "letter": "a", "text": "The oscillator showing its lowest reading of the entire sequence"}, {"id": "v2q12_b", "letter": "b", "text": "The oscillator flatlining throughout Wave 3"}, {"id": "v2q12_c", "letter": "c", "text": "The oscillator reaching its highest reading of the entire impulse sequence, in line with Wave 3's typical dominance"}, {"id": "v2q12_d", "letter": "d", "text": "No relationship between the oscillator and any particular wave"}], "correct": ["c"], "expEn": "Because Wave 3 typically has the strongest momentum, the Elliott Wave Oscillator (or similar tools like the Awesome Oscillator) usually peaks during Wave 3, providing a momentum-based confirmation of the count.", "expTh": "เนื่องจาก Wave 3 มักมีโมเมนตัมที่แข็งแกร่งที่สุด Elliott Wave Oscillator (หรือเครื่องมือที่คล้ายกันเช่น Awesome Oscillator) มักขึ้นไปแตะจุดสูงสุดในช่วง Wave 3 ซึ่งเป็นการยืนยันการนับคลื่นด้วยโมเมนตัม"}, {"id": "v2q13", "text": "Which scenario would most strongly suggest that an analyst should abandon a preferred wave count in favor of an alternate count?", "choices": [{"id": "v2q13_a", "letter": "a", "text": "Price action violates one of the three cardinal rules under the preferred count"}, {"id": "v2q13_b", "letter": "b", "text": "The preferred count does not perfectly match a textbook example"}, {"id": "v2q13_c", "letter": "c", "text": "Volume is average during a corrective wave"}, {"id": "v2q13_d", "letter": "d", "text": "Price temporarily pauses near a minor Fibonacci level"}], "correct": ["a"], "expEn": "A violation of one of the three cardinal (inviolable) rules — Wave 2 retracing beyond Wave 1's start, Wave 3 being the shortest, or Wave 4 overlapping Wave 1 in a standard impulse — definitively invalidates the count, requiring the analyst to shift to an alternate labeling.", "expTh": "การละเมิดหนึ่งในสามกฎเหล็ก (Wave 2 ย่อเลยจุดเริ่มต้น Wave 1, Wave 3 เป็นคลื่นที่สั้นที่สุด หรือ Wave 4 ทับซ้อน Wave 1 ใน impulse มาตรฐาน) ทำให้การนับคลื่นนั้นใช้ไม่ได้อย่างชัดเจน นักวิเคราะห์จำเป็นต้องเปลี่ยนไปใช้การนับคลื่นทางเลือกอื่น"}, {"id": "v2q14", "text": "How should an analyst treat a wave count where Wave 4 does not overlap Wave 1, but the pattern otherwise looks unusually narrow and choppy for an impulse?", "choices": [{"id": "v2q14_a", "letter": "a", "text": "Ignore the visual character entirely and rely solely on the overlap rule"}, {"id": "v2q14_b", "letter": "b", "text": "Automatically discard the count since impulses cannot look choppy"}, {"id": "v2q14_c", "letter": "c", "text": "Consider whether the structure is instead a diagonal or a corrective pattern, even though the non-overlap rule alone doesn't disqualify it as a standard impulse"}, {"id": "v2q14_d", "letter": "d", "text": "Assume it must be a fifth-wave extension"}], "correct": ["c"], "expEn": "Rule compliance alone (no overlap) doesn't guarantee the best label; the 'right look' guideline means an unusually choppy, narrow structure should prompt the analyst to weigh alternate interpretations such as a diagonal or a corrective structure.", "expTh": "การไม่ทำผิดกฎ (ไม่มี overlap) เพียงอย่างเดียวไม่ได้รับประกันว่าเป็นป้ายกำกับที่ดีที่สุด แนวทาง 'right look' หมายความว่าโครงสร้างที่ดูอึดอัดและแคบผิดปกติควรทำให้นักวิเคราะห์พิจารณาการตีความทางเลือกอื่น เช่น diagonal หรือโครงสร้าง corrective"}, {"id": "v2q15", "text": "A corrective pattern shows Wave B retracing 105% of Wave A, followed by a Wave C that only reaches 65% of Wave A's length. What pattern does this most resemble?", "choices": [{"id": "v2q15_a", "letter": "a", "text": "A running flat (expanded, with a shortfall in Wave C)"}, {"id": "v2q15_b", "letter": "b", "text": "A leading diagonal"}, {"id": "v2q15_c", "letter": "c", "text": "A standard zigzag"}, {"id": "v2q15_d", "letter": "d", "text": "A contracting triangle"}], "correct": ["a"], "expEn": "A Wave B beyond 100% of Wave A combined with a Wave C that falls short of Wave A's terminus is the signature of a running flat, indicating strong underlying trend continuation.", "expTh": "Wave B ที่ย่อเกิน 100% ของ Wave A ประกอบกับ Wave C ที่ไปไม่ถึงจุดสิ้นสุดของ Wave A เป็นลักษณะเฉพาะของ running flat ซึ่งบ่งบอกถึงการดำเนินต่อของแนวโน้มหลักที่แข็งแกร่ง"}, {"id": "v2q16", "text": "When comparing time-based Fibonacci analysis to price-based Fibonacci analysis in EWP practice, which statement is most accurate?", "choices": [{"id": "v2q16_a", "letter": "a", "text": "Time-based Fibonacci is always more accurate than price-based Fibonacci"}, {"id": "v2q16_b", "letter": "b", "text": "Both are considered equally authoritative rules under EWP"}, {"id": "v2q16_c", "letter": "c", "text": "Neither price nor time Fibonacci analysis has any established use in EWP"}, {"id": "v2q16_d", "letter": "d", "text": "Price-based Fibonacci relationships are generally considered more reliable and are used as the primary analytical tool"}], "correct": ["d"], "expEn": "In standard Elliott Wave practice, price-based Fibonacci relationships (retracements and extensions) are the primary and more reliable tool, while time-based Fibonacci analysis is used cautiously as a secondary, supporting technique.", "expTh": "ในทางปฏิบัติของ Elliott Wave มาตรฐาน ความสัมพันธ์ Fibonacci ด้านราคา (retracement และ extension) เป็นเครื่องมือหลักที่น่าเชื่อถือมากกว่า ในขณะที่การวิเคราะห์ Fibonacci ด้านเวลาใช้เป็นเครื่องมือเสริมรองลงมาด้วยความระมัดระวัง"}, {"id": "v2q17", "text": "In a market forming an apparent ending diagonal in Wave 5, what should the analyst expect to observe regarding trendlines?", "choices": [{"id": "v2q17_a", "letter": "a", "text": "Perfectly parallel trendlines with no convergence"}, {"id": "v2q17_b", "letter": "b", "text": "Converging trendlines connecting waves 1-3 and 2-4, forming a wedge shape"}, {"id": "v2q17_c", "letter": "c", "text": "Trendlines that diverge outward as the pattern progresses"}, {"id": "v2q17_d", "letter": "d", "text": "No meaningful trendline relationship at all"}], "correct": ["b"], "expEn": "An ending diagonal is characterized by converging trendlines drawn through the ends of waves 1 and 3, and waves 2 and 4, producing the classic wedge shape that distinguishes it from a standard impulse or an expanding diagonal.", "expTh": "Ending diagonal มีลักษณะเด่นคือเส้นแนวโน้มที่บรรจบเข้าหากัน ลากผ่านจุดสิ้นสุดของ wave 1 และ 3 และของ wave 2 และ 4 สร้างรูปทรงลิ่มแบบคลาสสิกที่แยกแยะจาก impulse มาตรฐานหรือ expanding diagonal"}, {"id": "v2q18", "text": "Which of the following would be the strongest reason to suspect that a five-wave rally is actually Wave C of a larger flat correction, rather than Wave 3 of a new impulse?", "choices": [{"id": "v2q18_a", "letter": "a", "text": "The five-wave rally exceeds the start of the prior decline"}, {"id": "v2q18_b", "letter": "b", "text": "The preceding move (Wave A/B context) shows a three-wave decline followed by a retracement exceeding typical Wave 2 depth, and the broader trend of one higher degree remains down"}, {"id": "v2q18_c", "letter": "c", "text": "The five-wave rally shows expanding volume"}, {"id": "v2q18_d", "letter": "d", "text": "The five-wave rally takes longer in time than the preceding decline"}], "correct": ["b"], "expEn": "Context from the higher-degree trend matters: if the larger trend remains down and the preceding structure looks like an A-B sequence (three-wave decline, then a deep retracement), the five-wave rally is more likely Wave C of a flat correction against the larger downtrend rather than the start of a new impulsive uptrend.", "expTh": "บริบทจากแนวโน้มดีกรีที่ใหญ่กว่ามีความสำคัญ: หากแนวโน้มใหญ่ยังคงเป็นขาลงและโครงสร้างก่อนหน้าดูเหมือนลำดับ A-B (คลื่นลดลง 3 คลื่น ตามด้วยการย่อกลับที่ลึก) คลื่นรีบาวด์ 5 คลื่นนี้มีแนวโน้มที่จะเป็น Wave C ของ flat correction สวนแนวโน้มขาลงใหญ่ มากกว่าจะเป็นจุดเริ่มต้นของ impulse ขาขึ้นใหม่"}, {"id": "v2q19", "text": "A market forms a triangle where wave E terminates beyond the trendline connecting waves A and C (a 'throw-over'). How should this be interpreted?", "choices": [{"id": "v2q19_a", "letter": "a", "text": "It is a recognized variation and is often followed by a swift thrust once the throw-over completes"}, {"id": "v2q19_b", "letter": "b", "text": "It means the pattern must be relabeled as an impulse"}, {"id": "v2q19_c", "letter": "c", "text": "It automatically invalidates the triangle count"}, {"id": "v2q19_d", "letter": "d", "text": "It indicates the triangle will repeat itself"}], "correct": ["a"], "expEn": "A throw-over, where Wave E briefly exceeds the A-C trendline, is a recognized triangle variation, often producing a brief false breakout before the genuine thrust move begins in the direction of the preceding trend.", "expTh": "Throw-over ซึ่งเกิดเมื่อ Wave E เคลื่อนที่เลยเส้นแนวโน้ม A-C ไปเล็กน้อย เป็นรูปแบบผันแปรของ triangle ที่ได้รับการยอมรับ มักก่อให้เกิดการ breakout หลอกช่วงสั้นๆ ก่อนที่การ thrust ที่แท้จริงจะเริ่มไปในทิศทางแนวโน้มเดิม"}, {"id": "v2q20", "text": "Why do experienced Elliott Wave analysts typically maintain more than one valid wave count (a 'preferred' and an 'alternate') simultaneously?", "choices": [{"id": "v2q20_a", "letter": "a", "text": "Because wave analysis is probabilistic, and maintaining alternates helps manage risk if the preferred count is invalidated"}, {"id": "v2q20_b", "letter": "b", "text": "Because a single count is always provably correct and alternates are unnecessary busywork"}, {"id": "v2q20_c", "letter": "c", "text": "Because alternates are only used for marketing purposes, not analysis"}, {"id": "v2q20_d", "letter": "d", "text": "Because Elliott Wave rules require exactly two counts at all times"}], "correct": ["a"], "expEn": "Since Elliott Wave analysis identifies the highest-probability interpretation rather than a certainty, skilled analysts track an alternate count so that if a rule is violated or a key level breaks, they can adapt quickly rather than being caught off guard.", "expTh": "เนื่องจากการวิเคราะห์ Elliott Wave เป็นการระบุการตีความที่มีความน่าจะเป็นสูงสุด ไม่ใช่ความแน่นอน นักวิเคราะห์ที่มีทักษะจึงติดตามการนับคลื่นทางเลือกไว้ด้วย เพื่อให้สามารถปรับตัวได้อย่างรวดเร็วหากเกิดการละเมิดกฎหรือระดับราคาสำคัญถูกทะลุ แทนที่จะตั้งตัวไม่ทัน"}], "v3": [{"id": "v3q01", "text": "Which of the following are among the three cardinal (inviolable) rules of impulse waves? (Select all that apply)", "choices": [{"id": "v3q01_a", "letter": "a", "text": "Wave 2 cannot retrace beyond the start of Wave 1"}, {"id": "v3q01_b", "letter": "b", "text": "Wave 5 must always be longer than Wave 3"}, {"id": "v3q01_c", "letter": "c", "text": "Wave 4 cannot overlap Wave 1 in a standard (non-diagonal) impulse"}, {"id": "v3q01_d", "letter": "d", "text": "Wave 3 cannot be the shortest of waves 1, 3, and 5"}], "correct": ["a", "c", "d"], "expEn": "The three cardinal rules are: Wave 2 cannot retrace beyond Wave 1's start, Wave 3 cannot be the shortest of 1/3/5, and Wave 4 cannot overlap Wave 1 in a standard impulse. Wave 5 exceeding Wave 3 is not a rule; truncation is a recognized exception.", "expTh": "กฎเหล็กสามข้อคือ: Wave 2 ห้ามย่อเลยจุดเริ่มต้นของ Wave 1, Wave 3 ห้ามเป็นคลื่นที่สั้นที่สุดในบรรดา 1/3/5 และ Wave 4 ห้ามทับซ้อน Wave 1 ใน impulse มาตรฐาน ส่วน Wave 5 ต้องยาวกว่า Wave 3 นั้นไม่ใช่กฎ เนื่องจาก truncation เป็นข้อยกเว้นที่ยอมรับได้"}, {"id": "v3q02", "text": "Which of the following are valid types of corrective patterns recognized in Elliott Wave theory? (Select all that apply)", "choices": [{"id": "v3q02_a", "letter": "a", "text": "Zigzag"}, {"id": "v3q02_b", "letter": "b", "text": "Contracting triangle"}, {"id": "v3q02_c", "letter": "c", "text": "Extended impulse"}, {"id": "v3q02_d", "letter": "d", "text": "Flat"}], "correct": ["a", "b", "d"], "expEn": "Zigzags, flats, and triangles (contracting, expanding, running, barrier) are all recognized corrective pattern families. 'Extended impulse' describes extension within a motive wave, not a corrective pattern.", "expTh": "Zigzag, flat และ triangle (contracting, expanding, running, barrier) ล้วนเป็นตระกูล corrective pattern ที่ได้รับการยอมรับ ส่วน 'extended impulse' เป็นการอธิบายการยืดตัวภายใน motive wave ไม่
