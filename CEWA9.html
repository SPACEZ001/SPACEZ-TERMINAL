const BANK2 = [
{id:'v2q01',text:"A diagonal triangle appearing in the wave 5 position of an impulse is called:",choices:[{id:'a',letter:'A',text:'A leading diagonal'},{id:'b',letter:'B',text:'A contracting triangle'},{id:'c',letter:'C',text:'An ending diagonal'},{id:'d',letter:'D',text:'An expanding diagonal'}],correct:['c'],expEn:"A diagonal appearing in the wave 5 or wave C position is called an ending diagonal. A leading diagonal appears in wave 1 or wave A positions. Contracting and expanding refer to the shape (trendline direction), not the position. An ending diagonal signals the final stages of a motive wave.",expTh:"Diagonal ที่ปรากฏในตำแหน่งคลื่น 5 หรือคลื่น C เรียกว่า ending diagonal Leading diagonal ปรากฏในตำแหน่งคลื่น 1 หรือ A Contracting และ expanding อธิบายรูปร่าง (ทิศทางเส้นแนวโน้ม) ไม่ใช่ตำแหน่ง Ending diagonal บ่งชี้ขั้นตอนสุดท้ายของ motive wave"},
{id:'v2q02',text:"Which characteristic makes an ending diagonal definitively different from an impulse at the sub-wave level?",choices:[{id:'a',letter:'A',text:'Each of its five legs subdivides into three waves rather than five'},{id:'b',letter:'B',text:'It contains only three legs instead of five'},{id:'c',letter:'C',text:'Its wave 3 is always the shortest leg'},{id:'d',letter:'D',text:'Wave 4 does not overlap wave 2 in an ending diagonal'}],correct:['a'],expEn:"The defining structural difference of an ending diagonal (and leading diagonal) from an impulse is that each of the five legs subdivides into three waves (3-3-3-3-3). In a standard impulse, the actionary waves (1, 3, 5) subdivide into five waves. Wave 4/wave 1 overlap is characteristic of both diagonal types. An ending diagonal does not require wave 3 to be the shortest — the wave 3 shortest rule remains valid.",expTh:"ความแตกต่างเชิงโครงสร้างที่กำหนด ending diagonal (และ leading diagonal) จาก impulse คือแต่ละ leg ทั้ง 5 แบ่งย่อยเป็น 3 คลื่น (3-3-3-3-3) ใน impulse มาตรฐาน คลื่น actionary (1, 3, 5) แบ่งย่อยเป็น 5 คลื่น การทับซ้อนของคลื่น 4/1 เป็นลักษณะของ diagonal ทั้งสองประเภท"},
{id:'v2q03',text:"A 'double three' combination in Elliott Wave Theory consists of:",choices:[{id:'a',letter:'A',text:'Two zigzags connected by an X wave'},{id:'b',letter:'B',text:'A flat and a triangle, always in that order'},{id:'c',letter:'C',text:'Three five-wave motive structures linked by corrective waves'},{id:'d',letter:'D',text:'Two corrective simple patterns (any combination) connected by an X wave'}],correct:['d'],expEn:"A double three is formed by two simple corrective patterns (W and Y) connected by an X wave. The two simple correctives can be any combination — two zigzags, two flats, a zigzag and a flat, a flat and a triangle, etc. A is too restrictive (only zigzags). B incorrectly specifies a fixed order and only flat-triangle. C describes motive structures, not corrections.",expTh:"Double three ก่อตัวจากรูปแบบ corrective ง่าย 2 แบบ (W และ Y) ที่เชื่อมต่อด้วยคลื่น X รูปแบบ corrective ง่ายทั้งสองสามารถเป็นการผสมใดก็ได้ ตัวเลือก A จำกัดเกินไป (เฉพาะ zigzag) ตัวเลือก B ระบุลำดับคงที่ที่ไม่ถูกต้อง ตัวเลือก C อธิบายโครงสร้าง motive ไม่ใช่ corrections"},
{id:'v2q04',text:"In a complex correction, the X wave:",choices:[{id:'a',letter:'A',text:'Is a corrective wave that links two simple corrective patterns'},{id:'b',letter:'B',text:'Must be a zigzag at all times'},{id:'c',letter:'C',text:'Must be at least 61.8% of the prior corrective segment'},{id:'d',letter:'D',text:'Is a motive wave that resets the correction count'}],correct:['a'],expEn:"The X wave is a corrective linking wave that separates the simple corrective patterns (W-X-Y in a double three; W-X-Y-X-Z in a triple three). It is always corrective in nature, never motive (D). It does not need to be a zigzag specifically — it can be any corrective pattern (A). There is no mandatory Fibonacci minimum for X waves (C).",expTh:"คลื่น X เป็นคลื่น corrective ที่เชื่อมต่อรูปแบบ corrective ง่ายๆ เข้าด้วยกัน (W-X-Y ใน double three; W-X-Y-X-Z ใน triple three) มีลักษณะ corrective เสมอ ไม่ใช่ motive (D) ไม่จำเป็นต้องเป็น zigzag โดยเฉพาะ แต่สามารถเป็นรูปแบบ corrective ใดก็ได้ (A) และไม่มีขั้นต่ำ Fibonacci สำหรับคลื่น X (C)"},
{id:'v2q05',text:"The channeling technique (Parallel Channel Method) for an impulse wave is MOST useful for:",choices:[{id:'a',letter:'A',text:'Determining the wave degree of each sub-wave'},{id:'b',letter:'B',text:'Predicting the exact retracement level of wave 2'},{id:'c',letter:'C',text:'Projecting where wave 5 might terminate and wave 4 find support'},{id:'d',letter:'D',text:'Identifying whether a pattern is an impulse or diagonal'}],correct:['c'],expEn:"The parallel channel is most useful for projecting where wave 4 will find support (the lower channel line) and where wave 5 might terminate (the upper channel line). It is not used to determine wave degree (A), predict exact retracements (B), or definitively distinguish impulse from diagonal (D) — though the slope of trendlines can offer clues about diagonals.",expTh:"Parallel channel มีประโยชน์มากที่สุดในการฉายภาพว่าคลื่น 4 จะหาแนวรับที่ไหน (เส้นช่องล่าง) และคลื่น 5 อาจสิ้นสุดที่ไหน (เส้นช่องบน) ไม่ได้ใช้เพื่อกำหนดระดับคลื่น (A) คาดการณ์ retracement ที่แน่นอน (B) หรือแยก impulse จาก diagonal อย่างเด็ดขาด (D)"},
{id:'v2q06',text:"Socionomics, as developed by Robert Prechter, proposes that:",choices:[{id:'a',letter:'A',text:'Macroeconomic data is the primary driver of stock market trends'},{id:'b',letter:'B',text:'Government policy predictably leads to bear markets and social unrest'},{id:'c',letter:'C',text:'Central bank interest rate cycles coincide with Elliott Wave degree cycles'},{id:'d',letter:'D',text:'Social mood, measured by the stock market, is the primary driver of social and cultural trends'}],correct:['d'],expEn:"Socionomics posits that social mood — best measured by financial markets — is the causal force behind social trends, cultural events, politics, and macroeconomics. This inverts the conventional view (A) that economic data drives markets. B and C describe specific implications others have proposed but are not the core Socionomics thesis, which is the social-mood-causes-events causality reversal.",expTh:"Socionomics ระบุว่า social mood ซึ่งวัดได้ดีที่สุดจากตลาดการเงิน เป็นแรงเหตุที่อยู่เบื้องหลังแนวโน้มทางสังคม วัฒนธรรม การเมือง และเศรษฐกิจมหภาค สิ่งนี้ตรงข้ามกับมุมมองแบบเดิม (A) ที่ว่าข้อมูลเศรษฐกิจขับเคลื่อนตลาด"},
{id:'v2q07',text:"An expanding diagonal (expanding ending diagonal) differs from a contracting ending diagonal in that:",choices:[{id:'a',letter:'A',text:'Its waves expand in amplitude, and trendlines diverge rather than converge'},{id:'b',letter:'B',text:'It appears exclusively in wave 1 position, not wave 5'},{id:'c',letter:'C',text:'It contains only three sub-waves instead of five'},{id:'d',letter:'D',text:'Wave 4 does not overlap wave 1 in an expanding diagonal'}],correct:['a'],expEn:"An expanding diagonal has five sub-waves (like a contracting diagonal) but the waves increase in amplitude, so the two bounding trendlines diverge. In a contracting diagonal, the trendlines converge. Both types can appear in wave 5 or wave C positions. Both have five waves with wave 4 overlapping wave 1. The number of sub-waves (C) is the same (five) for both.",expTh:"Expanding diagonal มี 5 sub-waves (เหมือน contracting diagonal) แต่คลื่นมีแอมพลิจูดเพิ่มขึ้น ทำให้เส้นแนวโน้มทั้งสองแยกออกจากกัน ใน contracting diagonal เส้นแนวโน้มจะบรรจบกัน ทั้งสองประเภทสามารถปรากฏในตำแหน่ง wave 5 หรือ wave C จำนวน sub-waves (C) เท่ากัน (ห้า) สำหรับทั้งสอง"},
{id:'v2q08',text:"In a running flat correction, what is distinctive about the termination of wave C?",choices:[{id:'a',letter:'A',text:'Wave C ends well beyond the start of wave A, in a strong impulse'},{id:'b',letter:'B',text:'Wave C does not reach the end (bottom) of wave A'},{id:'c',letter:'C',text:'Wave C returns exactly to the start of wave A'},{id:'d',letter:'D',text:'Wave C is always shorter than wave A in a running flat'}],correct:['b'],expEn:"In a running flat, wave B moves beyond the start of wave A (like an expanded flat), but wave C does not reach the price level of wave A's end. This means the correction 'runs' sideways rather than fully retracing. A describes an expanded (irregular) flat where wave C moves beyond wave A's end. C describes a regular flat. D alone is not sufficient — in a running flat, wave C is always shorter, but option B is the key defining termination characteristic.",expTh:"ใน running flat คลื่น B เคลื่อนที่เกินจุดเริ่มต้นของคลื่น A (เหมือน expanded flat) แต่คลื่น C ไม่ถึงระดับราคาที่จุดสิ้นสุดของคลื่น A หมายความว่าการ correction 'วิ่ง' ไปด้านข้างแทนที่จะย้อนกลับอย่างเต็มที่ ตัวเลือก A อธิบาย expanded (irregular) flat ที่คลื่น C เกินจุดสิ้นสุดของ A"},
{id:'v2q09',text:"In advanced Elliott Wave counting, the 'alternate count' serves which primary function?",choices:[{id:'a',letter:'A',text:'It replaces the preferred count when Fibonacci targets are missed'},{id:'b',letter:'B',text:'It identifies the most profitable trading scenario'},{id:'c',letter:'C',text:'It represents the next most probable wave interpretation, serving as a risk management scenario'},{id:'d',letter:'D',text:'It is used only when the preferred count is invalidated by a rule violation'}],correct:['c'],expEn:"The alternate count is the second-most probable wave interpretation maintained simultaneously with the preferred count. It functions as a risk management scenario — if the preferred count is invalidated, the alternate becomes the new preferred. It is not reserved only for invalidation events (D), nor is it chosen for profit maximization (B). Missed Fibonacci targets (A) reduce confidence but do not trigger a switch to the alternate.",expTh:"Alternate count คือการตีความคลื่นที่น่าจะเป็นอันดับสองที่รักษาไว้พร้อมกับ preferred count ทำหน้าที่เป็น scenario การจัดการความเสี่ยง หากถูกยืนยันว่า preferred count ผิดพลาด alternate จะกลายเป็น preferred ใหม่ ไม่ได้สงวนไว้เฉพาะเมื่อเกิดการละเมิดกฎ (D) หรือเลือกเพื่อเพิ่มผลกำไรสูงสุด (B)"},
{id:'v2q10',text:"According to EWT advanced guidelines, wave 4 of an ending diagonal tends to:",choices:[{id:'a',letter:'A',text:'Retrace less than 61.8% of wave 3 of the diagonal'},{id:'b',letter:'B',text:'Always form a zigzag pattern'},{id:'c',letter:'C',text:'Not overlap wave 1 territory in any case'},{id:'d',letter:'D',text:'Retrace at least 66% (two-thirds) of wave 3 of the diagonal'}],correct:['d'],expEn:"In an ending diagonal, wave 4 typically retraces a significant portion of wave 3 — often at least two-thirds (66%) of wave 3. This deep retracement is a distinguishing characteristic. Wave 4 in a diagonal overlaps wave 1, unlike in impulses (C is wrong). Wave 4 in a diagonal does not have to be a zigzag specifically (B). Less than 61.8% (A) would be shallow and atypical for a diagonal wave 4.",expTh:"ใน ending diagonal คลื่น 4 มักย้อนกลับส่วนสำคัญของคลื่น 3 โดยมักอย่างน้อยสองในสาม (66%) ของคลื่น 3 การย้อนกลับลึกนี้เป็นลักษณะเฉพาะ คลื่น 4 ใน diagonal ทับซ้อนกับคลื่น 1 ต่างจาก impulses (C ผิด) คลื่น 4 ใน diagonal ไม่ต้องเป็น zigzag โดยเฉพาะ (B ผิด)"},
{id:'v2q11',text:"The 'triple three' is distinguished from the 'double three' by:",choices:[{id:'a',letter:'A',text:'Having three simple corrective patterns linked by two X waves'},{id:'b',letter:'B',text:'Using only triangles as its three component patterns'},{id:'c',letter:'C',text:'Having a motive wave at its center'},{id:'d',letter:'D',text:'Being bounded by converging trendlines on both sides'}],correct:['a'],expEn:"A triple three (W-X-Y-X-Z) consists of three simple corrective patterns connected by two X waves, as opposed to a double three (W-X-Y) with two patterns and one X wave. The component patterns can be any mix of zigzags, flats, and triangles (B is wrong). A motive center wave (C) is not part of the structure. Trendline convergence (D) describes a triangle, not a triple three.",expTh:"Triple three (W-X-Y-X-Z) ประกอบด้วยรูปแบบ corrective ง่าย 3 แบบที่เชื่อมต่อด้วยคลื่น X 2 คลื่น แตกต่างจาก double three (W-X-Y) ที่มี 2 รูปแบบและ 1 คลื่น X รูปแบบองค์ประกอบสามารถเป็นการผสมของ zigzag, flat และ triangle ใดก็ได้ (B ผิด)"},
{id:'v2q12',text:"Elliott Wave channeling for a completed five-wave impulse draws the FINAL channel using:",choices:[{id:'a',letter:'A',text:'Wave 2 end and wave 4 end, with a parallel through wave 3'},{id:'b',letter:'B',text:'Wave 1 start and wave 3 end, with a parallel through wave 2'},{id:'c',letter:'C',text:'Wave 1 start and wave 2 end, with a parallel through wave 1 end'},{id:'d',letter:'D',text:'Wave 3 end and wave 5 end, with a parallel through wave 4'}],correct:['a'],expEn:"The final channel for a completed impulse connects the terminations of waves 2 and 4, then draws a parallel through the termination of wave 3. Wave 5 often terminates at or near the upper channel line. The base channel (C) is used early in the wave. D incorrectly uses wave 5 which hasn't terminated when the projection is needed. A describes an incorrect combination.",expTh:"Channel สุดท้ายสำหรับ impulse ที่เสร็จสมบูรณ์เชื่อมต่อจุดสิ้นสุดของคลื่น 2 และ 4 จากนั้นวาดเส้นขนานผ่านจุดสิ้นสุดของคลื่น 3 คลื่น 5 มักสิ้นสุดที่หรือใกล้กับเส้นช่องบน Base channel (C) ใช้ในช่วงต้นของคลื่น"},
{id:'v2q13',text:"In Socionomics, a negative social mood peak most typically correlates with:",choices:[{id:'a',letter:'A',text:'Technological innovation peaks and creative cultural output'},{id:'b',letter:'B',text:'The end of a war and restoration of social order'},{id:'c',letter:'C',text:'Stock market troughs and increased social conflict, xenophobia, and authoritarianism'},{id:'d',letter:'D',text:'Central bank rate peaks and credit contraction'}],correct:['c'],expEn:"In Socionomics, negative social mood typically correlates with stock market troughs, increased social conflict, xenophobia, scapegoating, and trends toward authoritarianism. Positive social mood peaks correlate with technological innovation and creative cultural flourishing (A). The end of conflict (C) may follow a mood trough but is not the primary correlation Socionomics identifies. Economic variables (D) are considered results of social mood, not simultaneous correlates.",expTh:"ใน Socionomics social mood เชิงลบมักสัมพันธ์กับจุดต่ำของตลาดหุ้น ความขัดแย้งทางสังคมที่เพิ่มขึ้น ความกลัวต่างชาติ และแนวโน้มสู่ลัทธิเผด็จการ Social mood เชิงบวกสัมพันธ์กับนวัตกรรมทางเทคโนโลยีและความรุ่งเรืองทางวัฒนธรรม (A) การสิ้นสุดของความขัดแย้ง (C) อาจเกิดหลังจาก mood ต่ำแต่ไม่ใช่ความสัมพันธ์หลัก"},
{id:'v2q14',text:"What defines an 'irregular' (expanded) flat compared to a 'regular' flat?",choices:[{id:'a',letter:'A',text:'Wave A of an irregular flat subdivides into five waves'},{id:'b',letter:'B',text:'The wave C of an irregular flat does not move beyond wave A\'s end'},{id:'c',letter:'C',text:'Wave B in a regular flat exceeds the start of wave A'},{id:'d',letter:'D',text:'In an irregular flat, wave B exceeds the start of wave A and wave C moves beyond the end of wave A'}],correct:['d'],expEn:"An irregular (expanded) flat is characterized by wave B exceeding the start of wave A (by more than a marginal amount) and wave C moving beyond the end of wave A in the opposite direction. A regular flat has wave B returning approximately to wave A's start and wave C ending near wave A's end. B describes a running flat (C doesn't reach wave A's end). A is incorrect — in all flats, wave A subdivides into 3 waves.",expTh:"Irregular (expanded) flat มีลักษณะเฉพาะคือคลื่น B เกินจุดเริ่มต้นของคลื่น A (เกินกว่าเล็กน้อย) และคลื่น C เคลื่อนที่เกินจุดสิ้นสุดของคลื่น A ในทิศทางตรงข้าม Regular flat มีคลื่น B กลับมาประมาณจุดเริ่มต้นของ A และคลื่น C สิ้นสุดใกล้กับจุดสิ้นสุดของ A ตัวเลือก B อธิบาย running flat ตัวเลือก A ผิดเพราะใน flat ทุกประเภท คลื่น A แบ่งย่อยเป็น 3 คลื่น"},
{id:'v2q15',text:"The 'thrust' following a triangle in wave 4 position typically terminates near:",choices:[{id:'a',letter:'A',text:'The end of wave 1 of the impulse'},{id:'b',letter:'B',text:'61.8% of the prior wave 3 advance'},{id:'c',letter:'C',text:'The intersection of a channel line or the measured amplitude of the triangle above the breakout'},{id:'d',letter:'D',text:'The highest Fibonacci confluence zone of waves 1 through 4'}],correct:['c'],expEn:"The thrust following a triangle at the wave 4 position projects the final wave 5. The most widely cited method is to measure the widest amplitude of the triangle and add that distance to the apex/breakout point. Alternatively, the thrust is often expected to reach the channel line drawn through waves 2 and 3. Option A describes a retracement guideline for corrections. Option B's 61.8% is for retracements. Option D combines multiple factors but C is the standard approach.",expTh:"ระยะ thrust หลัง triangle ในตำแหน่งคลื่น 4 ฉายภาพคลื่น 5 สุดท้าย วิธีที่อ้างถึงกันมากที่สุดคือวัดแอมพลิจูดกว้างที่สุดของ triangle และบวกระยะนั้นเข้ากับจุด apex/breakout หรือ thrust มักถูกคาดว่าจะถึงเส้น channel ที่วาดผ่านคลื่น 2 และ 3 ตัวเลือก A อธิบายแนวทาง retracement สำหรับ corrections"},
{id:'v2q16',text:"In Prechter's Socionomics, which financial market is considered the BEST real-time measure of social mood?",choices:[{id:'a',letter:'A',text:'The bond market, due to its depth and institutional participation'},{id:'b',letter:'B',text:'The broad stock market index, because of its mass participation and continuous valuation'},{id:'c',letter:'C',text:'Commodity markets, because they reflect fundamental supply and demand'},{id:'d',letter:'D',text:'Currency markets, as they reflect cross-border capital flows and macro policy'}],correct:['b'],expEn:"Prechter identifies the broad stock market (specifically broad equity indices) as the best real-time measure of aggregate social mood because it aggregates millions of participants' collective valuations continuously. Bond markets (A) are more influenced by credit and rate cycles. Commodities (C) reflect supply and demand fundamentals. Currencies (D) are heavily policy-influenced and measure relative economic confidence.",expTh:"Prechter ระบุว่าตลาดหุ้นในวงกว้าง (โดยเฉพาะดัชนี equity ในวงกว้าง) เป็นการวัด social mood รวมที่ดีที่สุดแบบ real-time เพราะรวบรวมการประเมินรวมของผู้เข้าร่วมหลายล้านคนอย่างต่อเนื่อง ตลาดพันธบัตร (A) ได้รับอิทธิพลจากวัฏจักรสินเชื่อและอัตราดอกเบี้ย สินค้าโภคภัณฑ์ (C) สะท้อนพื้นฐานอุปสงค์อุปทาน สกุลเงิน (D) ได้รับอิทธิพลจากนโยบายอย่างหนัก"},
{id:'v2q17',text:"In complex double zigzag labeling (W-X-Y), the W wave and the Y wave both must be:",choices:[{id:'a',letter:'A',text:'Flats of any variety'},{id:'b',letter:'B',text:'Triangles pointing in opposite directions'},{id:'c',letter:'C',text:'Motive waves in the same direction as the overall correction'},{id:'d',letter:'D',text:'Simple corrective zigzags, each subdividing as 5-3-5'}],correct:['d'],expEn:"A double zigzag (WXY) consists of two zigzag patterns (W and Y), each subdividing as 5-3-5 (zigzag structure), connected by an X wave. Both W and Y are zigzags (simple corrective patterns with a 5-3-5 structure). A and B are incorrect — the component patterns in a double zigzag are specifically zigzags, not flats or triangles. C describes the directional tendency but not the structural requirement.",expTh:"Double zigzag (WXY) ประกอบด้วยรูปแบบ zigzag สองแบบ (W และ Y) แต่ละแบบแบ่งย่อยเป็น 5-3-5 (โครงสร้าง zigzag) เชื่อมต่อด้วยคลื่น X ทั้ง W และ Y เป็น zigzag (รูปแบบ corrective ง่ายที่มีโครงสร้าง 5-3-5) ตัวเลือก A และ B ผิด ตัวเลือก C อธิบายแนวโน้มทิศทาง ไม่ใช่ข้อกำหนดเชิงโครงสร้าง"},
{id:'v2q18',text:"Why must a triangle NOT appear in the wave 2 position of an impulse?",choices:[{id:'a',letter:'A',text:'Triangles are too complex to fit into a second-wave position'},{id:'b',letter:'B',text:'Wave 2 requires a three-wave simple correction, and triangles tend to appear in wave 4 or the penultimate wave position'},{id:'c',letter:'C',text:'Triangles do not generate enough price retracement to constitute wave 2'},{id:'d',letter:'D',text:'EWT rule prohibits triangles in any corrective sub-wave'}],correct:['b'],expEn:"Elliott Wave guidelines state that triangles appear only in positions immediately preceding the final actionary wave of a pattern: wave 4 of an impulse, wave B of a zigzag, or the second-to-last position in combinations. A triangle in wave 2 is incorrect because triangles are reserved for penultimate wave positions. Wave 2 requires a simple corrective structure (zigzag, flat, or combination). The guideline (not a hard rule) prevents triangles from forming as second waves.",expTh:"แนวทาง Elliott Wave ระบุว่า triangle ปรากฏเฉพาะในตำแหน่งที่อยู่ก่อนหน้า actionary wave สุดท้ายของรูปแบบทันที: คลื่น 4 ของ impulse, คลื่น B ของ zigzag หรือตำแหน่งรองสุดท้ายใน combinations Triangle ใน wave 2 ไม่ถูกต้องเพราะ triangle สงวนไว้สำหรับตำแหน่ง penultimate wave คลื่น 2 ต้องการโครงสร้าง corrective ง่าย"},
{id:'v2q19',text:"An expanding triangle in the wave 4 position is characterized by which trendline behavior?",choices:[{id:'a',letter:'A',text:'Both trendlines converge toward a single apex point'},{id:'b',letter:'B',text:'The upper trendline slopes up and the lower trendline slopes down (diverging)'},{id:'c',letter:'C',text:'Both trendlines are horizontal'},{id:'d',letter:'D',text:'The pattern forms only in downtrending markets'}],correct:['b'],expEn:"An expanding triangle is defined by diverging trendlines: in a bull market position, the upper trendline slopes upward and the lower trendline slopes downward, with the amplitude of each successive sub-wave increasing. Converging trendlines characterize a contracting triangle (A). Horizontal trendlines describe a rectangle or symmetric consolidation (C). Expanding triangles can appear in both bull and bear market wave 4 positions (D is wrong).",expTh:"Expanding triangle กำหนดโดยเส้นแนวโน้มที่แยกออก: ในตำแหน่งตลาด bull เส้นแนวโน้มบนลาดขึ้นและเส้นแนวโน้มล่างลาดลง โดยแอมพลิจูดของแต่ละ sub-wave ที่ต่อเนื่องเพิ่มขึ้น เส้นแนวโน้มที่บรรจบกันเป็นลักษณะของ contracting triangle (A) เส้นแนวโน้มแนวนอนอธิบาย rectangle หรือ consolidation สมมาตร (C)"},
{id:'v2q20',text:"A 'running correction' is best described as:",choices:[{id:'a',letter:'A',text:'A correction that unfolds over a very short time period'},{id:'b',letter:'B',text:'A correction that makes only a marginal retracement of the prior wave due to a very strong underlying trend'},{id:'c',letter:'C',text:'A complex triple combination with three X waves'},{id:'d',letter:'D',text:'A flat where wave C reaches 161.8% of wave A'}],correct:['b'],expEn:"A running correction is one where the correction fails to make a significant retracement of the prior wave, instead moving mostly sideways or slightly against the prior trend. This occurs in very strong trends where the underlying directional force is powerful. It is not defined by its time frame (A). A triple combination has two X waves, not three (C). A flat with 161.8% C wave would be an expanded flat, not a running correction (D).",expTh:"Running correction คือการ correction ที่ล้มเหลวในการ retrace คลื่นก่อนหน้าอย่างมีนัยสำคัญ แต่กลับเคลื่อนที่ไปด้านข้างเป็นส่วนใหญ่หรือสวนแนวโน้มก่อนหน้าเล็กน้อย สิ่งนี้เกิดขึ้นในแนวโน้มที่แข็งแกร่งมากที่แรงทิศทางพื้นฐานมีพลัง ไม่ได้กำหนดโดยกรอบเวลา (A) Triple combination มีคลื่น X สองคลื่น ไม่ใช่สาม (C)"}
];

{id:'v3q01',text:"Which THREE of the following statements correctly describe the rules that MUST be followed in a valid impulse wave?",choices:[{id:'a',letter:'A',text:'Wave 2 may not retrace more than 100% of wave 1'},{id:'b',letter:'B',text:'Wave 3 must be the longest among waves 1, 3, and 5'},{id:'c',letter:'C',text:'Wave 4 may not enter the price territory of wave 1 (in a non-diagonal impulse)'},{id:'d',letter:'D',text:'Wave 3 may never be the shortest among waves 1, 3, and 5'}],correct:['a','c','d'],expEn:"A, C, and D are the three cardinal rules of an impulse wave. A: Wave 2 cannot retrace more than 100% of wave 1. C: Wave 4 cannot overlap wave 1 (in a standard impulse). D: Wave 3 cannot be the shortest. B is INCORRECT — wave 3 is required only to NOT be the shortest, not to be the longest; wave 5 or wave 1 can be the longest.",expTh:"A, C และ D เป็น 3 กฎสำคัญของ impulse wave A: คลื่น 2 ไม่สามารถ retrace เกิน 100% ของคลื่น 1 C: คลื่น 4 ไม่สามารถทับซ้อนกับคลื่น 1 (ใน impulse มาตรฐาน) D: คลื่น 3 ต้องไม่สั้นที่สุด B ผิด — คลื่น 3 ต้องไม่สั้นที่สุด ไม่จำเป็นต้องยาวที่สุด คลื่น 5 หรือคลื่น 1 อาจยาวที่สุดได้"},
{id:'v3q02',text:"Which TWO Fibonacci ratios are used MOST frequently in projecting wave 3 relative to wave 1?",choices:[{id:'a',letter:'A',text:'1.618 × wave 1'},{id:'b',letter:'B',text:'0.618 × wave 1'},{id:'c',letter:'C',text:'2.618 × wave 1'},{id:'d',letter:'D',text:'0.382 × wave 1'}],correct:['a','c'],expEn:"A (1.618 × wave 1) and C (2.618 × wave 1) are the two most common Fibonacci extension targets for wave 3. When wave 3 is a normal extension, 1.618 is the primary target. When wave 3 is powerfully extended, 2.618 is the next target. B (0.618) is a retracement ratio, not an extension for wave 3. D (0.382) is used for shallow retracements, not wave 3 extension projections.",expTh:"A (1.618 × คลื่น 1) และ C (2.618 × คลื่น 1) เป็นสองเป้าหมาย Fibonacci extension ที่พบบ่อยที่สุดสำหรับคลื่น 3 เมื่อคลื่น 3 เป็นการขยายปกติ 1.618 คือเป้าหมายหลัก เมื่อคลื่น 3 ขยายตัวอย่างมีพลัง 2.618 คือเป้าหมายถัดไป B (0.618) เป็น retracement ratio ไม่ใช่ extension สำหรับคลื่น 3"},
{id:'v3q03',text:"Which THREE of the following correctly describe characteristics of wave 4 in a typical bull market impulse?",choices:[{id:'a',letter:'A',text:'Wave 4 often forms a flat or triangle pattern'},{id:'b',letter:'B',text:'Wave 4 most commonly retraces between 30% and 50% of wave 3'},{id:'c',letter:'C',text:'Wave 4 in a contracting diagonal always overlaps wave 1'},{id:'d',letter:'D',text:'According to the Guideline of Alternation, wave 4 tends to differ in form from wave 2'}],correct:['a','b','d'],expEn:"A: Wave 4 typically forms a flat or triangle (alternating with zigzag wave 2). B: A common retracement for wave 4 is 38.2%–50% of wave 3. D: Alternation guideline states wave 4 will differ in form, depth, or complexity from wave 2. C is partially true for diagonals but states it 'always' does — in a contracting diagonal wave 4 does overlap wave 1, but this is specific to diagonals and the word 'always' and the general context make it misleading.",expTh:"A: คลื่น 4 มักก่อตัวเป็น flat หรือ triangle (สลับกับ zigzag ของคลื่น 2) B: การ retrace ทั่วไปของคลื่น 4 อยู่ระหว่าง 38.2%–50% ของคลื่น 3 D: แนวทาง Alternation ระบุว่าคลื่น 4 จะต่างกันในรูปแบบ ความลึก หรือความซับซ้อนจากคลื่น 2 C เป็นความจริงบางส่วนสำหรับ diagonal แต่ใช้คำว่า 'always' และบริบททั่วไปทำให้เข้าใจผิดได้"},
{id:'v3q04',text:"Which TWO statements about a zigzag correction are CORRECT?",choices:[{id:'a',letter:'A',text:'Wave A in a zigzag subdivides into five waves'},{id:'b',letter:'B',text:'Wave B in a zigzag can retrace up to 99% of wave A without changing the pattern to a flat'},{id:'c',letter:'C',text:'Wave C in a zigzag subdivides into three waves'},{id:'d',letter:'D',text:'The overall structure of a zigzag is 5-3-5'}],correct:['a','d'],expEn:"A: Wave A in a zigzag subdivides into 5 motive waves. D: The entire zigzag structure is 5-3-5 (A=5, B=3, C=5). B is false — if wave B retraces close to 100% of wave A, the structure would be reclassified as a flat, not a zigzag (typically zigzag wave B retraces no more than 79% of A). C is false — wave C in a zigzag subdivides into 5 waves, not 3.",expTh:"A: คลื่น A ใน zigzag แบ่งย่อยเป็น 5 คลื่น motive D: โครงสร้างทั้งหมดของ zigzag คือ 5-3-5 (A=5, B=3, C=5) B ผิด — หากคลื่น B retrace ใกล้ 100% ของ A โครงสร้างจะถูกจัดประเภทใหม่เป็น flat ไม่ใช่ zigzag C ผิด — คลื่น C ใน zigzag แบ่งย่อยเป็น 5 คลื่น ไม่ใช่ 3"},
{id:'v3q05',text:"Which THREE of the following are valid corrective patterns in Elliott Wave Theory?",choices:[{id:'a',letter:'A',text:'Contracting triangle'},{id:'b',letter:'B',text:'Leading diagonal'},{id:'c',letter:'C',text:'Double zigzag'},{id:'d',letter:'D',text:'Expanded flat'}],correct:['a','c','d'],expEn:"A (contracting triangle), C (double zigzag / combination), and D (expanded flat) are all valid corrective patterns. B (leading diagonal) is a MOTIVE pattern that appears in wave 1 or wave A positions — it is not a corrective pattern. Corrective patterns include: zigzags (simple and multiple), flats (regular, expanded, running), triangles (contracting, expanding), and combinations.",expTh:"A (contracting triangle), C (double zigzag / combination) และ D (expanded flat) ล้วนเป็นรูปแบบ corrective ที่ถูกต้อง B (leading diagonal) เป็นรูปแบบ MOTIVE ที่ปรากฏในตำแหน่งคลื่น 1 หรือ A ไม่ใช่รูปแบบ corrective รูปแบบ corrective ได้แก่: zigzag, flat, triangle และ combinations"},
{id:'v3q06',text:"Which TWO of the following Fibonacci ratios are reciprocals of each other?",choices:[{id:'a',letter:'A',text:'0.618 and 1.618'},{id:'b',letter:'B',text:'0.382 and 2.618'},{id:'c',letter:'C',text:'0.500 and 2.000'},{id:'d',letter:'D',text:'1.000 and 1.618'}],correct:['a','b'],expEn:"A: 0.618 and 1.618 are reciprocals — the Golden Ratio and its inverse (0.618 × 1.618 = 1.000). B: 0.382 and 2.618 are also reciprocals — 0.382 × 2.618 ≈ 1.000. These are both standard Fibonacci reciprocal pairs used in wave projections. C (0.500 and 2.000) are mathematical reciprocals but are not Fibonacci-derived ratios. D (1.000 and 1.618) are not reciprocals.",expTh:"A: 0.618 และ 1.618 เป็น reciprocals — Golden Ratio และค่าผกผัน (0.618 × 1.618 = 1.000) B: 0.382 และ 2.618 ก็เป็น reciprocals — 0.382 × 2.618 ≈ 1.000 ทั้งสองเป็นคู่ Fibonacci reciprocal มาตรฐานที่ใช้ในการฉายภาพคลื่น C (0.500 และ 2.000) เป็น reciprocal ทางคณิตศาสตร์แต่ไม่ได้มาจาก Fibonacci D (1.000 และ 1.618) ไม่ใช่ reciprocal"},
{id:'v3q07',text:"When identifying a contracting triangle, which THREE characteristics must be present?",choices:[{id:'a',letter:'A',text:'Five sub-waves (A-B-C-D-E), each subdividing into three waves'},{id:'b',letter:'B',text:'Wave C shorter than wave A, wave D shorter than wave B, and wave E shorter than wave C'},{id:'c',letter:'C',text:'The triangle must be bounded by two converging trendlines'},{id:'d',letter:'D',text:'Wave E must be the longest sub-wave of the triangle'}],correct:['a','b','c'],expEn:"A: Five corrective sub-waves (A-B-C-D-E) each subdividing into 3 is the structural definition. B: Each successive wave is shorter than the alternating wave before it (C<A, D<B, E<C) — this creates the contracting shape. C: Two converging trendlines are the visual boundary of a contracting triangle. D is INCORRECT — wave E is the shortest sub-wave, not the longest; in a contracting triangle, waves progressively decrease.",expTh:"A: 5 sub-waves corrective (A-B-C-D-E) แต่ละตัวแบ่งย่อยเป็น 3 คือคำจำกัดความเชิงโครงสร้าง B: แต่ละคลื่นที่ต่อเนื่องสั้นกว่าคลื่นสลับก่อนหน้า (C<A, D<B, E<C) สร้างรูปร่างที่หดตัว C: เส้นแนวโน้มบรรจบกันสองเส้นเป็นขอบเขตภาพของ contracting triangle D ผิด — คลื่น E เป็น sub-wave ที่สั้นที่สุด ไม่ใช่ยาวที่สุด"},
{id:'v3q08',text:"Which TWO wave positions in a standard impulse wave commonly show momentum DIVERGENCE with price action?",choices:[{id:'a',letter:'A',text:'Wave 3 showing negative divergence against wave 1'},{id:'b',letter:'B',text:'Wave 5 showing negative divergence against wave 3'},{id:'c',letter:'C',text:'Wave 4 showing positive divergence against wave 2'},{id:'d',letter:'D',text:'Wave 5 showing positive divergence in a bear market (downtrend fifth wave)'}],correct:['b','d'],expEn:"B: Wave 5 commonly shows negative divergence in an uptrend — price makes higher highs but oscillators make lower highs, warning of waning momentum. D: In a bear market, the fifth wave decline often shows positive divergence (price makes lower lows but oscillators make higher lows), signaling exhaustion of the downtrend. A is false — wave 3 shows the strongest momentum, typically confirming wave 1. C is a made-up concept not in EWT.",expTh:"B: คลื่น 5 มักแสดง negative divergence ในแนวโน้มขาขึ้น — ราคาทำ higher highs แต่ oscillators ทำ lower highs เตือนถึง momentum ที่อ่อนลง D: ในตลาด bear คลื่น 5 ขาลงมักแสดง positive divergence (ราคาทำ lower lows แต่ oscillators ทำ higher lows) ส่งสัญญาณความหมดแรงของแนวโน้มขาลง A ผิด — คลื่น 3 แสดง momentum แข็งแกร่งที่สุด C เป็นแนวคิดที่ไม่มีอยู่ใน EWT"},
{id:'v3q09',text:"Which THREE Fibonacci ratios arise from dividing a Fibonacci number by numbers in the sequence at different relative positions?",choices:[{id:'a',letter:'A',text:'0.618 — dividing a number by the next higher number'},{id:'b',letter:'B',text:'0.382 — dividing a number by the number two positions higher'},{id:'c',letter:'C',text:'0.236 — dividing a number by the number three positions higher'},{id:'d',letter:'D',text:'0.786 — dividing a number by the number one position lower'}],correct:['a','b','c'],expEn:"A: 0.618 = any Fibonacci number ÷ next number (e.g., 89÷144). B: 0.382 = any Fibonacci number ÷ the number two positions higher (e.g., 55÷144 ≈ 0.382). C: 0.236 = any Fibonacci number ÷ the number three positions higher (e.g., 34÷144 ≈ 0.236). D: 0.786 is approximately the square root of 0.618 and is used in harmonic analysis but is NOT a direct Fibonacci sequence division ratio.",expTh:"A: 0.618 = ตัวเลข Fibonacci ใดก็ตาม ÷ ตัวเลขถัดไป (เช่น 89÷144) B: 0.382 = ตัวเลข Fibonacci ÷ ตัวเลขที่สูงกว่าสองตำแหน่ง (เช่น 55÷144 ≈ 0.382) C: 0.236 = ตัวเลข Fibonacci ÷ ตัวเลขที่สูงกว่าสามตำแหน่ง (เช่น 34÷144 ≈ 0.236) D: 0.786 ≈ รากที่สองของ 0.618 ใช้ใน harmonic analysis แต่ไม่ใช่อัตราส่วนการหารลำดับ Fibonacci โดยตรง"},
{id:'v3q10',text:"Which THREE of the following correctly describe wave 2 personality in a bull market impulse?",choices:[{id:'a',letter:'A',text:'Wave 2 frequently retraces deeply, often 61.8% or more of wave 1'},{id:'b',letter:'B',text:'Volume typically declines during wave 2, indicating diminished selling pressure'},{id:'c',letter:'C',text:'Market sentiment during wave 2 is characterized by doubt, fear, and disbelief in the new trend'},{id:'d',letter:'D',text:'Wave 2 typically coincides with expanding market breadth and increasing new highs'}],correct:['a','b','c'],expEn:"A: Wave 2 is commonly a deep retracement (61.8% is most common). B: Volume typically contracts during wave 2 as the corrective selling diminishes. C: Sentiment in wave 2 is bearish — the public does not believe the wave 1 advance and expects the prior downtrend to resume. D is INCORRECT — expanding breadth and new highs are characteristic of wave 3, not wave 2.",expTh:"A: คลื่น 2 มักเป็น retracement ลึก (61.8% พบบ่อยที่สุด) B: ปริมาณซื้อขายมักหดตัวในช่วงคลื่น 2 เมื่อแรงขาย corrective ลดลง C: Sentiment ในคลื่น 2 เป็น bearish — สาธารณะไม่เชื่อในการปรับตัวขึ้นของคลื่น 1 และคาดว่าแนวโน้มขาลงเดิมจะกลับมา D ผิด — การขยายความกว้างตลาดและ new highs เป็นลักษณะของคลื่น 3"},
{id:'v3q11',text:"In an impulse with a wave 3 extension, which TWO guidelines apply to projecting wave 5?",choices:[{id:'a',letter:'A',text:'Wave 5 tends to equal wave 1 in price length'},{id:'b',letter:'B',text:'Wave 5 projects to 1.618 × the net distance of waves 1 through 3'},{id:'c',letter:'C',text:'Wave 5 tends to equal 0.618 × the distance from wave 1 start to wave 3 end'},{id:'d',letter:'D',text:'Wave 5 always exceeds wave 3 in a wave 3 extension scenario'}],correct:['a','c'],expEn:"When wave 3 is extended, the Guideline of Equality states waves 1 and 5 tend toward equality (A). Additionally, wave 5 often projects to 0.618 times the distance from the origin of wave 1 to the top of wave 3 (C). B is sometimes used but is less standard. D is INCORRECT — when wave 3 is extended, wave 5 is commonly shorter than wave 3 (they are expected to approach equality with wave 1, not exceed wave 3).",expTh:"เมื่อคลื่น 3 ขยายตัว แนวทาง Equality ระบุว่าคลื่น 1 และ 5 มีแนวโน้มเท่ากัน (A) นอกจากนี้ คลื่น 5 มักฉายภาพไปที่ 0.618 เท่าของระยะทางจากจุดเริ่มต้นของคลื่น 1 ถึงจุดสูงสุดของคลื่น 3 (C) D ผิด — เมื่อคลื่น 3 ขยาย คลื่น 5 มักสั้นกว่าคลื่น 3 ไม่ได้เกินคลื่น 3"},
{id:'v3q12',text:"Which THREE statements about Fibonacci confluence are CORRECT in Elliott Wave applied analysis?",choices:[{id:'a',letter:'A',text:'Confluence zones are price areas where multiple Fibonacci projections and retracements overlap'},{id:'b',letter:'B',text:'A confluence of Fibonacci levels increases the probability of a wave terminating near that area'},{id:'c',letter:'C',text:'Fibonacci confluence guarantees that price will reverse at the exact level'},{id:'d',letter:'D',text:'Confluence zones can be derived from projecting wave equality, extension ratios, and retracement levels of prior waves'}],correct:['a','b','d'],expEn:"A: Confluence zones are areas where multiple Fibonacci measurements cluster together. B: Multiple overlapping Fibonacci levels increase the probability of a wave turning near that area — this is a probabilistic tool, not a certainty. D: Projections from wave equality (e.g., wave 5 = wave 1), extension ratios (1.618 × prior wave), and retracements (0.618 of prior advance) can all produce a single confluence zone. C is INCORRECT — confluence increases probability but never guarantees reversal.",expTh:"A: Confluence zones คือพื้นที่ที่การวัด Fibonacci หลายรายการรวมตัวกัน B: Fibonacci levels ที่ทับซ้อนกันหลายระดับเพิ่มความน่าจะเป็นที่คลื่นจะเปลี่ยนทิศทางใกล้กับพื้นที่นั้น D: การฉายภาพจาก wave equality, extension ratios และ retracements สามารถสร้าง confluence zone เดียวได้ C ผิด — confluence เพิ่มความน่าจะเป็นแต่ไม่ได้รับประกัน reversal"},
{id:'v3q13',text:"In an applied Elliott count, if wave 4 overlaps wave 1 in what appeared to be a standard impulse, which TWO explanations are MOST consistent with Elliott Wave Theory?",choices:[{id:'a',letter:'A',text:'The pattern is a diagonal triangle (ending or leading), where overlap is permitted'},{id:'b',letter:'B',text:'The prior wave count was incorrect and needs to be re-labeled'},{id:'c',letter:'C',text:'Wave 4 violated the rules and the count should be confirmed as invalid'},{id:'d',letter:'D',text:'The overlap indicates a flat correction disguised as an impulse'}],correct:['a','b'],expEn:"A: A diagonal triangle allows wave 4 to overlap wave 1 — if overlap occurs, a diagonal is a valid re-interpretation. B: If the pattern was labeled as a standard impulse, the overlap means the count is wrong and needs re-labeling (perhaps it is corrective, or the wave 1/2 labels were wrong). C adds no new information — saying the count is invalid is the same as saying it needs relabeling (B). D is a non-standard interpretation not supported by EWT rules.",expTh:"A: Diagonal triangle อนุญาตให้คลื่น 4 ทับซ้อนกับคลื่น 1 — หากเกิดการทับซ้อน diagonal เป็นการตีความใหม่ที่ถูกต้อง B: หากรูปแบบถูกตั้งชื่อเป็น standard impulse การทับซ้อนหมายความว่าการนับผิดและต้องนับใหม่ C ไม่ได้ให้ข้อมูลใหม่ D เป็นการตีความที่ไม่ได้รับการสนับสนุนจากกฎ EWT"},
{id:'v3q14',text:"Which THREE of the following are characteristic signals of a wave 5 failure (truncated fifth) in a bull market?",choices:[{id:'a',letter:'A',text:'Wave 5 subdivides internally into five waves but fails to exceed the end of wave 3 in price'},{id:'b',letter:'B',text:'The truncated fifth is often followed by a swift and steep decline'},{id:'c',letter:'C',text:'A truncated fifth indicates extreme underlying strength in the trend'},{id:'d',letter:'D',text:'Volume tends to be lower in the truncated fifth wave than in wave 3'}],correct:['a','b','d'],expEn:"A: A truncated fifth internally has five waves but doesn't exceed wave 3's price extreme. B: A truncated fifth is a strong warning of trend weakness; the subsequent correction is typically sharp and quick. D: Volume in wave 5 (especially a truncated one) is characteristically lower than wave 3 volume — another sign of weakness. C is INCORRECT and opposite — a truncated fifth signals extreme underlying WEAKNESS, not strength.",expTh:"A: Truncated fifth มี 5 คลื่นภายในแต่ไม่เกินจุดสุดขีดราคาของคลื่น 3 B: Truncated fifth เป็นคำเตือนที่แข็งแกร่งของความอ่อนแอของแนวโน้ม การ correction ที่ตามมามักแหลมและเร็ว D: ปริมาณในคลื่น 5 (โดยเฉพาะที่ถูก truncate) ต่ำกว่าปริมาณคลื่น 3 อย่างเป็นลักษณะเฉพาะ C ผิดและตรงข้าม — truncated fifth บ่งบอกถึงความอ่อนแอขั้นพื้นฐานที่รุนแรง ไม่ใช่ความแข็งแกร่ง"},
{id:'v3q15',text:"When applying Fibonacci analysis to a zigzag, which TWO projections are most commonly used for wave C?",choices:[{id:'a',letter:'A',text:'Wave C = 100% of wave A (equality)'},{id:'b',letter:'B',text:'Wave C = 161.8% of wave A (extended C)'},{id:'c',letter:'C',text:'Wave C = 38.2% of wave A (shallow C)'},{id:'d',letter:'D',text:'Wave C = 261.8% of wave A'}],correct:['a','b'],expEn:"A: Wave C = Wave A (1:1 or 100%) is the most common Fibonacci relationship for wave C in a zigzag. B: Wave C = 1.618 × Wave A is the target when wave C is extended. These two are the primary Fibonacci projections for zigzag C waves. C (38.2%) is too shallow to be a typical C wave — C waves are five-wave motive structures that move decisively. D (261.8%) is a far extension rarely used and not a primary projection.",expTh:"A: คลื่น C = คลื่น A (1:1 หรือ 100%) เป็นความสัมพันธ์ Fibonacci ที่พบบ่อยที่สุดสำหรับคลื่น C ใน zigzag B: คลื่น C = 1.618 × คลื่น A เป็นเป้าหมายเมื่อคลื่น C ขยาย ทั้งสองเป็น Fibonacci projections หลักสำหรับคลื่น C ใน zigzag C (38.2%) ตื้นเกินไป D (261.8%) เป็น extension ที่ไกลมากและไม่ค่อยพบ"},
{id:'v3q16',text:"Which THREE elements must be re-evaluated when an Elliott analyst's preferred count is invalidated?",choices:[{id:'a',letter:'A',text:'The degree of the waves (the count may need to be one degree smaller or larger)'},{id:'b',letter:'B',text:'The wave starting point (the origin of the labeled wave 1 or A may need to be moved)'},{id:'c',letter:'C',text:'The Fibonacci targets (which were based on the incorrect count)'},{id:'d',letter:'D',text:'Only the label of the wave that violated the rule (the rest of the count remains intact)'}],correct:['a','b','c'],expEn:"A: The degree may need adjustment — what was labeled Intermediate degree may be Minor or vice versa. B: The starting point of the count may need to shift, changing where the wave begins. C: All Fibonacci targets derived from the incorrect count are invalidated and must be recalculated. D is INCORRECT — when a count is invalidated, it is rarely only one label that changes; the entire structure typically needs re-evaluation.",expTh:"A: ระดับคลื่นอาจต้องปรับ — สิ่งที่ตั้งชื่อเป็นระดับ Intermediate อาจเป็น Minor หรือในทางกลับกัน B: จุดเริ่มต้นของการนับอาจต้องเลื่อน เปลี่ยนจุดที่คลื่นเริ่มต้น C: เป้าหมาย Fibonacci ทั้งหมดที่ได้จากการนับที่ผิดจะถูกยกเลิกและต้องคำนวณใหม่ D ผิด — เมื่อการนับถูกยกเลิก ไม่ค่อยเกิดกรณีที่เปลี่ยนแค่ชื่อเดียว โครงสร้างทั้งหมดมักต้องประเมินใหม่"},
{id:'v3q17',text:"In analyzing a potential contracting triangle in wave B of a larger zigzag, which TWO observations would SUPPORT the triangle interpretation?",choices:[{id:'a',letter:'A',text:'Each successive sub-wave (C<A, D<B, E<C) is shorter, creating converging boundaries'},{id:'b',letter:'B',text:'The sub-waves of the triangle each subdivide into three waves'},{id:'c',letter:'C',text:'Wave E of the triangle exceeds the boundary of wave C'},{id:'d',letter:'D',text:'Volume expands dramatically on the breakout from the triangle (the thrust)'}],correct:['a','b'],expEn:"A: Successive shorter alternating sub-waves are the defining feature of a contracting triangle. B: In a triangle, each sub-wave (A, B, C, D, E) subdivides into three waves (3-3-3-3-3) — observing this confirms the corrective nature. C is CONTRARY to a contracting triangle (E exceeding C boundary would indicate an expanding triangle or a pattern failure). D describes what happens AFTER the triangle (the thrust), not during it.",expTh:"A: sub-waves สลับกันที่สั้นลงต่อเนื่องเป็นลักษณะเฉพาะของ contracting triangle B: ใน triangle แต่ละ sub-wave (A, B, C, D, E) แบ่งย่อยเป็น 3 คลื่น (3-3-3-3-3) การสังเกตสิ่งนี้ยืนยันลักษณะ corrective C ขัดแย้งกับ contracting triangle (E เกินขอบเขตของ C จะบ่งชี้ expanding triangle หรือความล้มเหลวของรูปแบบ) D อธิบายสิ่งที่เกิดขึ้นหลัง triangle (thrust) ไม่ใช่ระหว่างนั้น"},
{id:'v3q18',text:"Which THREE of the following correctly describe Fibonacci confluence for identifying a high-probability reversal zone?",choices:[{id:'a',letter:'A',text:'A 61.8% retracement of the prior impulse coincides with the 100% projection of wave A in a zigzag'},{id:'b',letter:'B',text:'Multiple Fibonacci extension levels from different waves cluster within a tight price range'},{id:'c',letter:'C',text:'The cluster zone aligns with a prior wave 4 termination area of lesser degree'},{id:'d',letter:'D',text:'A single 38.2% retracement alone constitutes a sufficient Fibonacci confluence'}],correct:['a','b','c'],expEn:"A: Overlap between a retracement level and a wave projection at the same price creates confluence — highly indicative of a turning zone. B: Multiple Fibonacci extensions from different waves clustering in a tight range is the essence of Fibonacci confluence. C: If the confluence zone also aligns with a prior wave 4 area (a termination guideline), probability increases further. D is INCORRECT — a single Fibonacci level is not confluence; confluence requires two or more measurements overlapping.",expTh:"A: การทับซ้อนระหว่างระดับ retracement และการฉายภาพคลื่นที่ราคาเดียวกันสร้าง confluence ซึ่งบ่งชี้โซนการเปลี่ยนแนวโน้มอย่างมาก B: Fibonacci extensions หลายรายการจากคลื่นต่างกันที่รวมตัวในช่วงราคาแคบเป็นแก่นของ Fibonacci confluence C: หาก confluence zone ยังสอดคล้องกับพื้นที่คลื่น 4 ก่อนหน้า ความน่าจะเป็นจะเพิ่มขึ้นอีก D ผิด — ระดับ Fibonacci เดียวไม่ใช่ confluence; confluence ต้องการการวัดสองรายการขึ้นไปที่ทับซ้อนกัน"},
{id:'v3q19',text:"When counting a potential five-wave impulse on a daily chart, which TWO confirmatory factors increase confidence in the count?",choices:[{id:'a',letter:'A',text:'Wave 3 is the longest wave and momentum indicators show their peak during wave 3'},{id:'b',letter:'B',text:'Wave 4 retraces into wave 4 of one lesser degree and forms a recognizable corrective pattern'},{id:'c',letter:'C',text:'The weekly chart shows a counter-trend pattern completing in the same price zone'},{id:'d',letter:'D',text:'Wave 5 makes a new extreme with higher volume than wave 3'}],correct:['a','b'],expEn:"A: Wave 3 being longest and showing peak momentum (confirmed by oscillators) satisfies both the wave personality rule and the impulse size guideline. B: Wave 4 terminating within the prior lesser-degree wave 4 zone and forming a distinct corrective pattern (flat, triangle) aligns with two key guidelines. C is a bearish confirmation on the weekly but it's a macro context factor, not a direct confirming factor of the daily count. D is incorrect — wave 5 with higher volume than wave 3 would be unusual; typically wave 3 has the highest volume.",expTh:"A: คลื่น 3 ที่ยาวที่สุดและแสดง momentum สูงสุด (ยืนยันโดย oscillators) ตอบสนองทั้งกฎ wave personality และแนวทางขนาด impulse B: คลื่น 4 ที่สิ้นสุดภายในโซนคลื่น 4 ระดับเล็กกว่าก่อนหน้าและก่อตัวเป็นรูปแบบ corrective ที่ชัดเจนสอดคล้องกับแนวทางสองข้อ C เป็นการยืนยัน bearish ในรายสัปดาห์แต่เป็นปัจจัยบริบทมหภาค D ผิด — คลื่น 5 ที่มีปริมาณสูงกว่าคลื่น 3 จะผิดปกติ; โดยทั่วไปคลื่น 3 มีปริมาณสูงสุด"},
{id:'v3q20',text:"In applying Elliott Wave Theory to risk management, which THREE practices are CONSISTENT with proper EWT methodology?",choices:[{id:'a',letter:'A',text:'Invalidating the preferred count if price moves beyond the level that would make the count structurally impossible'},{id:'b',letter:'B',text:'Maintaining an alternate count at all times to be prepared for the preferred count being wrong'},{id:'c',letter:'C',text:'Using Fibonacci confluence zones as areas to reduce position size as price approaches a potential reversal'},{id:'d',letter:'D',text:'Abandoning the wave count entirely and relying solely on price action once the alternate count is adopted'}],correct:['a','b','c'],expEn:"A: Setting precise invalidation levels (stop levels) where the preferred count becomes structurally impossible is a core EWT risk management practice. B: Maintaining an alternate count is a fundamental EWT analytical discipline. C: Using Fibonacci confluence zones to manage position sizing as price approaches potential reversal zones is a practical application of EWT. D is INCORRECT — adopting the alternate count does not mean abandoning wave counting; the alternate count itself provides a new structural framework.",expTh:"A: การกำหนดระดับยกเลิก (stop levels) ที่แน่นอนซึ่ง preferred count กลายเป็นไปไม่ได้เชิงโครงสร้างเป็นหลักปฏิบัติการจัดการความเสี่ยง EWT หลัก B: การรักษา alternate count ตลอดเวลาเป็นวินัยการวิเคราะห์ EWT พื้นฐาน C: การใช้ Fibonacci confluence zones เพื่อจัดการขนาดตำแหน่งเมื่อราคาเข้าใกล้โซน reversal ที่อาจเกิดขึ้นเป็นการประยุกต์ใช้ EWT ในทางปฏิบัติ D ผิด — การนำ alternate count มาใช้ไม่ได้หมายความว่าต้องละทิ้งการนับคลื่น; alternate count เองก็ให้กรอบโครงสร้างใหม่"}
];

const BANK = [BANK1, BANK2, BANK3];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const state = {
  selectedVariant: null,
  shuffled: false,
  questions: [],
  answers: {}, // qid -> [letter,...]
  startTime: null,
  timeLimitMs: 0,
  timerInterval: null,
  elapsed: 0,
};

// ═══════════════════════════════════════════════
// LOBBY INIT
// ═══════════════════════════════════════════════
function initLobby() {
  const grid = document.getElementById('variantGrid');
  grid.innerHTML = '';
  VARIANTS.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'variant-card' + (state.selectedVariant === i ? ' selected' : '');
    card.onclick = () => selectVariant(i);
    card.innerHTML = `
      <div class="vc-sel-dot"></div>
      <div class="vc-label">${v.label}</div>
      <div class="vc-title">${v.title}</div>
      <div class="vc-tags">
        <span class="tag">${v.questions} Qs</span>
        <span class="tag">${v.time} min</span>
        <span class="tag">${v.type === 'multi' ? 'Multi-Answer' : 'Single Answer'}</span>
        ${v.tags.slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('btnStart').disabled = state.selectedVariant === null;
  updateShuffleBtn();
}

function selectVariant(i) {
  state.selectedVariant = i;
  initLobby();
}

function toggleShuffle() {
  state.shuffled = !state.shuffled;
  updateShuffleBtn();
}

function updateShuffleBtn() {
  const btn = document.getElementById('btnShuffle');
  btn.classList.toggle('on', state.shuffled);
  btn.querySelector('.sh-dot').style.background = state.shuffled ? 'var(--yellow)' : 'var(--muted)';
}

// ═══════════════════════════════════════════════
// FISHER-YATES SHUFFLE
// ═══════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════
// START EXAM
// ═══════════════════════════════════════════════
function startExam() {
  const vi = state.selectedVariant;
  const v = VARIANTS[vi];
  // deep clone bank
  let bank = BANK[vi].map(q => ({
    ...q,
    choices: q.choices.map(c => ({ ...c })),
    correct: [...q.correct]
  }));

  if (state.shuffled) {
    bank = shuffle(bank);
    bank = bank.map(q => {
      const newChoices = shuffle(q.choices);
      const oldToNew = {};
      newChoices.forEach((c, i) => {
        c.letter = ['A','B','C','D'][i];
        c.id = ['a','b','c','d'][i];
        oldToNew[q.choices.find(oc => oc.text === c.text).id] = c.id;
      });
      q.correct = q.correct.map(cid => oldToNew[cid] || cid);
      q.choices = newChoices;
      return q;
    });
  }

  state.questions = bank;
  state.answers = {};
  state.timeLimitMs = v.time * 60 * 1000;
  state.startTime = Date.now();
  state.elapsed = 0;

  renderQuiz(v, vi);
  showScreen('quiz');
  startTimer();
}

// ═══════════════════════════════════════════════
// RENDER QUIZ
// ═══════════════════════════════════════════════
function renderQuiz(v, vi) {
  document.getElementById('quizInfo').textContent = `${v.label} · ${v.questions} Questions · ${v.time} Minutes`;
  document.getElementById('quizTitle').textContent = v.title;
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  state.questions.forEach((q, idx) => {
    const isMulti = VARIANTS[vi].type === 'multi';
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `qcard-${q.id}`;
    let choicesHtml = q.choices.map(c => `
      <label class="choice-label" id="cl-${q.id}-${c.id}" onclick="selectChoice('${q.id}','${c.id}','${isMulti}')">
        <input type="${isMulti ? 'checkbox' : 'radio'}" name="${q.id}" value="${c.id}" id="inp-${q.id}-${c.id}"/>
        <span class="choice-letter">${c.letter}</span>
        <span class="choice-text">${c.text}</span>
      </label>`).join('');
    card.innerHTML = `
      <div class="q-num">Q${String(idx+1).padStart(2,'0')} ${isMulti ? '(Select all correct answers)':''}</div>
      <div class="q-text">${q.text}</div>
      <div class="choices">${choicesHtml}</div>`;
    list.appendChild(card);
  });
  updateSubmitBar();
}

function selectChoice(qid, cid, isMulti) {
  const multi = isMulti === 'true';
  if (!state.answers[qid]) state.answers[qid] = [];
  const inp = document.getElementById(`inp-${qid}-${cid}`);

  if (multi) {
    if (inp.checked) {
      if (!state.answers[qid].includes(cid)) state.answers[qid].push(cid);
    } else {
      state.answers[qid] = state.answers[qid].filter(x => x !== cid);
    }
    const lbl = document.getElementById(`cl-${qid}-${cid}`);
    lbl.classList.toggle('selected', inp.checked);
  } else {
    // deselect all
    state.questions.find(q => q.id === qid).choices.forEach(c => {
      const l = document.getElementById(`cl-${qid}-${c.id}`);
      const i = document.getElementById(`inp-${qid}-${c.id}`);
      if (l) l.classList.remove('selected');
      if (i) i.checked = false;
    });
    inp.checked = true;
    state.answers[qid] = [cid];
    document.getElementById(`cl-${qid}-${cid}`).classList.add('selected');
  }
  updateSubmitBar();
  updateHUD();
}

function updateSubmitBar() {
  const total = state.questions.length;
  const done = Object.values(state.answers).filter(a => a && a.length > 0).length;
  document.getElementById('submitInfo').textContent = `${done} of ${total} answered`;
  document.getElementById('btnSubmit').disabled = done < total;
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.elapsed = Date.now() - state.startTime;
    updateHUD();
    if (state.elapsed >= state.timeLimitMs) {
      clearInterval(state.timerInterval);
      submitExam();
    }
  }, 500);
}

function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function updateHUD() {
  const total = state.questions.length;
  const done = Object.values(state.answers).filter(a => a && a.length > 0).length;
  const remain = Math.max(0, state.timeLimitMs - state.elapsed);
  document.getElementById('hudElapsed').textContent = fmtTime(state.elapsed);
  const remEl = document.getElementById('hudRemain');
  remEl.textContent = fmtTime(remain);
  remEl.className = 'hud-val' + (remain <= 300000 ? ' warn' : '');
  document.getElementById('hudDone').textContent = `${done}/${total}`;
  document.getElementById('hudFill').style.width = `${(done/total)*100}%`;
}

// ═══════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════
function submitExam() {
  clearInterval(state.timerInterval);
  const vi = state.selectedVariant;
  const qs = state.questions;
  let correct = 0;

  const results = qs.map(q => {
    const userAns = (state.answers[q.id] || []).slice().sort();
    const rightAns = [...q.correct].sort();
    const isCorrect = JSON.stringify(userAns) === JSON.stringify(rightAns);
    if (isCorrect) correct++;
    return { q, userAns, rightAns, isCorrect };
  });

  const pct = Math.round((correct / qs.length) * 100);
  const grade = pct >= 90 ? 'master' : pct >= 80 ? 'pass' : 'fail';
  const gradeWord = pct >= 90 ? 'MASTER' : pct >= 80 ? 'PASS' : 'FAIL';

  // badge
  const badge = document.getElementById('gradeBadge');
  badge.className = `grade-badge ${grade}`;
  document.getElementById('gradeWord').className = `grade-word ${grade}`;
  document.getElementById('gradeWord').textContent = gradeWord;
  document.getElementById('gradePct').className = `grade-pct ${grade}`;
  document.getElementById('gradePct').textContent = `${pct}%`;

  // summary
  document.getElementById('resultSummary').innerHTML = `
    <div class="rs-box"><div class="rs-val" style="color:var(--green)">${correct}</div><div class="rs-lbl">CORRECT</div></div>
    <div class="rs-box"><div class="rs-val" style="color:var(--red)">${qs.length - correct}</div><div class="rs-lbl">WRONG</div></div>
    <div class="rs-box"><div class="rs-val">${qs.length}</div><div class="rs-lbl">TOTAL</div></div>
    <div class="rs-box"><div class="rs-val">${fmtTime(state.elapsed)}</div><div class="rs-lbl">TIME</div></div>`;

  // review
  const rev = document.getElementById('reviewList');
  rev.innerHTML = '';
  results.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = `review-card ${r.isCorrect ? 'correct' : 'wrong'}`;
    const letterFor = id => ['a','b','c','d'].indexOf(id) >= 0 ? ['A','B','C','D'][['a','b','c','d'].indexOf(id)] : id.toUpperCase();
    const correctLetters = r.rightAns.map(letterFor).join(', ');
    const userLetters = r.userAns.length ? r.userAns.map(letterFor).join(', ') : '—';
    card.innerHTML = `
      <div class="rc-meta">
        <span class="rc-num">Q${String(i+1).padStart(2,'0')}</span>
        <span class="rc-status ${r.isCorrect ? 'correct' : 'wrong'}">${r.isCorrect ? '✓ Correct' : '✗ Wrong'}</span>
      </div>
      <div class="rc-text">${r.q.text}</div>
      <div class="rc-answers">Your answer: <span>${userLetters}</span> · Correct: <span>${correctLetters}</span></div>
      <div class="exp-toggle">
        <button class="exp-tab active" onclick="setExpLang(this,'en')">🇬🇧 English</button>
        <button class="exp-tab" onclick="setExpLang(this,'th')">🇹🇭 ภาษาไทย</button>
      </div>
      <div class="exp-body exp-en">${r.q.expEn}</div>
      <div class="exp-body exp-th" style="display:none">${r.q.expTh}</div>`;
    rev.appendChild(card);
  });

  showScreen('results');
}

function setExpLang(btn, lang) {
  const card = btn.closest('.review-card');
  card.querySelectorAll('.exp-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  card.querySelector('.exp-en').style.display = lang === 'en' ? '' : 'none';
  card.querySelector('.exp-th').style.display = lang === 'th' ? '' : 'none';
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goLobby() {
  clearInterval(state.timerInterval);
  showScreen('lobby');
  initLobby();
}

// init
initLobby();
</script>
</body>
</html>
