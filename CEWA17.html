ike the widely recognized, high-volume character of wave 3.", "expTh": "คลื่น 1 มักเกิดขึ้นท่ามกลางความสงสัยและไม่มีปัจจัยพื้นฐานที่ชัดเจนมารองรับ ต่างจากคลื่น 3 ที่ได้รับการยอมรับในวงกว้างและมักมีปริมาณการซื้อขายสูง"}, {"id": "v3q20", "text": "Select the TWO valid applications of Fibonacci analysis within Elliott Wave practice.", "choices": [{"id": "v3q20a", "letter": "a", "text": "Determining the exact calendar date every market top or bottom will occur, with certainty"}, {"id": "v3q20b", "letter": "b", "text": "Projecting likely retracement zones for corrective waves using ratios such as 38.2%, 50%, and 61.8%"}, {"id": "v3q20c", "letter": "c", "text": "Projecting likely price extensions for motive waves using ratios such as 1.618 and 2.618"}, {"id": "v3q20d", "letter": "d", "text": "Replacing the need for wave counting entirely, since Fibonacci ratios alone confirm the wave count"}], "correct": ["b", "c"], "expEn": "Fibonacci ratios are legitimately used to estimate retracement and extension zones, but they do not provide certain date predictions and are always used alongside — not instead of — proper wave counting.", "expTh": "อัตราส่วนฟีโบนักชีถูกใช้อย่างถูกต้องเพื่อประมาณโซนการปรับฐานและการยืดตัวของคลื่น แต่ไม่สามารถทำนายวันที่แน่นอนได้อย่างแน่ชัด และต้องใช้ควบคู่กับการนับคลื่นที่ถูกต้องเสมอ ไม่ใช่ใช้แทนกัน"}]}</script>
<script>
/* ===================== SPACEZ CEWA17 Exam Engine ===================== */
var QBANK = JSON.parse(document.getElementById('qbank-data').textContent);

var CONFIG = {
  examTitle: "CEWA Mock Exam",
  examSubtitle: "Certified Elliott Wave Analyst · CEWA17",
  variants: {
    v1: { label:"CEWA I", title:"Elliott Wave Analyst — Level I", questions:50, time:45, type:"single",
          desc:"Impulse & corrective structures, Fibonacci ratios, wave degrees, guidelines, personality" },
    v2: { label:"Level II · Part 1", title:"Elliott Wave Analyst — Level II, Part 1", questions:20, time:45, type:"single",
          desc:"Diagonals, extensions, truncation, combinations, triangles, channeling — advanced structural analysis" },
    v3: { label:"Level II · Part 2", title:"Elliott Wave Analyst — Level II, Part 2", questions:20, time:45, type:"multi",
          desc:"Applied analysis & socionomics — select ALL correct responses per question" }
  }
};

var state = {
  variant: null,
  questions: [],
  currentIndex: 0,
  answers: {},        // qid -> array of selected letters
  timerInterval: null,
  secondsLeft: 0,
  startedAt: null
};

/* ---------------- Utilities ---------------- */
function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }

function fisherYates(arr){
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function formatTime(sec){
  var m = Math.floor(sec/60), s = sec%60;
  return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

function escapeHtml(str){
  var d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}

/* ---------------- Custom modal (replaces window.confirm) ---------------- */
function showModal(opts){
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal-box">' +
      '<h3>'+escapeHtml(opts.title)+'</h3>' +
      '<p>'+escapeHtml(opts.message)+'</p>' +
      '<div class="btn-row">' +
        '<button class="btn btn-block" data-action="cancel">'+escapeHtml(opts.cancelText||'Cancel')+'</button>' +
        '<button class="btn btn-primary btn-block" data-action="confirm">'+escapeHtml(opts.confirmText||'Confirm')+'</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){
    var action = e.target.getAttribute('data-action');
    if (action === 'confirm') { document.body.removeChild(overlay); opts.onConfirm && opts.onConfirm(); }
    else if (action === 'cancel' || e.target === overlay) { document.body.removeChild(overlay); opts.onCancel && opts.onCancel(); }
  });
}

/* ---------------- Rendering root ---------------- */
var app = document.getElementById('app');

function render(html){ app.innerHTML = html; }

function brandHeader(){
  return '<div class="brand">' +
    '<div class="logo">SZ</div>' +
    '<div class="brand-text"><h1>SPACEZ EXAM HUB</h1><p>'+CONFIG.examTitle+' · '+CONFIG.examSubtitle+'</p></div>' +
  '</div>';
}

/* ---------------- Screen 1: Variant selection ---------------- */
function renderHome(){
  var html = brandHeader();
  html += '<div class="card"><h3 style="margin-bottom:6px;">Choose an exam variant</h3>' +
          '<p style="color:var(--muted);font-size:13px;">เลือกชุดข้อสอบที่ต้องการทำ — แต่ละชุดมีเวลาจำกัดและจะสับคำถาม/ตัวเลือกใหม่ทุกครั้ง</p></div>';

  ['v1','v2','v3'].forEach(function(vid){
    var v = CONFIG.variants[vid];
    html += '<div class="card variant-card hoverable" data-action="select-variant" data-variant="'+vid+'">' +
      '<div class="vinfo">' +
        '<h3>'+v.label+' — '+v.title.split('—')[1].trim()+'</h3>' +
        '<p>'+v.desc+'</p>' +
        '<span class="badge">'+v.questions+' questions</span>' +
        '<span class="badge">'+v.time+' min</span>' +
        '<span class="badge">'+(v.type==='multi'?'Multiple response':'Single answer')+'</span>' +
      '</div>' +
      '<div class="arrow">→</div>' +
    '</div>';
  });

  html += '<p class="center-note">FAIL &lt;80% · PASS 80–89% · CEWA MASTER ≥90%</p>';
  render(html);

  app.querySelectorAll('[data-action="select-variant"]').forEach(function(el){
    el.addEventListener('click', function(){ startExam(el.getAttribute('data-variant')); });
  });
}

/* ---------------- Exam engine ---------------- */
function startExam(variantId){
  var v = CONFIG.variants[variantId];
  var raw = deepClone(QBANK[variantId]);
  var shuffled = fisherYates(raw).map(function(q){
    var qc = deepClone(q);
    qc.choices = fisherYates(qc.choices);
    return qc;
  });

  state.variant = variantId;
  state.questions = shuffled;
  state.currentIndex = 0;
  state.answers = {};
  state.secondsLeft = v.time * 60;
  state.startedAt = Date.now();

  startTimer();
  renderQuestion();
}

function startTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(function(){
    state.secondsLeft--;
    updateHud();
    if (state.secondsLeft <= 0) {
      clearInterval(state.timerInterval);
      finishExam(true);
    }
  }, 1000);
}

function updateHud(){
  var hud = document.getElementById('hud-timer');
  if (!hud) return;
  hud.textContent = '⏱ ' + formatTime(Math.max(0,state.secondsLeft));
  hud.className = 'hud';
  if (state.secondsLeft <= 60) hud.className += ' danger';
  else if (state.secondsLeft <= 300) hud.className += ' warn';
}

function renderQuestion(){
  var v = CONFIG.variants[state.variant];
  var q = state.questions[state.currentIndex];
  var total = state.questions.length;
  var selected = state.answers[q.id] || [];
  var isMulti = v.type === 'multi';

  var html = '<div class="hud" id="hud-timer">⏱ '+formatTime(state.secondsLeft)+'</div>';
  html += '<div class="brand">' +
    '<div class="logo">SZ</div>' +
    '<div class="brand-text"><h1>SPACEZ EXAM HUB</h1><p>'+v.label+' — '+CONFIG.examTitle+'</p></div>' +
  '</div>';

  var pct = Math.round(((state.currentIndex)/total)*100);
  html += '<div class="progress-label">Question '+(state.currentIndex+1)+' / '+total+'</div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

  html += '<div class="card">';
  html += '<div class="qtext">'+escapeHtml(q.text)+'</div>';
  if (isMulti) html += '<div class="multi-hint">Select ALL that apply · เลือกได้มากกว่า 1 ข้อ</div>';

  q.choices.forEach(function(c){
    var isSel = selected.indexOf(c.letter) !== -1;
    html += '<div class="choice'+(isSel?' selected':'')+'" data-action="pick" data-qid="'+q.id+'" data-letter="'+c.letter+'" data-multi="'+isMulti+'">' +
      '<div class="letter">'+c.letter+'</div>' +
      '<div class="ctext">'+escapeHtml(c.text)+'</div>' +
    '</div>';
  });
  html += '</div>';

  html += '<div class="btn-row">';
  html += '<button class="btn" data-action="prev" '+(state.currentIndex===0?'disabled':'')+'>← Back</button>';
  if (state.currentIndex === total - 1) {
    html += '<button class="btn btn-primary btn-block" data-action="submit-exam">Submit Exam</button>';
  } else {
    html += '<button class="btn btn-primary btn-block" data-action="next">Next →</button>';
  }
  html += '</div>';
  html += '<div class="back-link" data-action="exit-exam" style="margin-top:18px;">← Exit to variant selection</div>';

  render(html);
  updateHud();
  bindQuestionEvents();
}

function bindQuestionEvents(){
  app.querySelectorAll('[data-action="pick"]').forEach(function(el){
    el.addEventListener('click', function(){
      var qid = el.getAttribute('data-qid');
      var letter = el.getAttribute('data-letter');
      var isMulti = el.getAttribute('data-multi') === 'true';
      var current = state.answers[qid] || [];
      if (isMulti) {
        var idx = current.indexOf(letter);
        if (idx === -1) current.push(letter); else current.splice(idx,1);
      } else {
        current = [letter];
      }
      state.answers[qid] = current;
      renderQuestion();
    });
  });
  var prevBtn = app.querySelector('[data-action="prev"]');
  if (prevBtn) prevBtn.addEventListener('click', function(){ state.currentIndex--; renderQuestion(); });
  var nextBtn = app.querySelector('[data-action="next"]');
  if (nextBtn) nextBtn.addEventListener('click', function(){ state.currentIndex++; renderQuestion(); });
  var submitBtn = app.querySelector('[data-action="submit-exam"]');
  if (submitBtn) submitBtn.addEventListener('click', function(){
    showModal({
      title:'Submit exam? / ยืนยันการส่งข้อสอบ?',
      message:'You will not be able to change your answers after submitting. คุณจะไม่สามารถแก้ไขคำตอบได้หลังจากส่งข้อสอบแล้ว',
      confirmText:'Submit', cancelText:'Keep working',
      onConfirm:function(){ clearInterval(state.timerInterval); finishExam(false); }
    });
  });
  var exitBtn = app.querySelector('[data-action="exit-exam"]');
  if (exitBtn) exitBtn.addEventListener('click', function(){
    showModal({
      title:'Exit exam? / ออกจากข้อสอบ?',
      message:'Your progress will be lost. ความคืบหน้าของคุณจะหายไปทั้งหมด',
      confirmText:'Exit', cancelText:'Stay',
      onConfirm:function(){ clearInterval(state.timerInterval); renderHome(); }
    });
  });
}

/* ---------------- Scoring & results ---------------- */
function arraysEqual(a,b){
  if (a.length !== b.length) return false;
  var sa = a.slice().sort(), sb = b.slice().sort();
  for (var i=0;i<sa.length;i++) if (sa[i]!==sb[i]) return false;
  return true;
}

function finishExam(timedOut){
  var results = state.questions.map(function(q){
    var selected = state.answers[q.id] || [];
    var correct = arraysEqual(selected, q.correct);
    return { q:q, selected:selected, correct:correct };
  });
  var correctCount = results.filter(function(r){ return r.correct; }).length;
  var total = results.length;
  var pct = Math.round((correctCount/total)*100);
  var tier = pct < 80 ? 'FAIL' : (pct < 90 ? 'PASS' : 'CEWA MASTER');
  renderResults(results, correctCount, total, pct, tier, timedOut);
}

function scoreRingSvg(pct, tierClass){
  var r = 54, c = 2*Math.PI*r;
  var offset = c - (pct/100)*c;
  var color = tierClass==='tier-fail' ? 'var(--red)' : (tierClass==='tier-pass' ? 'var(--yellow)' : 'var(--lime)');
  return '<svg width="140" height="140" viewBox="0 0 140 140">' +
    '<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="10"/>' +
    '<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="10" stroke-linecap="round" ' +
      'stroke-dasharray="'+c+'" stroke-dashoffset="'+offset+'" transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 1s ease"/>' +
  '</svg>';
}

function renderResults(results, correctCount, total, pct, tier, timedOut){
  var tierClass = tier==='FAIL' ? 'tier-fail' : (tier==='PASS' ? 'tier-pass' : 'tier-master');
  var v = CONFIG.variants[state.variant];

  var html = brandHeader();
  if (timedOut) html += '<div class="card" style="border-color:var(--yellow);"><p style="color:var(--yellow);font-size:13px;">⏱ Time expired — exam auto-submitted / หมดเวลา ระบบส่งข้อสอบให้อัตโนมัติ</p></div>';

  html += '<div class="card" style="text-align:center;">';
  html += '<p style="color:var(--muted);font-size:13px;margin-bottom:4px;">'+v.label+' Results</p>';
  html += '<div class="score-ring-wrap" style="position:relative;">' + scoreRingSvg(pct, tierClass) +
    '<div class="score-center" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">' +
      '<div class="score-num">'+pct+'%</div>' +
    '</div>' +
  '</div>';
  html += '<div class="score-tier '+tierClass+'">'+tier+'</div>';
  html += '<p style="color:var(--muted);font-size:13px;margin-top:8px;">'+correctCount+' / '+total+' correct</p>';
  html += '</div>';

  html += '<div class="card"><h3 style="margin-bottom:10px;font-size:15px;">Answer Review · ทบทวนคำตอบ</h3><div id="accordion-list"></div></div>';

  html += '<div class="btn-row">' +
    '<button class="btn btn-block" data-action="retake">↻ Retake this variant</button>' +
    '<button class="btn btn-primary btn-block" data-action="go-home">Choose another variant</button>' +
  '</div>';

  render(html);

  var list = document.getElementById('accordion-list');
  results.forEach(function(r, idx){
    var item = document.createElement('div');
    item.className = 'accordion-item';
    var snippet = r.q.text.length > 70 ? r.q.text.slice(0,70)+'…' : r.q.text;
    item.innerHTML =
      '<div class="accordion-head" data-action="toggle-acc" data-idx="'+idx+'">' +
        '<span class="qnum">Q'+(idx+1)+'</span>' +
        '<span class="qsnippet">'+escapeHtml(snippet)+'</span>' +
        '<span class="result-icon '+(r.correct?'correct':'wrong')+'">'+(r.correct?'✓':'✕')+'</span>' +
      '</div>' +
      '<div class="accordion-body" id="acc-body-'+idx+'"></div>';
    list.appendChild(item);
  });

  list.querySelectorAll('[data-action="toggle-acc"]').forEach(function(head){
    head.addEventListener('click', function(){
      var idx = head.getAttribute('data-idx');
      var body = document.getElementById('acc-body-'+idx);
      var isOpen = body.classList.contains('open');
      if (isOpen) { body.classList.remove('open'); return; }
      if (!body.getAttribute('data-built')) {
        buildAccordionBody(body, results[idx]);
        body.setAttribute('data-built','1');
      }
      body.classList.add('open');
    });
  });

  var retakeBtn = app.querySelector('[data-action="retake"]');
  if (retakeBtn) retakeBtn.addEventListener('click', function(){ startExam(state.variant); });
  var homeBtn = app.querySelector('[data-action="go-home"]');
  if (homeBtn) homeBtn.addEventListener('click', renderHome);
}

function buildAccordionBody(body, r){
  var q = r.q;
  var html = '';
  q.choices.forEach(function(c){
    var isCorrectChoice = q.correct.indexOf(c.letter) !== -1;
    var isSelectedWrong = r.selected.indexOf(c.letter) !== -1 && !isCorrectChoice;
    var cls = isCorrectChoice ? 'is-correct' : (isSelectedWrong ? 'is-wrong-selected' : '');
    var tag = isCorrectChoice ? ' ✓' : (isSelectedWrong ? ' ✕ (your answer)' : '');
    html += '<div class="accordion-choice '+cls+'"><b>'+c.letter.toUpperCase()+'.</b> '+escapeHtml(c.text)+tag+'</div>';
  });
  html += '<div class="lang-toggle">' +
    '<button class="lang-btn active" data-lang="en">EN</button>' +
    '<button class="lang-btn" data-lang="th">TH</button>' +
  '</div>';
  html += '<div class="exp-block show" data-lang-block="en">'+escapeHtml(q.expEn)+'</div>';
  html += '<div class="exp-block" data-lang-block="th">'+escapeHtml(q.expTh)+'</div>';
  body.innerHTML = html;

  body.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var lang = btn.getAttribute('data-lang');
      body.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.toggle('active', b===btn); });
      body.querySelectorAll('.exp-block').forEach(function(b){
        b.classList.toggle('show', b.getAttribute('data-lang-block')===lang);
      });
    });
  });
}

/* ---------------- Boot ---------------- */
renderHome();

</script>
</body>
</html>
